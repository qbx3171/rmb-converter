<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>乐哲软件 · 管理后台</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background:#f0f4f9; padding:20px; }
        @media (min-width: 768px) { body { padding:32px; } }
        .container { max-width:1400px; margin:0 auto; }
        .login-box { max-width:400px; margin:80px auto; background:white; padding:32px; border-radius:32px; text-align:center; box-shadow:0 8px 20px rgba(0,0,0,0.05); }
        .login-box h2 { font-size:28px; margin-bottom:24px; color:#1a2c3e; font-weight:600; }
        .login-box input { width:100%; padding:14px; margin:12px 0; border-radius:40px; border:1px solid #ddd; outline:none; font-size:16px; }
        .login-box input:focus { border-color:#1E6DFF; }
        .login-box button { width:100%; padding:14px; background:#1E6DFF; color:white; border:none; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.2s; }
        .login-box button:hover { background:#0f5be6; }
        .software-list { background:white; border-radius:28px; overflow:auto; margin-top:20px; position:relative; min-height:200px; }
        .loading-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center; z-index:10; border-radius:28px; }
        .loading-spinner { width:40px; height:40px; border:4px solid #eef2fc; border-top-color:#1E6DFF; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid #eef2fc; }
        th { background:#f8fafd; font-weight:600; }
        .btn { padding:6px 12px; border-radius:20px; cursor:pointer; border:none; font-size:13px; transition:0.2s; background:#f0f4f9; }
        .btn-primary { background:#1E6DFF; color:white; }
        .btn-danger { background:#e74c3c; color:white; }
        .btn-add { background:#1E6DFF; color:white; padding:10px 20px; margin-bottom:20px; font-size:14px; border:none; border-radius:40px; cursor:pointer; }
        .form-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .form-modal.active { display:flex; }
        .form-card { background:white; border-radius:32px; padding:24px; width:500px; max-width:90%; max-height:90vh; overflow-y:auto; }
        .form-card h3 { font-size:24px; margin-bottom:16px; color:#1a2c3e; }
        .form-card input, .form-card select, .form-card textarea { width:100%; margin:8px 0; padding:12px; border-radius:28px; border:1px solid #ddd; outline:none; font-size:14px; }
        .form-card input:focus, .form-card textarea:focus { border-color:#1E6DFF; }
        .icon-preview { display:inline-block; margin-left:12px; font-size:24px; vertical-align:middle; }
        .os-checkbox { display:flex; gap:20px; margin:10px 0; }
        .form-card button { margin-top:10px; }
        .cache-status { font-size:12px; color:#6b85a4; margin-bottom:8px; display:flex; align-items:center; gap:8px; padding:0 16px; }
        .icon { display:inline-block; width:1.2em; text-align:center; }
        h1 { font-size:28px; margin-bottom:8px; color:#1a2c3e; font-weight:700; }
        h1 .icon { font-size:28px; margin-right:8px; }
        .icon-select-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .filter-bar { margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .filter-bar select, .filter-bar input { padding:8px 16px; border-radius:40px; border:1px solid #ddd; background:white; font-size:14px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginPanel" class="login-box">
        <h2>🔐 管理后台登录</h2>
        <input type="password" id="adminPassword" placeholder="请输入密码" autocomplete="off">
        <button onclick="login()">登录</button>
    </div>
    <div id="adminPanel" style="display:none;">
        <h1><span class="icon">📦</span> 软件管理</h1>
        <div class="filter-bar">
            <button class="btn-add" onclick="showForm()"><span class="icon">➕</span> 添加软件</button>
            <select id="categoryFilter">
                <option value="">全部分类</option>
                <option value="Adobe系列">Adobe系列</option>
                <option value="Autodesk系列">Autodesk系列</option>
                <option value="Cinema 4D">Cinema 4D</option>
                <option value="草图大师">草图大师</option>
                <option value="犀牛软件">犀牛软件</option>
                <option value="插件工具">插件工具</option>
            </select>
            <input type="text" id="searchFilter" placeholder="搜索软件名称" style="width:200px;">
        </div>
        <div class="software-list" id="softwareListContainer">
            <div class="loading-overlay" id="loadingOverlay" style="display:none;"><div class="loading-spinner"></div></div>
            <div id="cacheStatus" class="cache-status" style="display:none;"><span class="icon">💾</span> <span id="cacheStatusText"></span></div>
            <div style="overflow-x:auto;">
                <table style="min-width:600px;">
                    <thead><tr><th>名称</th><th>分类</th><th>版本</th><th>免验证</th><th>操作</th></thead>
                    <tbody id="softwareTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="formModal" class="form-modal">
    <div class="form-card">
        <h3 id="formTitle">添加软件</h3>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="软件名称 *" required>
        <input type="text" id="category" placeholder="分类 (如: Adobe系列)" required>
        <div class="os-checkbox">
            <label><input type="checkbox" value="Windows" id="osWin"> 🪟 Windows</label>
            <label><input type="checkbox" value="Mac" id="osMac"> 🍎 macOS</label>
        </div>
        <input type="text" id="version" placeholder="版本号">
        <textarea id="description" rows="2" placeholder="描述"></textarea>
        <div class="icon-select-row">
            <select id="iconSelect" onchange="updateIconInput()" style="flex:2;">
                <option value="📦">📦 默认</option>
                <option value="fa-image">🖼️ fa-image</option>
                <option value="fa-paint-brush">🎨 fa-paint-brush</option>
                <option value="fa-camera">📷 fa-camera</option>
                <option value="fa-video">🎬 fa-video</option>
                <option value="fa-film">🎞️ fa-film</option>
                <option value="fa-images">🖼️ fa-images</option>
                <option value="fa-book">📖 fa-book</option>
                <option value="fa-file-pdf">📄 fa-file-pdf</option>
                <option value="fa-broom">🧹 fa-broom</option>
                <option value="fa-cube">🧊 fa-cube</option>
                <option value="fa-cubes">🧊 fa-cubes</option>
                <option value="fa-shapes">🔷 fa-shapes</option>
                <option value="fa-drafting-compass">📐 fa-drafting-compass</option>
                <option value="fa-ruler-combined">📏 fa-ruler-combined</option>
                <option value="fa-puzzle-piece">🧩 fa-puzzle-piece</option>
                <option value="fa-cloud-download-alt">☁️ fa-cloud-download-alt</option>
                <option value="fa-download">⬇️ fa-download</option>
            </select>
            <input type="text" id="icon" placeholder="图标 (Emoji 或 fa-xxx)" value="📦" style="flex:3;">
            <span id="iconPreview" class="icon-preview">📦</span>
        </div>
        <div style="font-size:12px; color:#6b85a4; margin-top:4px;">提示：以 fa- 开头将显示为Font Awesome图标，否则显示为文本/Emoji</div>
        <input type="text" id="url" placeholder="下载链接 *" required>
        <label><input type="checkbox" id="noVerify"> ✅ 免验证（直接下载）</label>
        <div style="margin-top:20px; display:flex; gap:12px; justify-content:flex-end;">
            <button class="btn" onclick="closeForm()">取消</button>
            <button class="btn btn-primary" onclick="saveSoftware()">保存</button>
        </div>
    </div>
</div>

<script>
    const AIRTABLE_TOKEN = 'patOe6PVCcEuaswP1.9aaa8be443f568c5c5b9a5d02485e0221e3f5a1b8d3873e95b1a35671ecbef1e';
    const AIRTABLE_BASE_ID = 'appM4Ty76lOlslpU9';
    const TABLE_NAME = 'softwares';
    const API_URL = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${TABLE_NAME}`;
    const ADMIN_PASSWORD = 'qbx12164811';
    const CACHE_KEY = 'lezhe_software_cache';
    const CACHE_EXPIRY = 60 * 60 * 1000;

    let softwares = [];
    let filteredSoftwares = [];
    let pendingNetwork = false;

    async function login() {
        const pwd = document.getElementById('adminPassword').value;
        if(pwd === ADMIN_PASSWORD) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            // 优先从缓存加载，立即显示
            const hasCache = loadFromCache();
            if (!hasCache) {
                // 如果没有缓存，显示一个短暂提示（非阻塞）
                updateCacheStatus('加载中...');
                showLoading(true);
            }
            // 无论如何都会静默刷新网络数据（不显示全局转圈，除非首次无缓存）
            refreshFromNetwork(hasCache);
        } else {
            alert('密码错误');
        }
    }

    // 返回是否有有效缓存
    function loadFromCache() {
        const cached = localStorage.getItem(CACHE_KEY);
        if(cached) {
            try {
                const { data, timestamp } = JSON.parse(cached);
                const age = Date.now() - timestamp;
                if(age < CACHE_EXPIRY) {
                    softwares = data;
                    applyFilterAndRender();
                    updateCacheStatus(`已加载缓存 (${Math.floor(age/1000)}秒前)`);
                    return true;
                } else {
                    updateCacheStatus('缓存已过期，正在更新...');
                }
            } catch(e) {}
        }
        return false;
    }

    function showLoading(show) {
        const overlay = document.getElementById('loadingOverlay');
        if(overlay) overlay.style.display = show ? 'flex' : 'none';
    }

    function updateCacheStatus(text, isError = false) {
        const statusDiv = document.getElementById('cacheStatus');
        const statusSpan = document.getElementById('cacheStatusText');
        if(statusDiv && statusSpan) {
            if(text) {
                statusDiv.style.display = 'flex';
                statusSpan.innerText = text;
                statusDiv.style.color = isError ? '#e74c3c' : '#6b85a4';
                if (!isError && !text.includes('错误')) {
                    setTimeout(() => {
                        if (statusSpan.innerText === text) statusDiv.style.display = 'none';
                    }, 3000);
                }
            } else {
                statusDiv.style.display = 'none';
            }
        }
    }

    async function refreshFromNetwork(skipLoading = false) {
        if(pendingNetwork) return;
        pendingNetwork = true;
        if (!skipLoading) showLoading(true);
        try {
            const response = await fetch(API_URL, {
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
            });
            if(!response.ok) throw new Error('网络错误');
            const data = await response.json();
            const newSoftwares = data.records.map(record => ({
                id: record.id,
                name: record.fields.name,
                category: record.fields.category,
                os: record.fields.os || [],
                version: record.fields.version || '',
                description: record.fields.description || '',
                icon: record.fields.icon || '📦',
                url: record.fields.url,
                noVerify: record.fields.noVerify || false
            }));
            softwares = newSoftwares;
            applyFilterAndRender();
            localStorage.setItem(CACHE_KEY, JSON.stringify({
                data: softwares,
                timestamp: Date.now()
            }));
            updateCacheStatus('已同步最新数据');
        } catch (error) {
            console.error(error);
            updateCacheStatus('网络错误，使用缓存数据', true);
        } finally {
            showLoading(false);
            pendingNetwork = false;
        }
    }

    function applyFilterAndRender() {
        const categoryFilter = document.getElementById('categoryFilter')?.value || '';
        const searchText = document.getElementById('searchFilter')?.value?.trim().toLowerCase() || '';
        filteredSoftwares = softwares.filter(sw => {
            if(categoryFilter && sw.category !== categoryFilter) return false;
            if(searchText && !sw.name.toLowerCase().includes(searchText)) return false;
            return true;
        });
        filteredSoftwares.sort((a,b) => (a.category || '').localeCompare(b.category || ''));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('softwareTableBody');
        if(!tbody) return;
        tbody.innerHTML = '';
        if(filteredSoftwares.length === 0) {
            const row = tbody.insertRow();
            const cell = row.insertCell(0);
            cell.colSpan = 5;
            cell.style.textAlign = 'center';
            cell.innerText = '暂无软件数据，点击“添加软件”创建';
            return;
        }
        filteredSoftwares.forEach(sw => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = sw.name;
            row.insertCell(1).innerText = sw.category;
            row.insertCell(2).innerText = sw.version;
            row.insertCell(3).innerText = sw.noVerify ? '是' : '否';
            const cell = row.insertCell(4);
            cell.innerHTML = `<button class="btn" onclick="editSoftware('${sw.id}')">✏️ 编辑</button> <button class="btn btn-danger" onclick="deleteSoftware('${sw.id}')">🗑️ 删除</button>`;
        });
    }

    function updateIconInput() {
        const select = document.getElementById('iconSelect');
        const iconInput = document.getElementById('icon');
        const preview = document.getElementById('iconPreview');
        const selected = select.value;
        iconInput.value = selected;
        if(selected.startsWith('fa-')) {
            preview.innerHTML = `<i class="fas ${selected}" style="font-size:24px"></i>`;
        } else {
            preview.innerText = selected;
        }
    }

    function updatePreview() {
        const iconInput = document.getElementById('icon');
        const preview = document.getElementById('iconPreview');
        const val = iconInput.value;
        if(val.startsWith('fa-')) {
            preview.innerHTML = `<i class="fas ${val}" style="font-size:24px"></i>`;
        } else {
            preview.innerText = val;
        }
    }

    function showForm(sw = null) {
        const modal = document.getElementById('formModal');
        if(sw) {
            document.getElementById('formTitle').innerText = '编辑软件';
            document.getElementById('editId').value = sw.id;
            document.getElementById('name').value = sw.name;
            document.getElementById('category').value = sw.category;
            document.getElementById('osWin').checked = sw.os.includes('Windows');
            document.getElementById('osMac').checked = sw.os.includes('Mac');
            document.getElementById('version').value = sw.version;
            document.getElementById('description').value = sw.description;
            document.getElementById('icon').value = sw.icon;
            document.getElementById('url').value = sw.url;
            document.getElementById('noVerify').checked = sw.noVerify;
            const select = document.getElementById('iconSelect');
            const found = Array.from(select.options).some(opt => opt.value === sw.icon);
            if(found) select.value = sw.icon;
            else select.value = '📦';
        } else {
            document.getElementById('formTitle').innerText = '添加软件';
            document.getElementById('editId').value = '';
            document.getElementById('name').value = '';
            document.getElementById('category').value = '';
            document.getElementById('osWin').checked = true;
            document.getElementById('osMac').checked = true;
            document.getElementById('version').value = '';
            document.getElementById('description').value = '';
            document.getElementById('icon').value = '📦';
            document.getElementById('url').value = '';
            document.getElementById('noVerify').checked = false;
            document.getElementById('iconSelect').value = '📦';
        }
        updatePreview();
        modal.classList.add('active');
    }

    function closeForm() {
        document.getElementById('formModal').classList.remove('active');
    }

    async function saveSoftware() {
        const id = document.getElementById('editId').value;
        const fields = {
            name: document.getElementById('name').value,
            category: document.getElementById('category').value,
            os: [],
            version: document.getElementById('version').value,
            description: document.getElementById('description').value,
            icon: document.getElementById('icon').value,
            url: document.getElementById('url').value,
            noVerify: document.getElementById('noVerify').checked
        };
        if(document.getElementById('osWin').checked) fields.os.push('Windows');
        if(document.getElementById('osMac').checked) fields.os.push('Mac');
        if(!fields.name || !fields.category || !fields.url) {
            alert('请填写必要字段');
            return;
        }

        showLoading(true);
        try {
            let response;
            if(id) {
                response = await fetch(`${API_URL}/${id}`, {
                    method: 'PATCH',
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields })
                });
            } else {
                response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields })
                });
            }
            if(!response.ok) throw new Error(await response.text());
            closeForm();
            await refreshFromNetwork(true);
        } catch (error) {
            alert('保存失败: ' + error.message);
        } finally {
            showLoading(false);
        }
    }

    async function deleteSoftware(id) {
        if(!confirm('确定删除？')) return;
        showLoading(true);
        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
            });
            if(!response.ok) throw new Error();
            await refreshFromNetwork(true);
        } catch (error) {
            alert('删除失败: ' + error.message);
        } finally {
            showLoading(false);
        }
    }

    function editSoftware(id) {
        const sw = softwares.find(s => s.id === id);
        if(sw) showForm(sw);
    }

    // 绑定筛选事件
    document.getElementById('categoryFilter')?.addEventListener('change', () => applyFilterAndRender());
    document.getElementById('searchFilter')?.addEventListener('input', () => applyFilterAndRender());
    document.getElementById('icon')?.addEventListener('input', updatePreview);
</script>
</body>
</html>
