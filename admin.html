<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐哲软件 · 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f0f4f9; padding:32px; color:#1e293b; }
        .container { max-width:1400px; margin:0 auto; }
        h1 { font-size:28px; font-weight:700; margin-bottom:8px; background:linear-gradient(135deg,#1E6DFF,#8B5CF6); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .sub { color:#5b6e8c; margin-bottom:32px; border-left:3px solid #1E6DFF; padding-left:16px; }
        .login-box { max-width:400px; margin:100px auto; background:white; padding:32px; border-radius:32px; text-align:center; box-shadow:0 8px 20px rgba(0,0,0,0.05); }
        .login-box input { width:100%; padding:12px; margin:12px 0; border-radius:40px; border:1px solid #ddd; outline:none; }
        .login-box button { width:100%; }
        .client-list { display:flex; flex-direction:column; gap:24px; }
        .client-card { background:white; border-radius:28px; box-shadow:0 8px 20px rgba(0,0,0,0.05); overflow:hidden; border:1px solid #eef2fc; }
        .client-header { background:#f8fafd; padding:18px 24px; border-bottom:1px solid #eef2fc; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; cursor:pointer; font-weight:600; }
        .client-id { font-family:monospace; background:#eef2ff; padding:4px 12px; border-radius:40px; font-size:13px; color:#1E6DFF; }
        .reply-area { background:white; padding:16px 24px 24px; border-top:1px solid #eef2fc; display:flex; gap:12px; align-items:flex-start; }
        .reply-input { flex:1; border:1px solid #dce5f0; border-radius:28px; padding:12px 18px; font-family:inherit; font-size:14px; resize:vertical; }
        .reply-btn { background:#1E6DFF; border:none; border-radius:40px; padding:0 24px; color:white; font-weight:600; cursor:pointer; height:48px; }
        .reply-btn:hover { background:#0f5be6; }
        .messages-container { padding:20px 24px; display:flex; flex-direction:column; gap:12px; max-height:400px; overflow-y:auto; background:#ffffff; }
        .admin-msg, .customer-msg { padding:10px 16px; border-radius:20px; font-size:13px; max-width:80%; }
        .admin-msg { background:#f1f5f9; align-self:flex-start; border-bottom-left-radius:4px; }
        .customer-msg { background:#1E6DFF; color:white; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg-time { font-size:10px; opacity:0.7; margin-top:4px; display:block; }
        .badge { background:#1E6DFF10; color:#1E6DFF; border-radius:30px; padding:2px 10px; font-size:12px; }
        footer { margin-top:48px; text-align:center; font-size:12px; color:#7e8aa2; }

        .software-list { background:white; border-radius:28px; overflow:auto; margin-top:20px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid #eef2fc; }
        th { background:#f8fafd; font-weight:600; }
        .btn { padding:6px 12px; border-radius:20px; cursor:pointer; border:none; font-size:13px; transition:0.2s; }
        .btn-add { background:#1E6DFF; color:white; padding:10px 20px; margin-bottom:20px; font-size:14px; }
        .form-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .form-modal.active { display:flex; }
        .form-card { background:white; border-radius:32px; padding:32px; width:500px; max-width:90%; }
        .form-card input, .form-card select, .form-card textarea { width:100%; margin:8px 0; padding:10px; border-radius:28px; border:1px solid #ddd; outline:none; }
        .os-checkbox { display:flex; gap:20px; margin:10px 0; }
        .form-card button { margin-top:10px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginPanel" class="login-box">
        <h2>管理后台登录</h2>
        <input type="password" id="adminPassword" placeholder="请输入密码">
        <button onclick="login()" class="btn" style="background:#1E6DFF; color:white;">登录</button>
        <div style="margin-top:16px; font-size:12px; color:#888;">默认密码: admin123（可在代码中修改）</div>
    </div>
    <div id="adminPanel" style="display:none;">
        <h1><i class="fas fa-database"></i> 软件管理</h1>
        <button class="btn btn-add" onclick="showForm()"><i class="fas fa-plus"></i> 添加软件</button>
        <div class="software-list">
            <table>
                <thead><th>名称</th><th>分类</th><th>版本</th><th>免验证</th><th>操作</th></thead>
                <tbody id="softwareTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="formModal" class="form-modal">
    <div class="form-card">
        <h3 id="formTitle">添加软件</h3>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="软件名称 *" required>
        <input type="text" id="category" placeholder="分类 (如: Adobe系列)" required>
        <div class="os-checkbox">
            <label><input type="checkbox" value="Windows" id="osWin"> Windows</label>
            <label><input type="checkbox" value="Mac" id="osMac"> macOS</label>
        </div>
        <input type="text" id="version" placeholder="版本号">
        <textarea id="description" rows="2" placeholder="描述"></textarea>
        <input type="text" id="icon" placeholder="图标类名" value="fa-download">
        <input type="text" id="url" placeholder="下载链接 *" required>
        <label><input type="checkbox" id="noVerify"> 免验证（直接下载）</label>
        <div style="margin-top:20px; display:flex; gap:12px; justify-content:flex-end;">
            <button class="btn" onclick="closeForm()">取消</button>
            <button class="btn" style="background:#1E6DFF; color:white;" onclick="saveSoftware()">保存</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    // ========== Airtable 配置 ==========
    const AIRTABLE_TOKEN = 'patOe6PVCcEuaswP1.9aaa8be443f568c5c5b9a5d02485e0221e3f5a1b8d3873e95b1a35671ecbef1e';
    const AIRTABLE_BASE_ID = 'appM4Ty76lOlslpU9';
    const TABLE_NAME = 'softwares';
    const API_URL = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${TABLE_NAME}`;
    const ADMIN_PASSWORD = 'admin123';   // 管理密码，可修改

    let softwares = [];

    async function login() {
        const pwd = document.getElementById('adminPassword').value;
        if(pwd === ADMIN_PASSWORD) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadSoftwares();
        } else {
            alert('密码错误');
        }
    }

    async function loadSoftwares() {
        try {
            const response = await axios.get(API_URL, {
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
            });
            softwares = response.data.records.map(record => ({
                id: record.id,
                name: record.fields.Name,
                category: record.fields.Category,
                os: record.fields.OS || [],
                version: record.fields.Version || '',
                description: record.fields.Description || '',
                icon: record.fields.Icon || 'fa-download',
                url: record.fields.URL,
                noVerify: record.fields.NoVerify || false
            }));
            renderTable();
        } catch (error) {
            alert('加载失败: ' + error.message);
        }
    }

    function renderTable() {
        const tbody = document.getElementById('softwareTableBody');
        tbody.innerHTML = '';
        softwares.forEach(sw => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = sw.name;
            row.insertCell(1).innerText = sw.category;
            row.insertCell(2).innerText = sw.version;
            row.insertCell(3).innerText = sw.noVerify ? '是' : '否';
            const cell = row.insertCell(4);
            cell.innerHTML = `<button class="btn" onclick="editSoftware('${sw.id}')">编辑</button> <button class="btn" style="background:#e74c3c;color:white;" onclick="deleteSoftware('${sw.id}')">删除</button>`;
        });
    }

    function showForm(sw = null) {
        document.getElementById('formModal').classList.add('active');
        if(sw) {
            document.getElementById('formTitle').innerText = '编辑软件';
            document.getElementById('editId').value = sw.id;
            document.getElementById('name').value = sw.name;
            document.getElementById('category').value = sw.category;
            document.getElementById('osWin').checked = sw.os.includes('Windows');
            document.getElementById('osMac').checked = sw.os.includes('Mac');
            document.getElementById('version').value = sw.version;
            document.getElementById('description').value = sw.description;
            document.getElementById('icon').value = sw.icon;
            document.getElementById('url').value = sw.url;
            document.getElementById('noVerify').checked = sw.noVerify;
        } else {
            document.getElementById('formTitle').innerText = '添加软件';
            document.getElementById('editId').value = '';
            document.getElementById('name').value = '';
            document.getElementById('category').value = '';
            document.getElementById('osWin').checked = true;
            document.getElementById('osMac').checked = true;
            document.getElementById('version').value = '';
            document.getElementById('description').value = '';
            document.getElementById('icon').value = 'fa-download';
            document.getElementById('url').value = '';
            document.getElementById('noVerify').checked = false;
        }
    }

    function closeForm() {
        document.getElementById('formModal').classList.remove('active');
    }

    async function saveSoftware() {
        const id = document.getElementById('editId').value;
        const fields = {
            Name: document.getElementById('name').value,
            Category: document.getElementById('category').value,
            OS: [],
            Version: document.getElementById('version').value,
            Description: document.getElementById('description').value,
            Icon: document.getElementById('icon').value,
            URL: document.getElementById('url').value,
            NoVerify: document.getElementById('noVerify').checked
        };
        if(document.getElementById('osWin').checked) fields.OS.push('Windows');
        if(document.getElementById('osMac').checked) fields.OS.push('Mac');
        if(!fields.Name || !fields.Category || !fields.URL) {
            alert('请填写必要字段');
            return;
        }

        try {
            if(id) {
                await axios.patch(`${API_URL}/${id}`, { fields }, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }
                });
            } else {
                await axios.post(API_URL, { fields }, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }
                });
            }
            closeForm();
            loadSoftwares();
        } catch (error) {
            alert('保存失败: ' + (error.response?.data?.error?.message || error.message));
        }
    }

    async function deleteSoftware(id) {
        if(!confirm('确定删除？')) return;
        try {
            await axios.delete(`${API_URL}/${id}`, {
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
            });
            loadSoftwares();
        } catch (error) {
            alert('删除失败: ' + error.message);
        }
    }

    function editSoftware(id) {
        const sw = softwares.find(s => s.id === id);
        if(sw) showForm(sw);
    }
</script>
</body>
</html>
