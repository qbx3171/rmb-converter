<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Adobe 团队管家 · 主管理员</title>
    <style>
        /* 样式保持不变，省略（与原代码相同） */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 20%, rgba(15,35,55,0.05) 0%, rgba(10,25,40,0.08) 100%); padding: 20px 16px; min-height: 100vh; }
        .glass-panel { max-width: 1600px; margin: 0 auto; background: rgba(255,255,255,0.97); backdrop-filter: blur(2px); border-radius: 1.8rem; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #0a2b3c 0%, #1b5a6e 100%); padding: 1rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; color: white; }
        .hero-left h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .hero-left p { font-size: 0.6rem; opacity: 0.8; margin-top: 2px; }
        .team-edit-area { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); border-radius: 60px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .team-edit-area label { font-size: 0.7rem; font-weight: 500; }
        .team-input { background: rgba(255,255,240,0.9); border: none; border-radius: 40px; padding: 4px 10px; font-size: 0.7rem; color: #1e3a5f; min-width: 140px; }
        .update-team-btn { background: #ffd966; color: #2c3e2f; border: none; border-radius: 40px; padding: 3px 10px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }
        .stats-grid { display: flex; gap: 8px; padding: 0.8rem 1rem; background: #f9fbfd; border-bottom: 1px solid #e9eef3; flex-wrap: wrap; }
        .stat-item { background: white; border-radius: 30px; padding: 0.2rem 0.8rem; box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px #eef2f8; font-weight: 500; display: flex; align-items: baseline; gap: 5px; font-size: 0.7rem; }
        .stat-number { font-size: 1.2rem; font-weight: 800; color: #1f6e5c; line-height: 1; }
        .action-bar { padding: 0.6rem 1rem; background: white; border-bottom: 1px solid #eef2f8; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; }
        .btn-group, .sync-group { display: flex; flex-wrap: wrap; gap: 5px; }
        button, .btn-outline { background: #f1f5f9; border: none; padding: 5px 10px; border-radius: 30px; font-weight: 500; font-size: 0.7rem; cursor: pointer; transition: all 0.2s ease; color: #1e3a5f; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        button.primary { background: #1b6b5e; color: white; }
        button.accent { background: #2c5f8a; color: white; }
        button.warning { background: #fff1e5; color: #b45a2e; }
        button.danger { background: #ffe8e8; color: #c2412c; }
        button.success { background: #e0f2e9; color: #146b3a; }
        .add-section { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex: 1; }
        .add-section input { padding: 5px 10px; border-radius: 30px; border: 1px solid #cbdde9; background: white; min-width: 150px; font-size: 0.7rem; flex: 1; }
        .file-import { background: #eef2ff; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 0.5rem 0; }
        .modern-table { min-width: 800px; width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .modern-table th { text-align: left; padding: 0.6rem 0.4rem; background: #fefefe; font-weight: 600; color: #2c4c6c; border-bottom: 1px solid #e4e9f0; }
        .modern-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid #f0f3f9; vertical-align: middle; }
        .email-cell { font-family: monospace; font-weight: 500; word-break: break-all; max-width: 180px; }
        .date-input { padding: 4px 6px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.65rem; width: 100px; background: white; font-family: monospace; }
        .checkbox-smart { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .checkbox-smart input { width: 16px; height: 16px; accent-color: #1b6b5e; }
        .badge-team { background: #ddf3e8; color: #146b3a; border-radius: 30px; padding: 1px 6px; font-size: 0.6rem; font-weight: 600; margin-left: 4px; white-space: nowrap; }
        .delete-icon { background: none; border: none; font-size: 1rem; cursor: pointer; color: #9aaebf; padding: 2px 6px; border-radius: 30px; }
        .toast-message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a36e6; backdrop-filter: blur(12px); color: white; padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; z-index: 1000; pointer-events: none; white-space: nowrap; }
        .footer-note { padding: 0.6rem 1rem; background: #fafdff; border-top: 1px solid #eef2f8; font-size: 0.6rem; color: #6a7c8f; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; display: none; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 1.5rem; padding: 1.5rem 1.2rem; width: 280px; text-align: center; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.5); }
        .login-card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; color: #1e3a5f; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .login-card p { font-size: 0.7rem; color: #6c86a3; margin-bottom: 1rem; }
        .login-card input { width: 100%; padding: 8px 12px; margin: 0.5rem 0; border: 1px solid #cbdde9; border-radius: 40px; font-size: 0.85rem; background: white; outline: none; text-align: center; }
        .login-card input:focus { border-color: #1b6b5e; box-shadow: 0 0 0 2px rgba(27,107,94,0.2); }
        .login-card button { background: linear-gradient(135deg, #1b6b5e, #0f5348); color: white; border: none; padding: 8px 16px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .login-card .error { color: #c2412c; font-size: 0.65rem; margin-top: 0.5rem; }
        .subadmin-section { margin: 1rem; padding: 1rem; background: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .subadmin-section h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .subadmin-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .subadmin-table th, .subadmin-table td { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .subadmin-table input { padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; width: 100%; }
        .btn-sm { padding: 2px 8px; font-size: 0.6rem; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .hero-left h1 { font-size: 1rem; }
            .stat-item { font-size: 0.6rem; }
            .stat-number { font-size: 1rem; }
            button, .btn-outline { font-size: 0.65rem; padding: 4px 8px; }
            .add-section input { font-size: 0.65rem; min-width: 120px; }
            .date-input { width: 85px; }
            .modern-table th, .modern-table td { padding: 0.4rem 0.3rem; }
        }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 主管理员登录</h2>
        <p>请输入管理密码</p>
        <input type="password" id="adminPasswordInput" placeholder="密码" autocomplete="off">
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
<div class="glass-panel">
    <div class="hero">
        <div class="hero-left">
            <h1>📋 Adobe 团队管家 · 主管理员</h1>
            <p>数据实时保存在 Airtable，操作即时生效</p>
        </div>
        <div class="team-edit-area">
            <label>🎯 主团队名称：</label>
            <input type="text" id="teamNameInput" class="team-input" placeholder="团队名称">
            <button id="updateTeamBtn" class="update-team-btn">更改</button>
        </div>
    </div>
    <div class="stats-grid">
        <div class="stat-item">📬 总账号 <span class="stat-number" id="totalAccounts">0</span></div>
        <div class="stat-item">✅ 已加入团队 <span class="stat-number" id="joinedTeamCount">0</span></div>
        <div class="stat-item">⭐ 正版客户 <span class="stat-number" id="genuineCount">0</span></div>
        <div class="stat-item">⏳ 即将过期 <span class="stat-number" id="expiringCount">0</span></div>
    </div>
    <div class="action-bar">
        <div class="btn-group">
            <button id="batchJoinTeam" class="primary">➕ 批量加入</button>
            <button id="batchLeaveTeam" class="warning">➖ 批量移出</button>
            <button id="batchSetGenuine" class="primary">⭐ 批量正版</button>
            <button id="batchRemoveGenuine" class="warning">🔄 取消正版</button>
            <button id="deleteSelectedBtn" class="danger">🗑️ 删除选中</button>
        </div>
        <div class="sync-group">
            <button id="refreshFromCloud" class="accent">🔄 刷新</button>
            <button id="exportJsonBtn" class="">💾 导出JSON</button>
            <label for="importJsonInput" class="btn-outline" style="cursor:pointer;">📂 导入JSON</label>
            <input type="file" id="importJsonInput" accept=".json" style="display:none">
            <button id="resetDefaultBtn" class="">⟳ 重置</button>
        </div>
    </div>
    <div class="action-bar" style="border-top: none; padding-top: 0; flex-wrap: wrap;">
        <div class="add-section">
            <input type="email" id="newEmailInput" placeholder="单个邮箱添加 ...">
            <button id="addAccountBtn" class="primary">➕ 添加</button>
            <label for="txtImportInput" class="btn-outline file-import" style="cursor:pointer;">📄 从TXT导入</label>
            <input type="file" id="txtImportInput" accept=".txt" style="display:none">
            <span style="font-size:0.6rem; color:#6c86a3;">✔️ TXT每行一个邮箱</span>
        </div>
    </div>

    <!-- 子账号管理模块（仅用户名和密码） -->
    <div class="subadmin-section">
        <h3>👥 子账号管理</h3>
        <div style="margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
            <input type="text" id="newSubUsername" placeholder="子账号用户名" style="padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.7rem;">
            <input type="text" id="newSubPassword" placeholder="初始密码" style="padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.7rem;">
            <button id="addSubAccountBtn" class="primary btn-sm">➕ 添加子账号</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="subadmin-table" id="subAdminTable">
                <thead><tr><th>用户名</th><th>密码</th><th>操作</th></tr></thead>
                <tbody id="subAdminTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="table-container">
        <table class="modern-table" id="accountTable">
            <thead><tr><th style="width:30px;"><input type="checkbox" id="selectAllCheckbox"></th><th>邮箱地址</th><th>团队状态</th><th>Adobe正版</th><th>订阅起始</th><th>到期时间</th><th>所属团队</th><th style="width:40px;"></th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" style="text-align:center; padding:40px;">⏳ 加载中...</td></tr></tbody>
        </table>
    </div>
    <div class="footer-note">
        <span>⚡ 数据实时同步至云端</span>
        <span id="currentTeamDisplay">🏷️ 主团队: 加载中...</span>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div>⏳ 处理中...</div></div>
</div>

<script>
    // ================== 主密码验证 ==================
    const ENCODED_PASSWORD = "cWJ4MTIxNjQ4MTE="; // qbx12164811
    const ADMIN_PASSWORD = atob(ENCODED_PASSWORD);
    const loginOverlay = document.getElementById('loginOverlay');
    const mainContent = document.getElementById('mainContent');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('adminPasswordInput');
    const loginError = document.getElementById('loginError');

    function showLogin() { loginOverlay.style.display = 'flex'; mainContent.style.display = 'none'; }
    function hideLogin() { loginOverlay.style.display = 'none'; mainContent.style.display = 'block'; }
    loginBtn.addEventListener('click', () => {
        if (passwordInput.value === ADMIN_PASSWORD) { hideLogin(); initApp(); }
        else loginError.textContent = '密码错误，请重试';
    });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });

    // ================== Airtable 配置 ==================
    const AIRTABLE_TOKEN = "patlLxSFx112EGSkC.eb05637ecfaa9c618deb159bbb5ce78c82680898975ed3cd6da73e72f316c586";
    const BASE_ID = "appKUCGZCrZIH51dG";
    const TABLE_NAME = "accounts";
    const ADMINS_TABLE = "admins";

    let accounts = [];
    let subAdmins = [];
    let currentTeam = "Art Grid Dynamics Garcia Miami";
    const TEAM_KEY = "MainTeamName";
    let dateSyncTimeout = null;

    // 日期工具函数（省略，与原代码相同）
    function parseToStandardDate(input) { /* 与原相同 */ }
    function isValidDateString(dateStr) { return parseToStandardDate(dateStr) !== null; }
    function addOneYearToDateStr(dateStr) { /* 与原相同 */ }
    function todayStandard() { /* 与原相同 */ }
    function getDefaultSubscription() { /* 与原相同 */ }
    function daysRemaining(endDateStr) { /* 与原相同 */ }
    // 因篇幅，这里只保留函数签名，实际运行时需补全（原代码已有）
    // 为节省空间，省略具体实现，请确保原代码中的日期函数已完整复制。

    // 为了代码可运行，此处给出简化版本（实际使用请用原完整函数）
    function parseToStandardDate(input) { if(!input) return null; let d=new Date(input); if(isNaN(d)) return null; return d.toISOString().slice(0,10); }
    function addOneYearToDateStr(dateStr) { let d=new Date(dateStr); d.setFullYear(d.getFullYear()+1); return d.toISOString().slice(0,10); }
    function todayStandard() { return new Date().toISOString().slice(0,10); }
    function getDefaultSubscription() { let s=todayStandard(); return { subscriptionStart:s, subscriptionEnd:addOneYearToDateStr(s) }; }
    function daysRemaining(endDateStr) { let d=new Date(endDateStr); let today=new Date(); return Math.ceil((d-today)/(1000*3600*24)); }

    // Airtable 操作
    async function fetchAllRecords(table) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${table}`;
        let allRecords = [];
        let offset = null;
        do {
            let fetchUrl = url;
            if (offset) fetchUrl += `?offset=${offset}`;
            const resp = await fetch(fetchUrl, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            allRecords = allRecords.concat(data.records);
            offset = data.offset;
        } while (offset);
        return allRecords;
    }

    async function loadFromCloud() {
        try {
            const records = await fetchAllRecords(TABLE_NAME);
            accounts = records.map(rec => ({
                id: rec.id,
                email: rec.fields.Email,
                joinedTeam: rec.fields.joinedTeam === true,
                isGenuine: rec.fields.isGenuine === true,
                subscriptionStart: rec.fields.subscriptionStart || getDefaultSubscription().subscriptionStart,
                subscriptionEnd: rec.fields.subscriptionEnd || getDefaultSubscription().subscriptionEnd,
                teamName: rec.fields.teamName || currentTeam
            }));
            for (let acc of accounts) {
                if (!isValidDateString(acc.subscriptionStart)) acc.subscriptionStart = getDefaultSubscription().subscriptionStart;
                if (!isValidDateString(acc.subscriptionEnd)) acc.subscriptionEnd = addOneYearToDateStr(acc.subscriptionStart);
                if (!acc.teamName) acc.teamName = currentTeam;
            }
            renderTable();
        } catch(e) { console.error(e); showToast("加载云端数据失败"); }
    }

    async function updateSingleRecord(account, showSuccessToast = true) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${account.id}`;
        const resp = await fetch(url, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fields: {
                    Email: account.email,
                    joinedTeam: account.joinedTeam,
                    isGenuine: account.isGenuine,
                    subscriptionStart: account.subscriptionStart,
                    subscriptionEnd: account.subscriptionEnd,
                    teamName: account.teamName
                }
            })
        });
        if (!resp.ok) throw new Error(`更新失败 ${resp.status}`);
        if (showSuccessToast) showToast("已保存");
        return await resp.json();
    }

    async function createRecord(fields) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`;
        const resp = await fetch(url, {
            method: 'POST',
            headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields })
        });
        if (!resp.ok) throw new Error(`创建失败 ${resp.status}`);
        return await resp.json();
    }

    async function deleteRecord(recordId) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`;
        const resp = await fetch(url, { method: 'DELETE', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
        if (!resp.ok) throw new Error(`删除失败 ${resp.status}`);
    }

    async function batchUpdateRecords(accountsToUpdate) {
        const batchSize = 5;
        for (let i = 0; i < accountsToUpdate.length; i += batchSize) {
            const batch = accountsToUpdate.slice(i, i + batchSize);
            await Promise.all(batch.map(acc => updateSingleRecord(acc, false)));
        }
    }

    // ================== 子账号管理（优化：本地更新，减少网络请求） ==================
    async function loadSubAdmins() {
        try {
            const records = await fetchAllRecords(ADMINS_TABLE);
            subAdmins = records.map(rec => ({ id: rec.id, username: rec.fields.username, password: rec.fields.password }));
            renderSubAdminTable();
        } catch(e) { console.error(e); }
    }

    async function createSubAdmin(username, password) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}`;
        const resp = await fetch(url, {
            method: 'POST',
            headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { username, password, role: 'sub', teamName: "" } })
        });
        if (!resp.ok) throw new Error();
        const newRecord = await resp.json();
        const newSub = { id: newRecord.id, username: newRecord.fields.username, password: newRecord.fields.password };
        subAdmins.push(newSub);
        renderSubAdminTable();  // 仅重新渲染表格（已包含新记录）
        showToast(`子账号 ${username} 添加成功`);
        return newSub;
    }

    async function updateSubAdminPassword(recordId, newPassword) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${recordId}`;
        const resp = await fetch(url, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { password: newPassword } })
        });
        if (!resp.ok) throw new Error();
        // 更新本地数组
        const sub = subAdmins.find(s => s.id === recordId);
        if (sub) sub.password = newPassword;
        renderSubAdminTable();
        showToast("密码已更新");
    }

    async function deleteSubAdmin(recordId) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${recordId}`;
        const resp = await fetch(url, { method: 'DELETE', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
        if (!resp.ok) throw new Error();
        subAdmins = subAdmins.filter(s => s.id !== recordId);
        renderSubAdminTable();
        showToast("子账号已删除");
    }

    function renderSubAdminTable() {
        const tbody = document.getElementById('subAdminTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        for (let sub of subAdmins) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHtml(sub.username)}</td>
                <td><input type="text" value="${escapeHtml(sub.password)}" data-id="${sub.id}" class="sub-password-input" style="width:100px;"></td>
                <td><button class="btn-sm update-pwd-btn" data-id="${sub.id}">更新密码</button> <button class="btn-sm delete-sub-btn" data-id="${sub.id}">删除</button></td>
            `;
            tbody.appendChild(tr);
        }
        // 绑定事件
        document.querySelectorAll('.update-pwd-btn').forEach(btn => {
            btn.removeEventListener('click', handleUpdatePwd);
            btn.addEventListener('click', handleUpdatePwd);
        });
        document.querySelectorAll('.delete-sub-btn').forEach(btn => {
            btn.removeEventListener('click', handleDeleteSub);
            btn.addEventListener('click', handleDeleteSub);
        });
    }

    async function handleUpdatePwd(e) {
        const btn = e.currentTarget;
        const id = btn.dataset.id;
        const input = document.querySelector(`.sub-password-input[data-id="${id}"]`);
        if (input) {
            await updateSubAdminPassword(id, input.value);
        }
    }

    async function handleDeleteSub(e) {
        const btn = e.currentTarget;
        if (confirm('确定删除该子账号？')) {
            await deleteSubAdmin(btn.dataset.id);
        }
    }

    // 团队名称管理（与原相同）
    function saveTeamToLocal() { localStorage.setItem(TEAM_KEY, currentTeam); }
    function loadTeamFromLocal() {
        const saved = localStorage.getItem(TEAM_KEY);
        if (saved && saved.trim()) currentTeam = saved;
        else currentTeam = "Art Grid Dynamics Garcia Miami";
        document.getElementById('teamNameInput').value = currentTeam;
        updateTeamDisplay();
    }
    function updateTeamDisplay() {
        const span = document.getElementById('currentTeamDisplay');
        if (span) span.innerText = `🏷️ 主团队: ${currentTeam}`;
    }
    function setNewTeam(newTeam) {
        if (!newTeam.trim()) { showToast("团队名称不能为空"); return false; }
        currentTeam = newTeam.trim();
        saveTeamToLocal();
        updateTeamDisplay();
        showToast(`主团队已更改为: ${currentTeam}`);
        return true;
    }

    // 绑定事件（需保留原客户管理的事件）
    function bindEvents() {
        const tbody = document.getElementById('tableBody');
        tbody?.addEventListener('change', async (e) => {
            if (e.target.classList.contains('team-checkbox')) {
                const idx = parseInt(e.target.dataset.index);
                if (!isNaN(idx) && accounts[idx]) {
                    accounts[idx].joinedTeam = e.target.checked;
                    renderTable();
                    showToast("保存中...");
                    try {
                        await updateSingleRecord(accounts[idx], false);
                        showToast("团队状态已同步");
                    } catch(err) { showToast("同步失败"); }
                }
            }
            if (e.target.classList.contains('genuine-checkbox')) {
                const idx = parseInt(e.target.dataset.index);
                if (!isNaN(idx) && accounts[idx]) {
                    accounts[idx].isGenuine = e.target.checked;
                    renderTable();
                    showToast("保存中...");
                    try {
                        await updateSingleRecord(accounts[idx], false);
                        showToast("正版状态已同步");
                    } catch(err) { showToast("同步失败"); }
                }
            }
        });
        tbody?.addEventListener('blur', handleDateChange, true);
        tbody?.addEventListener('click', (e) => { if (e.target.classList.contains('delete-icon')) deleteAccountByIndex(parseInt(e.target.dataset.index)); });
        document.getElementById('selectAllCheckbox')?.addEventListener('change', (e) => document.querySelectorAll('.row-selector').forEach(cb => cb.checked = e.target.checked));
        document.getElementById('batchJoinTeam')?.addEventListener('click', () => batchUpdate('joinedTeam', true));
        document.getElementById('batchLeaveTeam')?.addEventListener('click', () => batchUpdate('joinedTeam', false));
        document.getElementById('batchSetGenuine')?.addEventListener('click', () => batchUpdate('isGenuine', true));
        document.getElementById('batchRemoveGenuine')?.addEventListener('click', () => batchUpdate('isGenuine', false));
        document.getElementById('deleteSelectedBtn')?.addEventListener('click', deleteSelected);
        document.getElementById('addAccountBtn')?.addEventListener('click', () => { const inp = document.getElementById('newEmailInput'); if (inp.value && addAccount(inp.value)) inp.value = ''; });
        document.getElementById('resetDefaultBtn')?.addEventListener('click', resetToDefault);
        document.getElementById('exportJsonBtn')?.addEventListener('click', exportToJson);
        document.getElementById('refreshFromCloud')?.addEventListener('click', async () => { showToast("刷新中..."); await loadFromCloud(); showToast("刷新完成"); });
        document.getElementById('updateTeamBtn')?.addEventListener('click', () => { const newTeam = document.getElementById('teamNameInput').value; setNewTeam(newTeam); renderTable(); });
        const importJson = document.getElementById('importJsonInput'); importJson?.addEventListener('change', (e) => { if (e.target.files[0]) importFromJson(e.target.files[0]); importJson.value = ''; });
        const txtImport = document.getElementById('txtImportInput');
        txtImport?.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                const autoJoin = confirm('是否将导入的所有账号自动加入当前团队？\n点击“确定”则自动加入，点击“取消”仅添加账号不加入团队。');
                importFromTxt(e.target.files[0], autoJoin);
            }
            txtImport.value = '';
        });
        document.getElementById('newEmailInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const inp = e.target; if (inp.value && addAccount(inp.value)) inp.value = ''; } });
        // 子账号添加按钮事件
        document.getElementById('addSubAccountBtn')?.addEventListener('click', async () => {
            const username = document.getElementById('newSubUsername').value.trim();
            const password = document.getElementById('newSubPassword').value.trim();
            if (!username || !password) { showToast("用户名和密码都不能为空"); return; }
            await createSubAdmin(username, password);
            document.getElementById('newSubUsername').value = '';
            document.getElementById('newSubPassword').value = '';
        });
    }

    async function initApp() {
        loadTeamFromLocal();
        await loadFromCloud();
        await loadSubAdmins();
        bindEvents();
    }

    showLogin();
