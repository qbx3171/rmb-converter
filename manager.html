<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Adobe 团队管家 · 主管理员（实时日志版）</title>
    <style>
        /* 样式代码与之前相同，省略以节省篇幅，请使用上一轮完整样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: radial-gradient(circle at 10% 20%, rgba(15,35,55,0.05) 0%, rgba(10,25,40,0.08) 100%); padding: 20px; }
        .glass-panel { max-width: 1600px; margin: 0 auto; background: rgba(255,255,255,0.97); border-radius: 1.8rem; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #0a2b3c 0%, #1b5a6e 100%); padding: 1rem; color: white; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .stats-grid { display: flex; gap: 8px; padding: 0.8rem 1rem; background: #f9fbfd; flex-wrap: wrap; }
        .stat-item { background: white; border-radius: 30px; padding: 0.2rem 0.8rem; font-size: 0.7rem; }
        .action-bar { padding: 0.6rem 1rem; background: white; border-bottom: 1px solid #eef2f8; display: flex; flex-wrap: wrap; gap: 8px; }
        button { background: #f1f5f9; border: none; padding: 5px 10px; border-radius: 30px; cursor: pointer; font-size: 0.7rem; }
        button.primary { background: #1b6b5e; color: white; }
        .table-container { overflow-x: auto; }
        .modern-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .modern-table th, .modern-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid #eef2f8; text-align: left; }
        .logs-section { margin: 1rem; padding: 1rem; background: #fefce8; border-radius: 1rem; }
        .log-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .log-table th, .log-table td { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; }
        .scroll-logs { max-height: 280px; overflow-y: auto; }
        .toast-message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a36e6; color: white; padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; z-index: 1000; }
        .login-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-card { background: white; border-radius: 1.5rem; padding: 1.5rem; width: 280px; text-align: center; }
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; color: white; z-index: 2000; }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 主管理员登录</h2>
        <input type="password" id="adminPasswordInput" placeholder="密码">
        <button id="loginBtn">登录</button>
        <div id="loginError" style="color:red; font-size:0.7rem;"></div>
    </div>
</div>
<div id="mainContent" style="display: none;">
<div class="glass-panel">
    <div class="hero">
        <div><h1>📋 Adobe 团队管家 · 主管理员</h1><p>实时日志 · 自动刷新</p></div>
        <div><input type="text" id="teamNameInput" placeholder="团队名称"><button id="updateTeamBtn">更改</button></div>
    </div>
    <div class="stats-grid">
        <div class="stat-item">📬 总账号 <span id="totalAccounts">0</span></div>
        <div class="stat-item">✅ 已加入团队 <span id="joinedTeamCount">0</span></div>
        <div class="stat-item">⭐ 正版客户 <span id="genuineCount">0</span></div>
        <div class="stat-item">⏳ 即将过期 <span id="expiringCount">0</span></div>
    </div>
    <div class="action-bar">
        <div><button id="batchJoinTeam">批量加入</button><button id="batchLeaveTeam">批量移出</button><button id="batchSetGenuine">批量正版</button><button id="batchRemoveGenuine">取消正版</button><button id="deleteSelectedBtn">删除选中</button></div>
        <div><button id="refreshFromCloud">强制刷新</button><button id="exportJsonBtn">导出JSON</button><button id="resetDefaultBtn">重置</button></div>
    </div>
    <div class="action-bar">
        <input type="email" id="newEmailInput" placeholder="邮箱"><button id="addAccountBtn">添加</button>
        <label><input type="file" id="txtImportInput" accept=".txt" style="display:none"><button onclick="document.getElementById('txtImportInput').click()">从TXT导入</button></label>
    </div>
    <div class="subadmin-section" style="margin:1rem; padding:1rem; background:#f8fafc; border-radius:1rem;">
        <h3>👥 子账号管理</h3>
        <input type="text" id="newSubUsername" placeholder="用户名"><input type="text" id="newSubPassword" placeholder="密码"><button id="addSubAccountBtn">添加子账号</button>
        <table class="subadmin-table" style="width:100%; margin-top:8px;"><thead><tr><th>用户名</th><th>密码</th><th>操作</th></tr></thead><tbody id="subAdminTableBody"></tbody></table>
    </div>
    <div class="logs-section">
        <h3>📜 操作日志 <button id="refreshLogsBtn">手动刷新</button> <span id="logStatus">☁️ 云端同步</span> <span style="font-size:0.6rem;">自动刷新(20s)</span></h3>
        <div class="scroll-logs"><table class="log-table"><thead><tr><th>时间</th><th>操作</th><th>目标</th><th>详情</th></tr></thead><tbody id="logsTableBody"><tr><td colspan="4">加载中...</td></tr></tbody></table></div>
    </div>
    <div class="table-container"><table class="modern-table"><thead><tr><th><input type="checkbox" id="selectAllCheckbox"></th><th>邮箱</th><th>团队状态</th><th>正版</th><th>订阅起始</th><th>到期时间</th><th>所属团队</th><th></th></tr></thead><tbody id="tableBody"><tr><td colspan="8">加载缓存数据...</td></tr></tbody></table></div>
    <div class="footer-note"><span>⚡ 缓存优先 · 所有操作均记录日志</span><span id="currentTeamDisplay"></span></div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div>⏳ 处理中...</div></div>
</div>

<script>
    (function(){
        // ---------- 配置 ----------
        const ADMIN_PASSWORD = atob("cWJ4MTIxNjQ4MTE=");
        const AIRTABLE_TOKEN = "patlLxSFx112EGSkC.eb05637ecfaa9c618deb159bbb5ce78c82680898975ed3cd6da73e72f316c586";
        const BASE_ID = "appKUCGZCrZIH51dG";
        const TABLE_NAME = "accounts";
        const ADMINS_TABLE = "admins";
        const LOGS_TABLE = "logs";
        const CACHE_KEYS = { accounts: 'adobe_acc_cache', subAdmins: 'adobe_sub_cache', logs: 'adobe_logs_cache', team: 'adobe_team_name' };
        
        let accounts = [], subAdmins = [], operationLogs = [];
        let currentTeam = "Art Grid Dynamics Garcia Miami";
        let logsCloudAvailable = true;
        let autoRefreshTimer = null;

        // 辅助函数
        function showToast(msg) { let t=document.createElement('div'); t.className='toast-message'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
        function escapeHtml(s) { return s? s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])):''; }
        function todayStandard() { let d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function getDefaultSubscription() { let s=todayStandard(); let end=new Date(); end.setFullYear(end.getFullYear()+1); return { subscriptionStart: s, subscriptionEnd: `${end.getFullYear()}-${String(end.getMonth()+1).padStart(2,'0')}-${String(end.getDate()).padStart(2,'0')}` }; }
        
        async function fetchAllRecords(table) {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${table}?pageSize=100`;
            let all=[], offset=null;
            try {
                do {
                    let resp = await fetch(url+(offset?`&offset=${offset}`:''), { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
                    if(!resp.ok) throw new Error();
                    let data = await resp.json();
                    all = all.concat(data.records);
                    offset = data.offset;
                } while(offset);
                return all;
            } catch(e) { throw e; }
        }
        
        // 日志写入（同时写本地缓存和云端）
        async function addOperationLog(operation, targetUsername, extraInfo='') {
            const timestamp = new Date().toISOString();
            const operator = '主管理员';
            // 立即更新本地
            let localLogs = JSON.parse(localStorage.getItem(CACHE_KEYS.logs) || '[]');
            localLogs.unshift({ operation, targetUsername, extraInfo, timestamp, operator, id: Date.now() });
            if(localLogs.length>200) localLogs = localLogs.slice(0,200);
            localStorage.setItem(CACHE_KEYS.logs, JSON.stringify(localLogs));
            operationLogs = localLogs;
            renderLogsTable();
            // 后台同步云端
            try {
                await fetch(`https://api.airtable.com/v0/${BASE_ID}/${LOGS_TABLE}`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type':'application/json' },
                    body: JSON.stringify({ fields: { operation, targetUsername, extraInfo, timestamp, operator } })
                });
            } catch(e) { console.warn("云端日志写入失败", e); logsCloudAvailable=false; document.getElementById('logStatus').innerHTML='💾 本地模式'; }
        }
        
        async function refreshLogsFromCloud() {
            try {
                let records = await fetchAllRecords(LOGS_TABLE);
                let logs = records.map(rec=>{
                    let f=rec.fields;
                    return {
                        operation: f.operation || f.Operation || '',
                        targetUsername: f.targetUsername || f.TargetUsername || '',
                        extraInfo: f.extraInfo || f.ExtraInfo || '',
                        timestamp: f.timestamp || f.Timestamp || '',
                        operator: f.operator || f.Operator || '未知'
                    };
                }).sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
                if(logs.length) {
                    operationLogs = logs;
                    localStorage.setItem(CACHE_KEYS.logs, JSON.stringify(logs));
                    renderLogsTable();
                    document.getElementById('logStatus').innerHTML='☁️ 云端同步';
                    logsCloudAvailable=true;
                }
            } catch(e) { console.warn("云端拉取日志失败", e); }
        }
        
        function renderLogsTable() {
            let tbody=document.getElementById('logsTableBody');
            if(!tbody) return;
            if(!operationLogs.length) { tbody.innerHTML='<tr><td colspan="4">暂无操作日志</td></tr>'; return; }
            let html='';
            for(let log of operationLogs.slice(0,50)) {
                let time = log.timestamp ? new Date(log.timestamp).toLocaleString('zh-CN') : '未知';
                html+=`<tr><td class="log-time">${escapeHtml(time)}</td><td>${escapeHtml(log.operation)}</td><td>${escapeHtml(log.targetUsername)}</td><td>${escapeHtml(log.extraInfo||'—')}</td></tr>`;
            }
            tbody.innerHTML=html;
        }
        
        // 账号表格渲染（简化版，保留核心功能）
        function renderAccountTable() {
            let tbody=document.getElementById('tableBody');
            if(!tbody) return;
            if(!accounts.length) { tbody.innerHTML='<tr><td colspan="8">暂无账号</td></tr>'; updateStats(); return; }
            let html='';
            accounts.forEach((acc,idx)=>{
                let teamStatus = acc.joinedTeam ? `已加入 ${currentTeam}` : '未加入';
                let genuineStatus = acc.isGenuine ? '✅ 正版' : '⭕ 未认证';
                html+=`<tr>
                    <td><input type="checkbox" class="row-selector" data-index="${idx}"></td>
                    <td>${escapeHtml(acc.email)}</td>
                    <td><label><input type="checkbox" class="team-checkbox" data-index="${idx}" ${acc.joinedTeam?'checked':''}> ${teamStatus}</label></td>
                    <td><label><input type="checkbox" class="genuine-checkbox" data-index="${idx}" ${acc.isGenuine?'checked':''}> ${genuineStatus}</label></td>
                    <td><input type="text" class="date-input" data-index="${idx}" data-field="subscriptionStart" value="${acc.subscriptionStart||''}" placeholder="YYYY-MM-DD"></td>
                    <td><input type="text" class="date-input" data-index="${idx}" data-field="subscriptionEnd" value="${acc.subscriptionEnd||''}" placeholder="YYYY-MM-DD"></td>
                    <td>${escapeHtml(acc.teamName||currentTeam)}</td>
                    <td><button class="delete-icon" data-index="${idx}">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML=html;
            updateStats();
            // 绑定事件（略，完整版中已实现）
        }
        function renderSubAdminTable() { /* 类似，略 */ }
        function updateStats() {
            document.getElementById('totalAccounts').innerText=accounts.length;
            document.getElementById('joinedTeamCount').innerText=accounts.filter(a=>a.joinedTeam).length;
            document.getElementById('genuineCount').innerText=accounts.filter(a=>a.isGenuine).length;
            document.getElementById('expiringCount').innerText=accounts.filter(a=>{ let e=parseToStandardDate(a.subscriptionEnd); if(!e) return false; let days=Math.ceil((new Date(e)-new Date())/86400000); return days<=30; }).length;
        }
        function parseToStandardDate(s){ if(!s) return null; let d=new Date(s); if(isNaN(d)) return null; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        
        // 数据加载（缓存优先）
        async function loadCachedData() {
            let cachedAcc = localStorage.getItem(CACHE_KEYS.accounts);
            let cachedSub = localStorage.getItem(CACHE_KEYS.subAdmins);
            let cachedTeam = localStorage.getItem(CACHE_KEYS.team);
            if(cachedTeam) currentTeam = cachedTeam;
            document.getElementById('teamNameInput').value = currentTeam;
            document.getElementById('currentTeamDisplay').innerText = `🏷️ 主团队: ${currentTeam}`;
            if(cachedAcc) { accounts = JSON.parse(cachedAcc); renderAccountTable(); }
            if(cachedSub) { subAdmins = JSON.parse(cachedSub); renderSubAdminTable(); }
            let localLogs = localStorage.getItem(CACHE_KEYS.logs);
            if(localLogs) { operationLogs = JSON.parse(localLogs); renderLogsTable(); }
        }
        async function syncFromCloud() {
            try {
                let [accRecords, subRecords] = await Promise.all([fetchAllRecords(TABLE_NAME), fetchAllRecords(ADMINS_TABLE)]);
                accounts = accRecords.map(r=>({ id:r.id, email:r.fields.Email, joinedTeam:!!r.fields.joinedTeam, isGenuine:!!r.fields.isGenuine, subscriptionStart:r.fields.subscriptionStart||getDefaultSubscription().subscriptionStart, subscriptionEnd:r.fields.subscriptionEnd||getDefaultSubscription().subscriptionEnd, teamName:r.fields.teamName||currentTeam }));
                subAdmins = subRecords.map(r=>({ id:r.id, username:r.fields.username, password:r.fields.password }));
                localStorage.setItem(CACHE_KEYS.accounts, JSON.stringify(accounts));
                localStorage.setItem(CACHE_KEYS.subAdmins, JSON.stringify(subAdmins));
                renderAccountTable(); renderSubAdminTable();
                await refreshLogsFromCloud();
                showToast("数据已同步");
            } catch(e) { console.error(e); showToast("同步失败"); }
        }
        
        // 操作日志封装（主管理员自身操作）
        async function logAndExecute(operation, target, extra, action) {
            await action();
            await addOperationLog(operation, target, extra);
        }
        
        // 批量操作示例
        function getSelectedIndices() { return Array.from(document.querySelectorAll('.row-selector:checked')).map(cb=>parseInt(cb.dataset.index)).filter(i=>!isNaN(i) && accounts[i]); }
        async function batchUpdate(prop, val, opName) {
            let indices = getSelectedIndices();
            if(!indices.length) { showToast("请勾选账号"); return; }
            for(let i of indices) accounts[i][prop] = val;
            renderAccountTable();
            let toUpdate = indices.map(i=>accounts[i]);
            try { await Promise.all(toUpdate.map(acc=>updateSingleRecord(acc))); await addOperationLog(opName, `共${indices.length}个账号`, val?'已设置':'已取消'); showToast("更新成功"); } catch(e){ showToast("同步失败"); }
        }
        async function updateSingleRecord(acc) { if(!acc.id || acc.id.startsWith('temp')) return; let url=`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${acc.id}`; await fetch(url, { method:'PATCH', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`, 'Content-Type':'application/json' }, body: JSON.stringify({ fields:{ Email:acc.email, joinedTeam:acc.joinedTeam, isGenuine:acc.isGenuine, subscriptionStart:acc.subscriptionStart, subscriptionEnd:acc.subscriptionEnd, teamName:acc.teamName } }) }); }
        async function deleteSelected() {
            let indices = getSelectedIndices();
            if(!indices.length) return;
            if(!confirm(`删除${indices.length}个账号？`)) return;
            let toDelete = indices.map(i=>accounts[i]);
            accounts = accounts.filter((_,idx)=>!indices.includes(idx));
            renderAccountTable();
            try { await Promise.all(toDelete.map(acc=>{ if(!acc.id.startsWith('temp')) return fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${acc.id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}` } }); })); await addOperationLog('🗑️ 批量删除普通账号', `共${toDelete.length}个`, toDelete.map(a=>a.email).join(', ')); showToast("已删除"); } catch(e){ showToast("删除失败"); }
        }
        
        // 子账号管理操作（已包含日志）
        async function optimisticAddSubAdmin(username, password) {
            if(!username.trim()||!password.trim()) { showToast("用户名/密码不能为空"); return; }
            let tempId = `temp_${Date.now()}`;
            let newSub = { id:tempId, username, password, syncing:true };
            subAdmins.push(newSub); renderSubAdminTable();
            try {
                let resp = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}`, { method:'POST', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`, 'Content-Type':'application/json' }, body: JSON.stringify({ fields:{ username, password, role:'sub' } }) });
                if(!resp.ok) throw new Error();
                let created = await resp.json();
                let idx = subAdmins.findIndex(s=>s.id===tempId);
                if(idx!==-1) subAdmins[idx] = { id:created.id, username:created.fields.username, password:created.fields.password, syncing:false };
                renderSubAdminTable();
                await addOperationLog('➕ 添加子账号', username, `初始密码: ${password}`);
                showToast("子账号添加成功");
            } catch(e) { subAdmins = subAdmins.filter(s=>s.id!==tempId); renderSubAdminTable(); showToast("添加失败"); }
        }
        // 其他子账号操作类似...
        
        function bindEvents() {
            document.getElementById('batchJoinTeam')?.addEventListener('click',()=>batchUpdate('joinedTeam',true,'批量加入团队'));
            document.getElementById('batchLeaveTeam')?.addEventListener('click',()=>batchUpdate('joinedTeam',false,'批量移出团队'));
            document.getElementById('batchSetGenuine')?.addEventListener('click',()=>batchUpdate('isGenuine',true,'批量标记正版'));
            document.getElementById('batchRemoveGenuine')?.addEventListener('click',()=>batchUpdate('isGenuine',false,'批量取消正版'));
            document.getElementById('deleteSelectedBtn')?.addEventListener('click',deleteSelected);
            document.getElementById('addAccountBtn')?.addEventListener('click', async()=>{
                let email = document.getElementById('newEmailInput').value.trim();
                if(!email || !/^\S+@\S+\.\S+$/.test(email)) { showToast("邮箱无效"); return; }
                if(accounts.some(a=>a.email.toLowerCase()===email.toLowerCase())) { showToast("邮箱已存在"); return; }
                let sub = getDefaultSubscription();
                let tempId = `temp_${Date.now()}`;
                let newAcc = { id:tempId, email, joinedTeam:false, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam };
                accounts.push(newAcc); renderAccountTable();
                try {
                    let created = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`, { method:'POST', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`, 'Content-Type':'application/json' }, body: JSON.stringify({ fields:{ Email:email, joinedTeam:false, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam } }) }).then(r=>r.json());
                    let idx = accounts.findIndex(a=>a.id===tempId);
                    if(idx!==-1) accounts[idx] = { id:created.id, email, joinedTeam:false, isGenuine:false, subscriptionStart:created.fields.subscriptionStart, subscriptionEnd:created.fields.subscriptionEnd, teamName:currentTeam };
                    renderAccountTable();
                    await addOperationLog('➕ 添加普通账号', email, `操作人：主管理员`);
                    showToast("添加成功");
                } catch(e) { accounts = accounts.filter(a=>a.id!==tempId); renderAccountTable(); showToast("添加失败"); }
                document.getElementById('newEmailInput').value='';
            });
            document.getElementById('refreshFromCloud')?.addEventListener('click', async()=>{ await syncFromCloud(); });
            document.getElementById('refreshLogsBtn')?.addEventListener('click', async()=>{ await refreshLogsFromCloud(); showToast("日志已刷新"); });
            document.getElementById('addSubAccountBtn')?.addEventListener('click',()=>{
                let u=document.getElementById('newSubUsername').value, p=document.getElementById('newSubPassword').value;
                if(u&&p) optimisticAddSubAdmin(u,p);
                else showToast("请填写用户名和密码");
                document.getElementById('newSubUsername').value=''; document.getElementById('newSubPassword').value='';
            });
            document.getElementById('updateTeamBtn')?.addEventListener('click',()=>{
                let newName=document.getElementById('teamNameInput').value.trim();
                if(newName) { currentTeam=newName; localStorage.setItem(CACHE_KEYS.team,currentTeam); document.getElementById('currentTeamDisplay').innerText=`🏷️ 主团队: ${currentTeam}`; renderAccountTable(); showToast("团队名称已更新"); }
            });
            // 自动刷新日志定时器
            if(autoRefreshTimer) clearInterval(autoRefreshTimer);
            autoRefreshTimer = setInterval(()=>{ refreshLogsFromCloud(); }, 20000);
        }
        
        async function initApp() {
            await loadCachedData();
            bindEvents();
            syncFromCloud(); // 后台静默同步
        }
        
        // 登录
        const loginOverlay=document.getElementById('loginOverlay'), mainContent=document.getElementById('mainContent');
        document.getElementById('loginBtn').addEventListener('click',()=>{
            if(document.getElementById('adminPasswordInput').value === ADMIN_PASSWORD) {
                loginOverlay.style.display='none'; mainContent.style.display='block';
                initApp();
            } else { document.getElementById('loginError').innerText='密码错误'; }
        });
        document.getElementById('adminPasswordInput').addEventListener('keypress',(e)=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
    })();
</script>
</body>
</html>
