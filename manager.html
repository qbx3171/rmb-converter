<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Adobe 团队管家 · 主管理员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 20%, rgba(15,35,55,0.05) 0%, rgba(10,25,40,0.08) 100%); padding: 20px 16px; min-height: 100vh; }
        .glass-panel { max-width: 1600px; margin: 0 auto; background: rgba(255,255,255,0.97); backdrop-filter: blur(2px); border-radius: 1.8rem; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #0a2b3c 0%, #1b5a6e 100%); padding: 1rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; color: white; }
        .hero-left h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .hero-left p { font-size: 0.6rem; opacity: 0.8; margin-top: 2px; }
        .team-edit-area { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); border-radius: 60px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .team-edit-area label { font-size: 0.7rem; font-weight: 500; }
        .team-input { background: rgba(255,255,240,0.9); border: none; border-radius: 40px; padding: 4px 10px; font-size: 0.7rem; color: #1e3a5f; min-width: 140px; }
        .update-team-btn { background: #ffd966; color: #2c3e2f; border: none; border-radius: 40px; padding: 3px 10px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }
        .stats-grid { display: flex; gap: 8px; padding: 0.8rem 1rem; background: #f9fbfd; border-bottom: 1px solid #e9eef3; flex-wrap: wrap; }
        .stat-item { background: white; border-radius: 30px; padding: 0.2rem 0.8rem; box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px #eef2f8; font-weight: 500; display: flex; align-items: baseline; gap: 5px; font-size: 0.7rem; }
        .stat-number { font-size: 1.2rem; font-weight: 800; color: #1f6e5c; line-height: 1; }
        .action-bar { padding: 0.6rem 1rem; background: white; border-bottom: 1px solid #eef2f8; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; }
        .btn-group, .sync-group { display: flex; flex-wrap: wrap; gap: 5px; }
        button, .btn-outline { background: #f1f5f9; border: none; padding: 5px 10px; border-radius: 30px; font-weight: 500; font-size: 0.7rem; cursor: pointer; transition: all 0.2s ease; color: #1e3a5f; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        button.primary { background: #1b6b5e; color: white; }
        button.accent { background: #2c5f8a; color: white; }
        button.warning { background: #fff1e5; color: #b45a2e; }
        button.danger { background: #ffe8e8; color: #c2412c; }
        button.success { background: #e0f2e9; color: #146b3a; }
        .add-section { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex: 1; }
        .add-section input { padding: 5px 10px; border-radius: 30px; border: 1px solid #cbdde9; background: white; min-width: 150px; font-size: 0.7rem; flex: 1; }
        .file-import { background: #eef2ff; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 0.5rem 0; }
        .modern-table { min-width: 800px; width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .modern-table th { text-align: left; padding: 0.6rem 0.4rem; background: #fefefe; font-weight: 600; color: #2c4c6c; border-bottom: 1px solid #e4e9f0; }
        .modern-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid #f0f3f9; vertical-align: middle; }
        .email-cell { font-family: monospace; font-weight: 500; word-break: break-all; max-width: 180px; }
        .date-input { padding: 4px 6px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.65rem; width: 100px; background: white; font-family: monospace; }
        .checkbox-smart { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .checkbox-smart input { width: 16px; height: 16px; accent-color: #1b6b5e; }
        .badge-team { background: #ddf3e8; color: #146b3a; border-radius: 30px; padding: 1px 6px; font-size: 0.6rem; font-weight: 600; margin-left: 4px; white-space: nowrap; }
        .delete-icon { background: none; border: none; font-size: 1rem; cursor: pointer; color: #9aaebf; padding: 2px 6px; border-radius: 30px; }
        .toast-message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a36e6; backdrop-filter: blur(12px); color: white; padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; z-index: 1000; pointer-events: none; white-space: nowrap; z-index: 10000; }
        .footer-note { padding: 0.6rem 1rem; background: #fafdff; border-top: 1px solid #eef2f8; font-size: 0.6rem; color: #6a7c8f; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; display: none; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 1.5rem; padding: 1.5rem 1.2rem; width: 280px; text-align: center; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.5); }
        .login-card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; color: #1e3a5f; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .login-card p { font-size: 0.7rem; color: #6c86a3; margin-bottom: 1rem; }
        .login-card input { width: 100%; padding: 8px 12px; margin: 0.5rem 0; border: 1px solid #cbdde9; border-radius: 40px; font-size: 0.85rem; background: white; outline: none; text-align: center; }
        .login-card input:focus { border-color: #1b6b5e; box-shadow: 0 0 0 2px rgba(27,107,94,0.2); }
        .login-card button { background: linear-gradient(135deg, #1b6b5e, #0f5348); color: white; border: none; padding: 8px 16px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .login-card .error { color: #c2412c; font-size: 0.65rem; margin-top: 0.5rem; }
        .subadmin-section { margin: 1rem; padding: 1rem; background: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .subadmin-section h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .subadmin-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .subadmin-table th, .subadmin-table td { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .subadmin-table input { padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; width: 100%; }
        .btn-sm { padding: 2px 8px; font-size: 0.6rem; }
        .logs-section { margin: 1rem; padding: 1rem; background: #fefce8; border-radius: 1rem; border: 1px solid #fde047; }
        .logs-section h3 { font-size: 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .log-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .log-table th, .log-table td { padding: 0.5rem 0.3rem; border-bottom: 1px solid #e2e8f0; text-align: left; vertical-align: top; }
        .log-table th { background: #fffbeb; font-weight: 600; color: #92400e; }
        .log-time { font-family: monospace; white-space: nowrap; }
        .log-extra { max-width: 180px; word-break: break-all; font-family: monospace; background: #f1f5f9; border-radius: 12px; padding: 2px 6px; display: inline-block; }
        .scroll-logs { max-height: 280px; overflow-y: auto; }
        .log-status-badge { background: #e6f7e6; color: #2e7d32; border-radius: 20px; padding: 2px 8px; font-size: 0.6rem; margin-left: 8px; font-weight: normal; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .hero-left h1 { font-size: 1rem; }
            .stat-item { font-size: 0.6rem; }
            .stat-number { font-size: 1rem; }
            button, .btn-outline { font-size: 0.65rem; padding: 4px 8px; }
            .add-section input { font-size: 0.65rem; min-width: 120px; }
            .date-input { width: 85px; }
            .modern-table th, .modern-table td { padding: 0.4rem 0.3rem; }
            .log-extra { max-width: 120px; }
        }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 主管理员登录</h2>
        <p>请输入管理密码</p>
        <input type="password" id="adminPasswordInput" placeholder="密码" autocomplete="off">
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
<div class="glass-panel">
    <div class="hero">
        <div class="hero-left">
            <h1>📋 Adobe 团队管家 · 主管理员</h1>
            <p>实时日志自动刷新 · 显示具体操作人</p>
        </div>
        <div class="team-edit-area">
            <label>🎯 主团队名称：</label>
            <input type="text" id="teamNameInput" class="team-input" placeholder="团队名称">
            <button id="updateTeamBtn" class="update-team-btn">更改</button>
        </div>
    </div>
    <div class="stats-grid">
        <div class="stat-item">📬 总账号 <span class="stat-number" id="totalAccounts">0</span></div>
        <div class="stat-item">✅ 已加入团队 <span class="stat-number" id="joinedTeamCount">0</span></div>
        <div class="stat-item">⭐ 正版客户 <span class="stat-number" id="genuineCount">0</span></div>
        <div class="stat-item">⏳ 即将过期 <span class="stat-number" id="expiringCount">0</span></div>
    </div>
    <div class="action-bar">
        <div class="btn-group">
            <button id="batchJoinTeam" class="primary">➕ 批量加入</button>
            <button id="batchLeaveTeam" class="warning">➖ 批量移出</button>
            <button id="batchSetGenuine" class="primary">⭐ 批量正版</button>
            <button id="batchRemoveGenuine" class="warning">🔄 取消正版</button>
            <button id="deleteSelectedBtn" class="danger">🗑️ 删除选中</button>
        </div>
        <div class="sync-group">
            <button id="refreshFromCloud" class="accent">🔄 刷新</button>
            <button id="exportJsonBtn" class="">💾 导出JSON</button>
            <label for="importJsonInput" class="btn-outline" style="cursor:pointer;">📂 导入JSON</label>
            <input type="file" id="importJsonInput" accept=".json" style="display:none">
            <button id="resetDefaultBtn" class="">⟳ 重置</button>
        </div>
    </div>
    <div class="action-bar" style="border-top: none; padding-top: 0; flex-wrap: wrap;">
        <div class="add-section">
            <input type="email" id="newEmailInput" placeholder="单个邮箱添加 ...">
            <button id="addAccountBtn" class="primary">➕ 添加</button>
            <label for="txtImportInput" class="btn-outline file-import" style="cursor:pointer;">📄 从TXT导入</label>
            <input type="file" id="txtImportInput" accept=".txt" style="display:none">
            <span style="font-size:0.6rem; color:#6c86a3;">✔️ TXT每行一个邮箱</span>
        </div>
    </div>

    <div class="subadmin-section">
        <h3>👥 子账号管理</h3>
        <div style="margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
            <input type="text" id="newSubUsername" placeholder="子账号用户名" style="padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.7rem;">
            <input type="text" id="newSubPassword" placeholder="初始密码" style="padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.7rem;">
            <button id="addSubAccountBtn" class="primary btn-sm">➕ 添加子账号</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="subadmin-table" id="subAdminTable">
                <thead><tr><th>用户名</th><th>密码</th><th>操作</th></thead>
                <tbody id="subAdminTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="logs-section">
        <h3>📜 子账号操作日志 <button id="refreshLogsBtn" class="btn-sm" style="background:#eef2ff;">🔄 刷新日志</button> <span id="logStorageHint" class="log-status-badge">☁️ 云端同步模式</span></h3>
        <div class="scroll-logs">
            <table class="log-table">
                <thead>
                    <tr>
                        <th>⏱️ 操作时间</th>
                        <th>🔧 操作类型</th>
                        <th>👤 目标子账号/邮箱</th>
                        <th>📝 详情</th>
                        <th>👥 操作人</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr><td colspan="5" style="text-align:center;">加载日志中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="table-container">
        <table class="modern-table" id="accountTable">
            <thead><tr><th style="width:30px;"><input type="checkbox" id="selectAllCheckbox"></th><th>邮箱地址</th><th>团队状态</th><th>Adobe正版</th><th>订阅起始</th><th>到期时间</th><th>所属团队</th><th style="width:40px;"></th>}</thead>
            <tbody id="tableBody"><tr><td colspan="8" style="text-align:center; padding:40px;">⏳ 加载中...</td></tr></tbody>
        </table>
    </div>
    <div class="footer-note">
        <span>⚡ 数据实时同步至云端 · 日志自动刷新 (15秒)</span>
        <span id="currentTeamDisplay">🏷️ 主团队: 加载中...</span>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div>⏳ 处理中...</div></div>
</div>

<script>
    (function(){
        // ================= 配置 =================
        const ENCODED_PASSWORD = "cWJ4MTIxNjQ4MTE="; // qbx12164811
        const ADMIN_PASSWORD = atob(ENCODED_PASSWORD);
        const AIRTABLE_TOKEN = "patlLxSFx112EGSkC.eb05637ecfaa9c618deb159bbb5ce78c82680898975ed3cd6da73e72f316c586";
        const BASE_ID = "appKUCGZCrZIH51dG";
        const TABLE_NAME = "accounts";
        const ADMINS_TABLE = "admins";
        const LOGS_TABLE = "logs";
        const TEAM_KEY = "MainTeamName";
        
        let accounts = [];
        let subAdmins = [];
        let operationLogs = [];
        let currentTeam = "Art Grid Dynamics Garcia Miami";
        let autoRefreshInterval = null;

        // 辅助函数
        function parseToStandardDate(input) {
            if (!input || typeof input !== 'string') return null;
            let str = input.trim();
            let parts = str.split(/[-/\.]/);
            if (parts.length === 3) {
                let year = parseInt(parts[0], 10);
                let month = parseInt(parts[1], 10) - 1;
                let day = parseInt(parts[2], 10);
                if (!isNaN(year) && !isNaN(month) && !isNaN(day)) {
                    let date = new Date(year, month, day);
                    if (date.getFullYear() === year && date.getMonth() === month && date.getDate() === day) return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                }
            }
            let d = new Date(str);
            if (!isNaN(d.getTime())) { let y = d.getFullYear(); let m = String(d.getMonth()+1).padStart(2,'0'); let day = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
            return null;
        }
        function isValidDateString(dateStr) { return parseToStandardDate(dateStr) !== null; }
        function addOneYearToDateStr(dateStr) {
            let std = parseToStandardDate(dateStr);
            if (!std) return "";
            let [year, month, day] = std.split('-').map(Number);
            let newDate = new Date(year, month-1, day);
            newDate.setFullYear(newDate.getFullYear() + 1);
            return `${newDate.getFullYear()}-${String(newDate.getMonth()+1).padStart(2,'0')}-${String(newDate.getDate()).padStart(2,'0')}`;
        }
        function todayStandard() { let d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function getDefaultSubscription() { let start = todayStandard(); return { subscriptionStart: start, subscriptionEnd: addOneYearToDateStr(start) }; }
        function daysRemaining(endDateStr) { let stdEnd = parseToStandardDate(endDateStr); if (!stdEnd) return Infinity; let today = new Date(); today.setHours(0,0,0,0); let end = new Date(stdEnd); if (isNaN(end.getTime())) return Infinity; return Math.ceil((end - today) / (1000*60*60*24)); }
        function showToast(msg, duration=2000) { let existing = document.querySelector('.toast-message'); if(existing) existing.remove(); let toast = document.createElement('div'); toast.className='toast-message'; toast.textContent=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(), duration); }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        async function fetchAllRecords(table) {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${table}?pageSize=100`;
            let all=[], offset=null;
            try {
                do {
                    let fetchUrl = url + (offset ? `&offset=${offset}` : '');
                    let resp = await fetch(fetchUrl, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
                    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    let data = await resp.json();
                    all = all.concat(data.records);
                    offset = data.offset;
                } while(offset);
                return all;
            } catch(e) { throw e; }
        }

        async function loadAccountsFromCloud() {
            let records = await fetchAllRecords(TABLE_NAME);
            accounts = records.map(rec => ({
                id: rec.id, email: rec.fields.Email,
                joinedTeam: rec.fields.joinedTeam === true,
                isGenuine: rec.fields.isGenuine === true,
                subscriptionStart: rec.fields.subscriptionStart || getDefaultSubscription().subscriptionStart,
                subscriptionEnd: rec.fields.subscriptionEnd || getDefaultSubscription().subscriptionEnd,
                teamName: rec.fields.teamName || currentTeam,
                syncing: false
            }));
            for(let acc of accounts) {
                if(!isValidDateString(acc.subscriptionStart)) acc.subscriptionStart = getDefaultSubscription().subscriptionStart;
                if(!isValidDateString(acc.subscriptionEnd)) acc.subscriptionEnd = addOneYearToDateStr(acc.subscriptionStart);
                if(!acc.teamName) acc.teamName = currentTeam;
            }
        }

        async function loadSubAdminsFromCloud() {
            let records = await fetchAllRecords(ADMINS_TABLE);
            subAdmins = records.map(rec => ({ id: rec.id, username: rec.fields.username, password: rec.fields.password, syncing: false }));
        }

        async function loadLogsFromCloud() {
            try {
                let records = await fetchAllRecords(LOGS_TABLE);
                operationLogs = records.map(rec => ({
                    id: rec.id,
                    operation: rec.fields.operation || '',
                    targetUsername: rec.fields.targetUsername || '',
                    extraInfo: rec.fields.extraInfo || '',
                    timestamp: rec.fields.timestamp || '',
                    operator: rec.fields.operator || 'admin'
                })).sort((a,b)=> (b.timestamp||'').localeCompare(a.timestamp||''));
                renderLogsTable();
                document.getElementById('logStorageHint').innerHTML = '☁️ 云端同步模式 (实时)';
                document.getElementById('logStorageHint').style.background = '#e3f2fd';
            } catch(e) {
                console.error("加载日志失败:", e);
                document.getElementById('logStorageHint').innerHTML = '⚠️ 日志表读取失败，请检查 logs 表是否存在且字段正确';
                document.getElementById('logStorageHint').style.background = '#ffebee';
                operationLogs = [];
                renderLogsTable(true);
            }
        }

        function renderLogsTable(errorState = false) {
            let tbody = document.getElementById('logsTableBody');
            if(!tbody) return;
            if(errorState) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#b91c1c;">⚠️ 无法读取日志表，请确保 logs 表包含字段: operation, targetUsername, extraInfo, timestamp, operator</td></tr>';
                return;
            }
            if(operationLogs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无操作日志，子管理员操作后会自动记录</td></tr>';
                return;
            }
            let html = '';
            for(let log of operationLogs.slice(0, 80)) {
                let time = log.timestamp ? new Date(log.timestamp).toLocaleString('zh-CN') : '未知';
                html += `<tr>
                    <td class="log-time">${escapeHtml(time)}</td>
                    <td>${escapeHtml(log.operation)}</td>
                    <td>${escapeHtml(log.targetUsername)}</td>
                    <td>${escapeHtml(log.extraInfo || '—')}</td>
                    <td>${escapeHtml(log.operator)}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        // 渲染账号表格
        function renderAccountTable() {
            let tbody = document.getElementById('tableBody');
            if(!tbody) return;
            if(!accounts.length) { tbody.innerHTML='<tr><td colspan="8" style="text-align:center;">暂无账号，请添加或导入</td></tr>'; updateStats(); return; }
            let html = '';
            accounts.forEach((acc, idx) => {
                let teamStatus = acc.joinedTeam ? `已加入 ${currentTeam}` : '未加入';
                let genuineStatus = acc.isGenuine ? '✅ 正版' : '⭕ 未认证';
                let teamBadge = (acc.joinedTeam && !acc.syncing) ? `<span class="badge-team">${currentTeam.length>10?currentTeam.slice(0,8)+'..':currentTeam}</span>` : '';
                html += `<tr>
                    <td><input type="checkbox" class="row-selector" data-index="${idx}"></td>
                    <td class="email-cell">${escapeHtml(acc.email)}</td>
                    <td><label class="checkbox-smart"><input type="checkbox" class="team-checkbox" data-index="${idx}" ${acc.joinedTeam?'checked':''}><span>${teamStatus}</span>${teamBadge}</label></td>
                    <td><label class="checkbox-smart"><input type="checkbox" class="genuine-checkbox" data-index="${idx}" ${acc.isGenuine?'checked':''}><span>${genuineStatus}</span></label></td>
                    <td><input type="text" class="date-input" data-index="${idx}" data-field="subscriptionStart" value="${acc.subscriptionStart||''}" placeholder="YYYY-MM-DD"></td>
                    <td><input type="text" class="date-input" data-index="${idx}" data-field="subscriptionEnd" value="${acc.subscriptionEnd||''}" placeholder="YYYY-MM-DD"></td>
                    <td>${escapeHtml(acc.teamName||currentTeam)}</td>
                    <td><button class="delete-icon" data-index="${idx}">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
            updateStats();
            // 重新绑定事件
            document.querySelectorAll('.team-checkbox, .genuine-checkbox').forEach(cb => cb.addEventListener('change', onCheckboxChange));
            document.querySelectorAll('.date-input').forEach(inp => inp.addEventListener('blur', onDateBlur));
            document.querySelectorAll('.delete-icon').forEach(btn => btn.addEventListener('click', onDeleteClick));
            let selectAll = document.getElementById('selectAllCheckbox');
            if(selectAll) selectAll.onchange = (e) => document.querySelectorAll('.row-selector').forEach(cb => cb.checked = e.target.checked);
        }

        function renderSubAdminTable() {
            let tbody = document.getElementById('subAdminTableBody');
            if(!tbody) return;
            let html = '';
            for(let sub of subAdmins) {
                html += `<tr>
                    <td>${escapeHtml(sub.username)}</td>
                    <td><input type="text" value="${escapeHtml(sub.password)}" data-id="${sub.id}" class="sub-password-input" style="width:100px;"></td>
                    <td><button class="btn-sm update-pwd-btn" data-id="${sub.id}" data-name="${escapeHtml(sub.username)}">更新密码</button> <button class="btn-sm delete-sub-btn" data-id="${sub.id}" data-name="${escapeHtml(sub.username)}">删除</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;
            document.querySelectorAll('.update-pwd-btn').forEach(btn => btn.addEventListener('click', handleUpdatePwd));
            document.querySelectorAll('.delete-sub-btn').forEach(btn => btn.addEventListener('click', handleDeleteSub));
        }

        function updateStats() {
            let joined = accounts.filter(a=>a.joinedTeam).length;
            let genuine = accounts.filter(a=>a.isGenuine).length;
            let expiring = accounts.filter(a=>daysRemaining(a.subscriptionEnd)<=30).length;
            document.getElementById('totalAccounts').innerText = accounts.length;
            document.getElementById('joinedTeamCount').innerText = joined;
            document.getElementById('genuineCount').innerText = genuine;
            document.getElementById('expiringCount').innerText = expiring;
        }

        // 事件处理（主管理员对账号的操作，保持原有逻辑，简化版）
        async function onCheckboxChange(e) {
            let idx = parseInt(e.target.dataset.index);
            if(isNaN(idx) || !accounts[idx]) return;
            let isTeam = e.target.classList.contains('team-checkbox');
            accounts[idx][isTeam ? 'joinedTeam' : 'isGenuine'] = e.target.checked;
            renderAccountTable();
            try { await updateSingleRecord(accounts[idx]); } catch(err){ showToast("同步失败"); }
        }
        async function onDateBlur(e) {
            let idx = parseInt(e.target.dataset.index);
            let field = e.target.dataset.field;
            if(isNaN(idx) || !accounts[idx]) return;
            let newVal = e.target.value;
            let std = parseToStandardDate(newVal);
            if(!std && newVal) { showToast("日期格式无效"); renderAccountTable(); return; }
            if(field==='subscriptionStart' && std) accounts[idx].subscriptionEnd = addOneYearToDateStr(std);
            if(std) accounts[idx][field] = std;
            renderAccountTable();
            try { await updateSingleRecord(accounts[idx]); } catch(err){ showToast("同步失败"); }
        }
        async function onDeleteClick(e) {
            let idx = parseInt(e.target.dataset.index);
            if(isNaN(idx) || !accounts[idx]) return;
            if(!confirm(`永久删除 ${accounts[idx].email} ？`)) return;
            let toDelete = accounts[idx];
            accounts.splice(idx,1);
            renderAccountTable();
            try { if(!toDelete.id.startsWith('temp')) await deleteRecord(toDelete.id); showToast("已删除"); } catch(err){ showToast("删除失败"); }
        }
        async function updateSingleRecord(acc) {
            if(!acc.id || acc.id.toString().startsWith('temp')) return;
            let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${acc.id}`;
            await fetch(url, { method:'PATCH', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`,'Content-Type':'application/json' }, body: JSON.stringify({ fields:{ Email:acc.email, joinedTeam:acc.joinedTeam, isGenuine:acc.isGenuine, subscriptionStart:acc.subscriptionStart, subscriptionEnd:acc.subscriptionEnd, teamName:acc.teamName } }) });
        }
        async function deleteRecord(id) {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${id}`;
            await fetch(url, { method:'DELETE', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}` } });
        }
        async function createRecord(fields) {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`;
            let resp = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`,'Content-Type':'application/json' }, body: JSON.stringify({ fields }) });
            if(!resp.ok) throw new Error();
            return await resp.json();
        }

        // 子账号管理操作（主管理员操作，也会记录日志，但为简化，仅保留基础功能）
        async function optimisticAddSubAdmin(username, password) {
            if(!username.trim()||!password.trim()) { showToast('用户名/密码不能为空'); return; }
            let tempId = `temp_sub_${Date.now()}`;
            let newSub = { id:tempId, username:username.trim(), password:password.trim(), syncing:true };
            subAdmins.push(newSub); renderSubAdminTable();
            try {
                let resp = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}`, { method:'POST', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`,'Content-Type':'application/json' }, body: JSON.stringify({ fields:{ username:newSub.username, password:newSub.password, role:'sub', teamName:"" } }) });
                if(!resp.ok) throw new Error();
                let created = await resp.json();
                let realSub = { id:created.id, username:created.fields.username, password:created.fields.password, syncing:false };
                let idx = subAdmins.findIndex(s=>s.id===tempId);
                if(idx!==-1) subAdmins[idx]=realSub;
                renderSubAdminTable();
                showToast(`子账号 ${username} 添加成功`);
            } catch(e) { subAdmins = subAdmins.filter(s=>s.id!==tempId); renderSubAdminTable(); showToast("添加失败"); }
        }
        async function updateSubAdminPassword(id, newPassword, username) {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${id}`;
            await fetch(url, { method:'PATCH', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}`,'Content-Type':'application/json' }, body: JSON.stringify({ fields:{ password:newPassword } }) });
            let sub = subAdmins.find(s=>s.id===id);
            if(sub) sub.password = newPassword;
            renderSubAdminTable();
            showToast("密码已更新");
        }
        async function deleteSubAdmin(id, username) {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${id}`;
            await fetch(url, { method:'DELETE', headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}` } });
            subAdmins = subAdmins.filter(s=>s.id!==id);
            renderSubAdminTable();
            showToast(`子账号 ${username} 已删除`);
        }
        async function handleUpdatePwd(e) {
            let id = e.currentTarget.dataset.id, name = e.currentTarget.dataset.name;
            let input = document.querySelector(`.sub-password-input[data-id="${id}"]`);
            if(input && input.value.trim()) await updateSubAdminPassword(id, input.value.trim(), name);
            else showToast("密码不能为空");
        }
        async function handleDeleteSub(e) {
            if(confirm('确定删除该子账号？')) {
                let id = e.currentTarget.dataset.id, name = e.currentTarget.dataset.name;
                await deleteSubAdmin(id, name);
            }
        }

        // 批量操作（主管理员）
        function getSelectedIndices() { return Array.from(document.querySelectorAll('.row-selector:checked')).map(cb=>parseInt(cb.dataset.index)).filter(i=>!isNaN(i) && accounts[i]); }
        async function batchUpdate(prop, val) {
            let indices = getSelectedIndices();
            if(!indices.length) { showToast('请勾选账号'); return; }
            for(let i of indices) accounts[i][prop] = val;
            renderAccountTable();
            let toUpdate = indices.map(i=>accounts[i]);
            try { await Promise.all(toUpdate.map(acc=>updateSingleRecord(acc))); showToast(`已更新 ${toUpdate.length} 个账号`); } catch(e){ showToast("同步失败"); }
        }
        async function deleteSelected() {
            let indices = getSelectedIndices();
            if(!indices.length) return;
            if(!confirm(`删除 ${indices.length} 个账号？`)) return;
            let toDelete = indices.map(i=>accounts[i]);
            accounts = accounts.filter((_,idx)=>!indices.includes(idx));
            renderAccountTable();
            try { await Promise.all(toDelete.map(acc=> { if(!acc.id.startsWith('temp')) return deleteRecord(acc.id); })); showToast("已删除"); } catch(e){ showToast("删除失败"); }
        }
        async function addAccount(email) {
            if(!email.trim()) return;
            if(accounts.some(a=>a.email.toLowerCase()===email.toLowerCase())) { showToast("邮箱已存在"); return; }
            let sub = getDefaultSubscription();
            let tempId = `temp_${Date.now()}`;
            let newAcc = { id:tempId, email, joinedTeam:false, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam, syncing:false };
            accounts.push(newAcc);
            renderAccountTable();
            try {
                let created = await createRecord({ Email:email, joinedTeam:false, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam });
                let idx = accounts.findIndex(a=>a.id===tempId);
                if(idx!==-1) accounts[idx]={ id:created.id, email:created.fields.Email, joinedTeam:false, isGenuine:false, subscriptionStart:created.fields.subscriptionStart, subscriptionEnd:created.fields.subscriptionEnd, teamName:currentTeam, syncing:false };
                renderAccountTable();
                showToast("添加成功");
            } catch(e) { accounts = accounts.filter(a=>a.id!==tempId); renderAccountTable(); showToast("添加失败"); }
        }
        async function resetToDefault() {
            if(!confirm('重置将清空所有账号，恢复初始列表')) return;
            let defaultEmails = ["chenshe2007@outlook.com","ChenGorGor@outlook.com","AdobeCloud999@outlook.com","AdobeCloud1888@outlook.com","qzkm68e4@outlook.com","jantek1000@gmail.com","hello@tanlineproject.biz","wuyiping315@outlook.com","dibox.diego@gmail.com","2571138584@qq.com","Adoblife8888@outlook.com","panjingru0210@outlook.com","3168551@qq.com","molanjunfeng@outlook.com","liubabya@outlook.com","wudie881031@gmail.com","llllynn076@gmail.com","sharkmoment2018@outlook.com","Gscf7890@outlook.com","wangjian@liangzao.wang","imwangyeah@gmail.com","ezaiezaixse@gmail.com","xiaoxuelian121@outlook.com","libaozeng038@gmail.com","t15651116661@gmail.com","threefinger520@outlook.com","qiangqiangx2@gmail.com","zhshy0506@gmail.com","DAFAWW124@outlook.com","1468890279@qq.com","jun6hao0719@gmail.com"];
            for(let acc of accounts) if(!acc.id.startsWith('temp')) await deleteRecord(acc.id);
            accounts = [];
            for(let email of defaultEmails) {
                let sub = getDefaultSubscription();
                let created = await createRecord({ Email:email, joinedTeam:false, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam });
                accounts.push({ id:created.id, email, joinedTeam:false, isGenuine:false, subscriptionStart:created.fields.subscriptionStart, subscriptionEnd:created.fields.subscriptionEnd, teamName:currentTeam, syncing:false });
            }
            renderAccountTable(); showToast("重置完成");
        }
        function exportToJson() {
            let data = accounts.map(({id,syncing,...rest})=>rest);
            let blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
            let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`adobe_team_${todayStandard()}.json`; a.click(); URL.revokeObjectURL(a.href);
        }
        async function importFromJson(file) {
            let reader = new FileReader();
            reader.onload = async (ev)=>{
                try {
                    let imported = JSON.parse(ev.target.result);
                    if(!Array.isArray(imported)) throw new Error();
                    for(let acc of accounts) if(!acc.id.startsWith('temp')) await deleteRecord(acc.id);
                    accounts = [];
                    for(let item of imported) {
                        if(!item.email) continue;
                        let fields = { Email:item.email, joinedTeam:!!item.joinedTeam, isGenuine:!!item.isGenuine, subscriptionStart:item.subscriptionStart||getDefaultSubscription().subscriptionStart, subscriptionEnd:item.subscriptionEnd||addOneYearToDateStr(item.subscriptionStart||todayStandard()), teamName:item.teamName||currentTeam };
                        let created = await createRecord(fields);
                        accounts.push({ id:created.id, email:created.fields.Email, joinedTeam:created.fields.joinedTeam, isGenuine:created.fields.isGenuine, subscriptionStart:created.fields.subscriptionStart, subscriptionEnd:created.fields.subscriptionEnd, teamName:created.fields.teamName, syncing:false });
                    }
                    renderAccountTable(); showToast(`导入 ${accounts.length} 个账号`);
                } catch(err) { showToast("JSON无效"); }
            };
            reader.readAsText(file);
        }
        async function importFromTxt(file, autoJoin) {
            let reader = new FileReader();
            reader.onload = async (ev)=>{
                let lines = ev.target.result.split(/\r?\n/);
                let emails = lines.filter(l=>l.trim() && /^\S+@\S+\.\S+$/.test(l.trim()) && !accounts.some(a=>a.email.toLowerCase()===l.trim().toLowerCase()));
                if(!emails.length) { showToast("无新账号"); return; }
                for(let email of emails) {
                    let sub = getDefaultSubscription();
                    let created = await createRecord({ Email:email, joinedTeam:autoJoin, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam });
                    accounts.push({ id:created.id, email, joinedTeam:autoJoin, isGenuine:false, subscriptionStart:sub.subscriptionStart, subscriptionEnd:sub.subscriptionEnd, teamName:currentTeam, syncing:false });
                }
                renderAccountTable(); showToast(`导入 ${emails.length} 个账号`);
            };
            reader.readAsText(file);
        }
        function setNewTeam(newTeam) { if(!newTeam.trim()) return; currentTeam = newTeam.trim(); localStorage.setItem(TEAM_KEY, currentTeam); document.getElementById('teamNameInput').value = currentTeam; document.getElementById('currentTeamDisplay').innerText = `🏷️ 主团队: ${currentTeam}`; renderAccountTable(); showToast(`主团队已更改为: ${currentTeam}`); }

        // 绑定主界面事件
        function bindEvents() {
            document.getElementById('batchJoinTeam')?.addEventListener('click',()=>batchUpdate('joinedTeam',true));
            document.getElementById('batchLeaveTeam')?.addEventListener('click',()=>batchUpdate('joinedTeam',false));
            document.getElementById('batchSetGenuine')?.addEventListener('click',()=>batchUpdate('isGenuine',true));
            document.getElementById('batchRemoveGenuine')?.addEventListener('click',()=>batchUpdate('isGenuine',false));
            document.getElementById('deleteSelectedBtn')?.addEventListener('click',deleteSelected);
            document.getElementById('addAccountBtn')?.addEventListener('click',()=>{ let inp=document.getElementById('newEmailInput'); if(inp.value) addAccount(inp.value); inp.value=''; });
            document.getElementById('resetDefaultBtn')?.addEventListener('click',resetToDefault);
            document.getElementById('exportJsonBtn')?.addEventListener('click',exportToJson);
            document.getElementById('refreshFromCloud')?.addEventListener('click', async ()=>{ showToast("刷新中..."); await refreshAllData(); showToast("刷新完成"); });
            document.getElementById('refreshLogsBtn')?.addEventListener('click', async ()=>{ await loadLogsFromCloud(); showToast("日志已刷新"); });
            document.getElementById('updateTeamBtn')?.addEventListener('click',()=>setNewTeam(document.getElementById('teamNameInput').value));
            document.getElementById('importJsonInput')?.addEventListener('change', (e)=>{ if(e.target.files[0]) importFromJson(e.target.files[0]); e.target.value=''; });
            document.getElementById('txtImportInput')?.addEventListener('change', (e)=>{ if(e.target.files[0]){ let autoJoin=confirm('自动加入当前团队？'); importFromTxt(e.target.files[0],autoJoin); } e.target.value=''; });
            document.getElementById('addSubAccountBtn')?.addEventListener('click',()=>{ let u=document.getElementById('newSubUsername').value; let p=document.getElementById('newSubPassword').value; if(u&&p) optimisticAddSubAdmin(u,p); else showToast("请填写用户名和密码"); document.getElementById('newSubUsername').value=''; document.getElementById('newSubPassword').value=''; });
        }

        async function refreshAllData() {
            await Promise.all([loadAccountsFromCloud(), loadSubAdminsFromCloud(), loadLogsFromCloud()]);
            renderAccountTable();
            renderSubAdminTable();
            updateStats();
        }

        // 登录与初始化
        async function initApp() {
            let saved = localStorage.getItem(TEAM_KEY);
            if(saved && saved.trim()) currentTeam = saved;
            document.getElementById('teamNameInput').value = currentTeam;
            document.getElementById('currentTeamDisplay').innerText = `🏷️ 主团队: ${currentTeam}`;
            await refreshAllData();
            bindEvents();
            // 自动刷新日志间隔15秒
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => { loadLogsFromCloud().catch(console.warn); }, 15000);
        }

        const loginOverlay = document.getElementById('loginOverlay');
        const mainContent = document.getElementById('mainContent');
        document.getElementById('loginBtn').addEventListener('click',()=>{
            if(document.getElementById('adminPasswordInput').value === ADMIN_PASSWORD) {
                loginOverlay.style.display='none'; mainContent.style.display='block';
                initApp();
            } else { document.getElementById('loginError').textContent='密码错误'; }
        });
        document.getElementById('adminPasswordInput').addEventListener('keypress',(e)=> { if(e.key==='Enter') document.getElementById('loginBtn').click(); });
    })();
</script>
