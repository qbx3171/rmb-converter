<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Adobe 团队管家 · 主管理员（极速版 + 操作日志）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 20%, rgba(15,35,55,0.05) 0%, rgba(10,25,40,0.08) 100%); padding: 20px 16px; min-height: 100vh; }
        .glass-panel { max-width: 1600px; margin: 0 auto; background: rgba(255,255,255,0.97); backdrop-filter: blur(2px); border-radius: 1.8rem; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #0a2b3c 0%, #1b5a6e 100%); padding: 1rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; color: white; }
        .hero-left h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .hero-left p { font-size: 0.6rem; opacity: 0.8; margin-top: 2px; }
        .team-edit-area { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); border-radius: 60px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .team-edit-area label { font-size: 0.7rem; font-weight: 500; }
        .team-input { background: rgba(255,255,240,0.9); border: none; border-radius: 40px; padding: 4px 10px; font-size: 0.7rem; color: #1e3a5f; min-width: 140px; }
        .update-team-btn { background: #ffd966; color: #2c3e2f; border: none; border-radius: 40px; padding: 3px 10px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }
        .stats-grid { display: flex; gap: 8px; padding: 0.8rem 1rem; background: #f9fbfd; border-bottom: 1px solid #e9eef3; flex-wrap: wrap; }
        .stat-item { background: white; border-radius: 30px; padding: 0.2rem 0.8rem; box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px #eef2f8; font-weight: 500; display: flex; align-items: baseline; gap: 5px; font-size: 0.7rem; }
        .stat-number { font-size: 1.2rem; font-weight: 800; color: #1f6e5c; line-height: 1; }
        .action-bar { padding: 0.6rem 1rem; background: white; border-bottom: 1px solid #eef2f8; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; }
        .btn-group, .sync-group { display: flex; flex-wrap: wrap; gap: 5px; }
        button, .btn-outline { background: #f1f5f9; border: none; padding: 5px 10px; border-radius: 30px; font-weight: 500; font-size: 0.7rem; cursor: pointer; transition: all 0.2s ease; color: #1e3a5f; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        button.primary { background: #1b6b5e; color: white; }
        button.accent { background: #2c5f8a; color: white; }
        button.warning { background: #fff1e5; color: #b45a2e; }
        button.danger { background: #ffe8e8; color: #c2412c; }
        button.success { background: #e0f2e9; color: #146b3a; }
        .add-section { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex: 1; }
        .add-section input { padding: 5px 10px; border-radius: 30px; border: 1px solid #cbdde9; background: white; min-width: 150px; font-size: 0.7rem; flex: 1; }
        .file-import { background: #eef2ff; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 0.5rem 0; }
        .modern-table { min-width: 800px; width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .modern-table th { text-align: left; padding: 0.6rem 0.4rem; background: #fefefe; font-weight: 600; color: #2c4c6c; border-bottom: 1px solid #e4e9f0; }
        .modern-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid #f0f3f9; vertical-align: middle; }
        .email-cell { font-family: monospace; font-weight: 500; word-break: break-all; max-width: 180px; }
        .date-input { padding: 4px 6px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.65rem; width: 100px; background: white; font-family: monospace; }
        .checkbox-smart { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .checkbox-smart input { width: 16px; height: 16px; accent-color: #1b6b5e; }
        .badge-team { background: #ddf3e8; color: #146b3a; border-radius: 30px; padding: 1px 6px; font-size: 0.6rem; font-weight: 600; margin-left: 4px; white-space: nowrap; }
        .delete-icon { background: none; border: none; font-size: 1rem; cursor: pointer; color: #9aaebf; padding: 2px 6px; border-radius: 30px; }
        .toast-message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a36e6; backdrop-filter: blur(12px); color: white; padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; z-index: 1000; pointer-events: none; white-space: nowrap; }
        .footer-note { padding: 0.6rem 1rem; background: #fafdff; border-top: 1px solid #eef2f8; font-size: 0.6rem; color: #6a7c8f; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; display: none; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 1.5rem; padding: 1.5rem 1.2rem; width: 280px; text-align: center; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.5); }
        .login-card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; color: #1e3a5f; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .login-card p { font-size: 0.7rem; color: #6c86a3; margin-bottom: 1rem; }
        .login-card input { width: 100%; padding: 8px 12px; margin: 0.5rem 0; border: 1px solid #cbdde9; border-radius: 40px; font-size: 0.85rem; background: white; outline: none; text-align: center; }
        .login-card input:focus { border-color: #1b6b5e; box-shadow: 0 0 0 2px rgba(27,107,94,0.2); }
        .login-card button { background: linear-gradient(135deg, #1b6b5e, #0f5348); color: white; border: none; padding: 8px 16px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .login-card .error { color: #c2412c; font-size: 0.65rem; margin-top: 0.5rem; }
        .subadmin-section { margin: 1rem; padding: 1rem; background: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .subadmin-section h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .subadmin-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .subadmin-table th, .subadmin-table td { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .subadmin-table input { padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; width: 100%; }
        .btn-sm { padding: 2px 8px; font-size: 0.6rem; }
        .syncing-row { opacity: 0.65; background: #fef9e3; }
        .syncing-badge { font-size: 0.6rem; background: #ffedd5; color: #b45309; border-radius: 20px; padding: 0 6px; margin-left: 6px; display: inline-block; }
        /* 日志区块样式 */
        .logs-section { margin: 1rem; padding: 1rem; background: #fefce8; border-radius: 1rem; border: 1px solid #fde047; }
        .logs-section h3 { font-size: 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .log-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .log-table th, .log-table td { padding: 0.5rem 0.3rem; border-bottom: 1px solid #e2e8f0; text-align: left; vertical-align: top; }
        .log-table th { background: #fffbeb; font-weight: 600; color: #92400e; }
        .log-time { font-family: monospace; white-space: nowrap; }
        .log-extra { max-width: 180px; word-break: break-all; font-family: monospace; background: #f1f5f9; border-radius: 12px; padding: 2px 6px; display: inline-block; }
        .scroll-logs { max-height: 280px; overflow-y: auto; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .hero-left h1 { font-size: 1rem; }
            .stat-item { font-size: 0.6rem; }
            .stat-number { font-size: 1rem; }
            button, .btn-outline { font-size: 0.65rem; padding: 4px 8px; }
            .add-section input { font-size: 0.65rem; min-width: 120px; }
            .date-input { width: 85px; }
            .modern-table th, .modern-table td { padding: 0.4rem 0.3rem; }
            .log-extra { max-width: 120px; }
        }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 主管理员登录</h2>
        <p>请输入管理密码</p>
        <input type="password" id="adminPasswordInput" placeholder="密码" autocomplete="off">
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
<div class="glass-panel">
    <div class="hero">
        <div class="hero-left">
            <h1>📋 Adobe 团队管家 · 主管理员</h1>
            <p>极速加载 · 实时同步 · 子账号操作全记录</p>
        </div>
        <div class="team-edit-area">
            <label>🎯 主团队名称：</label>
            <input type="text" id="teamNameInput" class="team-input" placeholder="团队名称">
            <button id="updateTeamBtn" class="update-team-btn">更改</button>
        </div>
    </div>
    <div class="stats-grid">
        <div class="stat-item">📬 总账号 <span class="stat-number" id="totalAccounts">0</span></div>
        <div class="stat-item">✅ 已加入团队 <span class="stat-number" id="joinedTeamCount">0</span></div>
        <div class="stat-item">⭐ 正版客户 <span class="stat-number" id="genuineCount">0</span></div>
        <div class="stat-item">⏳ 即将过期 <span class="stat-number" id="expiringCount">0</span></div>
    </div>
    <div class="action-bar">
        <div class="btn-group">
            <button id="batchJoinTeam" class="primary">➕ 批量加入</button>
            <button id="batchLeaveTeam" class="warning">➖ 批量移出</button>
            <button id="batchSetGenuine" class="primary">⭐ 批量正版</button>
            <button id="batchRemoveGenuine" class="warning">🔄 取消正版</button>
            <button id="deleteSelectedBtn" class="danger">🗑️ 删除选中</button>
        </div>
        <div class="sync-group">
            <button id="refreshFromCloud" class="accent">🔄 刷新</button>
            <button id="exportJsonBtn" class="">💾 导出JSON</button>
            <label for="importJsonInput" class="btn-outline" style="cursor:pointer;">📂 导入JSON</label>
            <input type="file" id="importJsonInput" accept=".json" style="display:none">
            <button id="resetDefaultBtn" class="">⟳ 重置</button>
        </div>
    </div>
    <div class="action-bar" style="border-top: none; padding-top: 0; flex-wrap: wrap;">
        <div class="add-section">
            <input type="email" id="newEmailInput" placeholder="单个邮箱添加 ...">
            <button id="addAccountBtn" class="primary">➕ 添加</button>
            <label for="txtImportInput" class="btn-outline file-import" style="cursor:pointer;">📄 从TXT导入</label>
            <input type="file" id="txtImportInput" accept=".txt" style="display:none">
            <span style="font-size:0.6rem; color:#6c86a3;">✔️ TXT每行一个邮箱</span>
        </div>
    </div>

    <!-- 子账号管理模块 -->
    <div class="subadmin-section">
        <h3>👥 子账号管理</h3>
        <div style="margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
            <input type="text" id="newSubUsername" placeholder="子账号用户名" style="padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.7rem;">
            <input type="text" id="newSubPassword" placeholder="初始密码" style="padding: 4px 8px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.7rem;">
            <button id="addSubAccountBtn" class="primary btn-sm">➕ 添加子账号</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="subadmin-table" id="subAdminTable">
                <thead><tr><th>用户名</th><th>密码</th><th>操作</th></thead>
                <tbody id="subAdminTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 操作日志区块 (新增) -->
    <div class="logs-section">
        <h3>📜 子账号操作日志 <button id="refreshLogsBtn" class="btn-sm" style="background:#eef2ff;">🔄 刷新日志</button> <span style="font-size:0.6rem; font-weight:normal;">记录添加/修改密码/删除操作及时间</span></h3>
        <div class="scroll-logs">
            <table class="log-table">
                <thead><tr><th>⏱️ 操作时间</th><th>🔧 操作类型</th><th>👤 目标子账号</th><th>📝 详情 / 密码</th></tr></thead>
                <tbody id="logsTableBody"><tr><td colspan="4" style="text-align:center;">加载日志中...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="table-container">
        <table class="modern-table" id="accountTable">
            <thead><tr><th style="width:30px;"><input type="checkbox" id="selectAllCheckbox"></th><th>邮箱地址</th><th>团队状态</th><th>Adobe正版</th><th>订阅起始</th><th>到期时间</th><th>所属团队</th><th style="width:40px;"></th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="8" style="text-align:center; padding:40px;">⏳ 加载中...</td></tr></tbody>
        </table>
    </div>
    <div class="footer-note">
        <span>⚡ 数据实时同步至云端</span>
        <span id="currentTeamDisplay">🏷️ 主团队: 加载中...</span>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div>⏳ 处理中...</div></div>
</div>

<script>
    // ================== 主密码验证 ==================
    const ENCODED_PASSWORD = "cWJ4MTIxNjQ4MTE="; // qbx12164811
    const ADMIN_PASSWORD = atob(ENCODED_PASSWORD);
    const loginOverlay = document.getElementById('loginOverlay');
    const mainContent = document.getElementById('mainContent');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('adminPasswordInput');
    const loginError = document.getElementById('loginError');

    function showLogin() { loginOverlay.style.display = 'flex'; mainContent.style.display = 'none'; }
    function hideLogin() { loginOverlay.style.display = 'none'; mainContent.style.display = 'block'; }
    loginBtn.addEventListener('click', () => {
        if (passwordInput.value === ADMIN_PASSWORD) { hideLogin(); initApp(); }
        else loginError.textContent = '密码错误，请重试';
    });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });

    // ================== Airtable 配置 ==================
    const AIRTABLE_TOKEN = "patlLxSFx112EGSkC.eb05637ecfaa9c618deb159bbb5ce78c82680898975ed3cd6da73e72f316c586";
    const BASE_ID = "appKUCGZCrZIH51dG";
    const TABLE_NAME = "accounts";
    const ADMINS_TABLE = "admins";
    const LOGS_TABLE = "logs";   // 需要手动创建此表: 字段 operation(单行文本), targetUsername(单行文本), extraInfo(单行文本), timestamp(日期时间或文本), operator(单行文本)

    let accounts = [];
    let subAdmins = [];
    let operationLogs = [];       // 存储日志记录用于展示
    let currentTeam = "Art Grid Dynamics Garcia Miami";
    const TEAM_KEY = "MainTeamName";
    let dateSyncTimeout = null;

    // 辅助函数
    function parseToStandardDate(input) { 
        if (!input || typeof input !== 'string') return null;
        let str = input.trim();
        let parts = str.split(/[-/\.]/);
        if (parts.length === 3) {
            let year = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10) - 1;
            let day = parseInt(parts[2], 10);
            if (!isNaN(year) && !isNaN(month) && !isNaN(day)) {
                let date = new Date(year, month, day);
                if (date.getFullYear() === year && date.getMonth() === month && date.getDate() === day) return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            }
        }
        let d = new Date(str);
        if (!isNaN(d.getTime())) { let y = d.getFullYear(); let m = String(d.getMonth()+1).padStart(2,'0'); let day = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
        return null;
    }
    function isValidDateString(dateStr) { return parseToStandardDate(dateStr) !== null; }
    function addOneYearToDateStr(dateStr) {
        let std = parseToStandardDate(dateStr);
        if (!std) return "";
        let parts = std.split('-');
        let year = parseInt(parts[0],10), month = parseInt(parts[1],10), day = parseInt(parts[2],10);
        let newDate = new Date(year, month-1, day);
        newDate.setFullYear(newDate.getFullYear() + 1);
        return `${newDate.getFullYear()}-${String(newDate.getMonth()+1).padStart(2,'0')}-${String(newDate.getDate()).padStart(2,'0')}`;
    }
    function todayStandard() { let d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getDefaultSubscription() { let start = todayStandard(); return { subscriptionStart: start, subscriptionEnd: addOneYearToDateStr(start) }; }
    function daysRemaining(endDateStr) { let stdEnd = parseToStandardDate(endDateStr); if (!stdEnd) return Infinity; let today = new Date(); today.setHours(0,0,0,0); let end = new Date(stdEnd); if (isNaN(end.getTime())) return Infinity; return Math.ceil((end - today) / (1000*60*60*24)); }

    // 通用fetch分页
    async function fetchAllRecords(table) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${table}`;
        let allRecords = [], offset = null;
        do {
            let fetchUrl = url + (offset ? `?offset=${offset}` : '');
            const resp = await fetch(fetchUrl, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            allRecords = allRecords.concat(data.records);
            offset = data.offset;
        } while (offset);
        return allRecords;
    }

    // 加载日志 (支持排序)
    async function loadLogsFromCloud() {
        try {
            const records = await fetchAllRecords(LOGS_TABLE);
            operationLogs = records.map(rec => ({
                id: rec.id,
                operation: rec.fields.operation || '',
                targetUsername: rec.fields.targetUsername || '',
                extraInfo: rec.fields.extraInfo || '',
                timestamp: rec.fields.timestamp || '',
                operator: rec.fields.operator || 'admin'
            })).sort((a,b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
            renderLogsTable();
        } catch(e) {
            console.warn("日志表可能未创建或无法读取, 请手动创建logs表:", e);
            operationLogs = [];
            renderLogsTable(true);
        }
    }

    // 添加一条操作日志 (不阻塞主流程)
    async function addOperationLog(operation, targetUsername, extraInfo = '') {
        const timestamp = new Date().toISOString();
        const operator = '主管理员';
        const fields = { operation, targetUsername, extraInfo, timestamp, operator };
        try {
            const url = `https://api.airtable.com/v0/${BASE_ID}/${LOGS_TABLE}`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields })
            });
            if (!resp.ok) throw new Error();
            // 刷新日志显示
            await loadLogsFromCloud();
        } catch(e) {
            console.warn("记录操作日志失败, 可能logs表未创建:", e);
        }
    }

    function renderLogsTable(warnNoTable = false) {
        const tbody = document.getElementById('logsTableBody');
        if (!tbody) return;
        if (warnNoTable || (operationLogs.length === 0 && !warnNoTable)) {
            if (operationLogs.length === 0 && !warnNoTable) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">暂无操作日志，添加/修改/删除子账号后将自动记录</td></tr>';
            } else if (warnNoTable) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#b45309;">⚠️ 未检测到logs表，请手动在Airtable中创建表"logs"，字段: operation(文本), targetUsername(文本), extraInfo(文本), timestamp(日期时间或文本), operator(文本)</td></tr>';
            }
            return;
        }
        const fragment = document.createDocumentFragment();
        for (let log of operationLogs.slice(0, 50)) {
            const tr = document.createElement('tr');
            const timeTd = document.createElement('td'); timeTd.className = 'log-time'; 
            let displayTime = log.timestamp ? new Date(log.timestamp).toLocaleString('zh-CN') : '未知';
            timeTd.textContent = displayTime;
            const opTd = document.createElement('td'); opTd.textContent = log.operation;
            const userTd = document.createElement('td'); userTd.textContent = log.targetUsername;
            const extraTd = document.createElement('td'); 
            if (log.extraInfo) { const span = document.createElement('span'); span.className = 'log-extra'; span.textContent = log.extraInfo; extraTd.appendChild(span); } 
            else extraTd.textContent = '—';
            tr.appendChild(timeTd); tr.appendChild(opTd); tr.appendChild(userTd); tr.appendChild(extraTd);
            fragment.appendChild(tr);
        }
        tbody.innerHTML = '';
        tbody.appendChild(fragment);
    }

    async function loadAccountsFromCloud() {
        const records = await fetchAllRecords(TABLE_NAME);
        accounts = records.map(rec => ({
            id: rec.id,
            email: rec.fields.Email,
            joinedTeam: rec.fields.joinedTeam === true,
            isGenuine: rec.fields.isGenuine === true,
            subscriptionStart: rec.fields.subscriptionStart || getDefaultSubscription().subscriptionStart,
            subscriptionEnd: rec.fields.subscriptionEnd || getDefaultSubscription().subscriptionEnd,
            teamName: rec.fields.teamName || currentTeam,
            syncing: false
        }));
        for (let acc of accounts) {
            if (!isValidDateString(acc.subscriptionStart)) acc.subscriptionStart = getDefaultSubscription().subscriptionStart;
            if (!isValidDateString(acc.subscriptionEnd)) acc.subscriptionEnd = addOneYearToDateStr(acc.subscriptionStart);
            if (!acc.teamName) acc.teamName = currentTeam;
        }
    }

    async function loadSubAdminsFromCloud() {
        const records = await fetchAllRecords(ADMINS_TABLE);
        subAdmins = records.map(rec => ({ id: rec.id, username: rec.fields.username, password: rec.fields.password, syncing: false }));
    }

    async function loadAllCloudData() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            await Promise.all([loadAccountsFromCloud(), loadSubAdminsFromCloud(), loadLogsFromCloud()]);
            renderTable();
            renderSubAdminTable();
            updateStats();
        } catch(e) { console.error(e); showToast("加载数据失败，请刷新重试"); }
        finally { overlay.style.display = 'none'; }
    }

    function updateStats() {
        const joined = accounts.filter(a => a.joinedTeam).length;
        const genuine = accounts.filter(a => a.isGenuine).length;
        const expiring = accounts.filter(a => daysRemaining(a.subscriptionEnd) <= 30).length;
        document.getElementById('totalAccounts').innerText = accounts.length;
        document.getElementById('joinedTeamCount').innerText = joined;
        document.getElementById('genuineCount').innerText = genuine;
        document.getElementById('expiringCount').innerText = expiring;
    }

    function renderTable() { /* 保持原有效能 */ 
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        const fragment = document.createDocumentFragment();
        accounts.forEach((acc, idx) => {
            const tr = document.createElement('tr');
            if (acc.syncing) tr.classList.add('syncing-row');
            const tdSel = document.createElement('td');
            const chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'row-selector'; chk.dataset.index = idx;
            if (acc.syncing) chk.disabled = true;
            tdSel.appendChild(chk); tr.appendChild(tdSel);
            const tdEmail = document.createElement('td'); tdEmail.className = 'email-cell'; tdEmail.textContent = acc.email;
            if (acc.syncing) { const syncBadge = document.createElement('span'); syncBadge.className = 'syncing-badge'; syncBadge.textContent = '同步中'; tdEmail.appendChild(syncBadge); }
            tr.appendChild(tdEmail);
            const tdTeam = document.createElement('td');
            const teamLabel = document.createElement('label'); teamLabel.className = 'checkbox-smart';
            const teamChk = document.createElement('input'); teamChk.type = 'checkbox'; teamChk.checked = acc.joinedTeam; teamChk.className = 'team-checkbox'; teamChk.dataset.index = idx;
            if (acc.syncing) teamChk.disabled = true;
            const teamSpan = document.createElement('span'); teamSpan.textContent = acc.joinedTeam ? `已加入 ${currentTeam}` : '未加入';
            teamLabel.appendChild(teamChk); teamLabel.appendChild(teamSpan);
            if (acc.joinedTeam && !acc.syncing) { const badge = document.createElement('span'); badge.className = 'badge-team'; badge.textContent = currentTeam.length > 10 ? currentTeam.slice(0,8)+'..' : currentTeam; teamLabel.appendChild(badge); }
            tdTeam.appendChild(teamLabel); tr.appendChild(tdTeam);
            const tdGenuine = document.createElement('td');
            const genuineLabel = document.createElement('label'); genuineLabel.className = 'checkbox-smart';
            const genuineChk = document.createElement('input'); genuineChk.type = 'checkbox'; genuineChk.checked = acc.isGenuine; genuineChk.className = 'genuine-checkbox'; genuineChk.dataset.index = idx;
            if (acc.syncing) genuineChk.disabled = true;
            const genuineSpan = document.createElement('span'); genuineSpan.textContent = acc.isGenuine ? '✅ 正版' : '⭕ 未认证';
            genuineLabel.appendChild(genuineChk); genuineLabel.appendChild(genuineSpan);
            tdGenuine.appendChild(genuineLabel); tr.appendChild(tdGenuine);
            const tdStart = document.createElement('td');
            const startInput = document.createElement('input'); startInput.type = 'text'; startInput.value = acc.subscriptionStart || ''; startInput.className = 'date-input'; startInput.placeholder = "YYYY-MM-DD"; startInput.dataset.index = idx; startInput.dataset.field = 'subscriptionStart';
            if (acc.syncing) startInput.disabled = true;
            tdStart.appendChild(startInput); tr.appendChild(tdStart);
            const tdEnd = document.createElement('td');
            const endInput = document.createElement('input'); endInput.type = 'text'; endInput.value = acc.subscriptionEnd || ''; endInput.className = 'date-input'; endInput.placeholder = "YYYY-MM-DD"; endInput.dataset.index = idx; endInput.dataset.field = 'subscriptionEnd';
            if (acc.syncing) endInput.disabled = true;
            tdEnd.appendChild(endInput); tr.appendChild(tdEnd);
            const tdTeamName = document.createElement('td'); tdTeamName.textContent = acc.teamName || currentTeam; tr.appendChild(tdTeamName);
            const tdAction = document.createElement('td');
            const delBtn = document.createElement('button'); delBtn.textContent = '🗑️'; delBtn.className = 'delete-icon'; delBtn.dataset.index = idx;
            if (acc.syncing) delBtn.disabled = true;
            tdAction.appendChild(delBtn); tr.appendChild(tdAction);
            fragment.appendChild(tr);
        });
        tbody.innerHTML = '';
        tbody.appendChild(fragment);
        updateStats();
        const allSelectors = document.querySelectorAll('.row-selector:not([disabled])');
        const selectAllChk = document.getElementById('selectAllCheckbox');
        if (selectAllChk) {
            const checkedCount = Array.from(allSelectors).filter(cb => cb.checked).length;
            selectAllChk.checked = (checkedCount === allSelectors.length && allSelectors.length > 0);
            selectAllChk.indeterminate = (checkedCount > 0 && checkedCount < allSelectors.length);

    function renderSubAdminTable() {
        const tbody = document.getElementById('subAdminTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        for (let sub of subAdmins) {
            const tr = document.createElement('tr');
            if (sub.syncing) tr.classList.add('syncing-row');
            tr.innerHTML = `<td>${escapeHtml(sub.username)}${sub.syncing ? '<span class="syncing-badge">同步中</span>' : ''}</td>
                            <td><input type="text" value="${escapeHtml(sub.password)}" data-id="${sub.id}" class="sub-password-input" style="width:100px;" ${sub.syncing ? 'disabled' : ''}></td>
                            <td><button class="btn-sm update-pwd-btn" data-id="${sub.id}" data-name="${escapeHtml(sub.username)}" ${sub.syncing ? 'disabled' : ''}>更新密码</button> <button class="btn-sm delete-sub-btn" data-id="${sub.id}" data-name="${escapeHtml(sub.username)}" ${sub.syncing ? 'disabled' : ''}>删除</button></td>`;
            tbody.appendChild(tr);
        }
        document.querySelectorAll('.update-pwd-btn').forEach(btn => btn.addEventListener('click', handleUpdatePwd));
        document.querySelectorAll('.delete-sub-btn').forEach(btn => btn.addEventListener('click', handleDeleteSub));
    }

    async function optimisticAddSubAdmin(username, password) {
        if (!username.trim() || !password.trim()) { showToast('用户名和密码不能为空'); return; }
        const tempId = `temp_sub_${Date.now()}`;
        const newSub = { id: tempId, username: username.trim(), password: password.trim(), syncing: true };
        subAdmins.push(newSub);
        renderSubAdminTable();
        try {
            const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}`;
            const resp = await fetch(url, { method: 'POST', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { username: newSub.username, password: newSub.password, role: 'sub', teamName: "" } }) });
            if (!resp.ok) throw new Error();
            const created = await resp.json();
            const realSub = { id: created.id, username: created.fields.username, password: created.fields.password, syncing: false };
            const idx = subAdmins.findIndex(s => s.id === tempId);
            if (idx !== -1) subAdmins[idx] = realSub;
            renderSubAdminTable();
            // 记录添加日志
            await addOperationLog('➕ 添加子账号', realSub.username, `初始密码: ${realSub.password}`);
            showToast(`子账号 ${username} 添加成功`);
        } catch(e) {
            subAdmins = subAdmins.filter(s => s.id !== tempId);
            renderSubAdminTable();
            showToast(`添加子账号失败`);
        }
    }

    async function updateSubAdminPassword(recordId, newPassword, username) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${recordId}`;
        const resp = await fetch(url, { method: 'PATCH', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { password: newPassword } }) });
        if (!resp.ok) throw new Error();
        const sub = subAdmins.find(s => s.id === recordId);
        if (sub) sub.password = newPassword;
        renderSubAdminTable();
        await addOperationLog('🔐 修改密码', username, `新密码: ${newPassword}`);
        showToast("密码已更新并记录日志");
    }

    async function deleteSubAdmin(recordId, username) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${recordId}`;
        const resp = await fetch(url, { method: 'DELETE', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
        if (!resp.ok) throw new Error();
        subAdmins = subAdmins.filter(s => s.id !== recordId);
        renderSubAdminTable();
        await addOperationLog('🗑️ 删除子账号', username, '账号已删除');
        showToast(`子账号 ${username} 已删除`);
    }

    async function handleUpdatePwd(e) {
        const id = e.currentTarget.dataset.id;
        const name = e.currentTarget.dataset.name;
        const input = document.querySelector(`.sub-password-input[data-id="${id}"]`);
        if (input && input.value.trim()) {
            try { await updateSubAdminPassword(id, input.value.trim(), name); } catch(err) { showToast("更新失败"); }
        } else showToast("密码不能为空");
    }
    async function handleDeleteSub(e) {
        if (confirm('确定删除该子账号？')) {
            const id = e.currentTarget.dataset.id;
            const name = e.currentTarget.dataset.name;
            try { await deleteSubAdmin(id, name); } catch(err) { showToast("删除失败"); }
        }
    }

    // 其余辅助函数与原有保持一致 (batchUpdate, deleteSelected, reset, 导入导出等) 篇幅原因保留原有，仅略作适配，但确保全功能。
    function getSelectedIndices() { return Array.from(document.querySelectorAll('.row-selector:checked:not([disabled])')).map(cb => parseInt(cb.dataset.index)).filter(i => !isNaN(i) && accounts[i] && !accounts[i].syncing); }
    async function batchUpdate(property, newValue) { const indices = getSelectedIndices(); if (!indices.length) { showToast('请至少勾选一个账号'); return; } for (let idx of indices) accounts[idx][property] = newValue; renderTable(); const toUpdate = indices.map(i => accounts[i]); const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex'; try { await Promise.all(toUpdate.map(acc => updateSingleRecord(acc, false))); showToast(`已更新 ${toUpdate.length} 个账号`); } catch(e) { showToast("同步失败"); } finally { overlay.style.display = 'none'; } }
    async function deleteSelected() { const indices = getSelectedIndices(); if (!indices.length) { showToast('没有选中任何账号'); return; } if (!confirm(`永久删除 ${indices.length} 个账号？`)) return; const toDelete = indices.map(i => accounts[i]); const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex'; try { for (let acc of toDelete) if (!acc.id.startsWith('temp')) await deleteRecord(acc.id); accounts = accounts.filter((_, idx) => !indices.includes(idx)); renderTable(); showToast(`已删除 ${toDelete.length} 个账号`); } catch(err) { showToast("删除失败"); } finally { overlay.style.display = 'none'; } }
    async function updateSingleRecord(account, showToastMsg = false) { if (account.id && !account.id.toString().startsWith('temp')) { const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${account.id}`; const resp = await fetch(url, { method: 'PATCH', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { Email: account.email, joinedTeam: account.joinedTeam, isGenuine: account.isGenuine, subscriptionStart: account.subscriptionStart, subscriptionEnd: account.subscriptionEnd, teamName: account.teamName } }) }); if (!resp.ok) throw new Error(); if (showToastMsg) showToast("已保存"); } }
    async function deleteRecord(recordId) { const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`; const resp = await fetch(url, { method: 'DELETE', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } }); if (!resp.ok) throw new Error(); }
    async function resetToDefault() { if (!confirm('重置将删除所有现有账号，并恢复初始邮箱列表')) return; const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex'; try { for (let acc of accounts) if (!acc.id.startsWith('temp')) await deleteRecord(acc.id); const defaultEmails = ["chenshe2007@outlook.com","ChenGorGor@outlook.com","AdobeCloud999@outlook.com","AdobeCloud1888@outlook.com","qzkm68e4@outlook.com","jantek1000@gmail.com","hello@tanlineproject.biz","wuyiping315@outlook.com","dibox.diego@gmail.com","2571138584@qq.com","Adoblife8888@outlook.com","panjingru0210@outlook.com","3168551@qq.com","molanjunfeng@outlook.com","liubabya@outlook.com","wudie881031@gmail.com","llllynn076@gmail.com","sharkmoment2018@outlook.com","Gscf7890@outlook.com","wangjian@liangzao.wang","imwangyeah@gmail.com","ezaiezaixse@gmail.com","xiaoxuelian121@outlook.com","libaozeng038@gmail.com","t15651116661@gmail.com","threefinger520@outlook.com","qiangqiangx2@gmail.com","zhshy0506@gmail.com","DAFAWW124@outlook.com","1468890279@qq.com","jun6hao0719@gmail.com"]; accounts = []; for (let email of defaultEmails) { let sub = getDefaultSubscription(); const created = await createRecord({ Email: email, joinedTeam: false, isGenuine: false, subscriptionStart: sub.subscriptionStart, subscriptionEnd: sub.subscriptionEnd, teamName: currentTeam }); accounts.push({ id: created.id, email: created.fields.Email, joinedTeam: false, isGenuine: false, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: currentTeam, syncing: false }); } renderTable(); showToast('已重置为默认账号列表'); } catch(err) { showToast("重置失败"); } finally { overlay.style.display = 'none'; } }
    async function createRecord(fields) { const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`; const resp = await fetch(url, { method: 'POST', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields }) }); if (!resp.ok) throw new Error(); return await resp.json(); }
    function exportToJson() { const exportData = accounts.map(({ id, syncing, ...rest }) => rest); const dataStr = JSON.stringify(exportData, null, 2); const blob = new Blob([dataStr], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `adobe_team_${todayStandard()}.json`; a.click(); URL.revokeObjectURL(url); showToast('导出JSON成功'); }
    async function importFromJson(file) { const reader = new FileReader(); reader.onload = async (e) => { try { const imported = JSON.parse(e.target.result); if (!Array.isArray(imported)) throw new Error(); const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex'; for (let acc of accounts) if (!acc.id.startsWith('temp')) await deleteRecord(acc.id); accounts = []; for (let item of imported) { if (!item.email) continue; const fields = { Email: item.email, joinedTeam: item.joinedTeam === true, isGenuine: item.isGenuine === true, subscriptionStart: item.subscriptionStart || getDefaultSubscription().subscriptionStart, subscriptionEnd: item.subscriptionEnd || addOneYearToDateStr(item.subscriptionStart || todayStandard()), teamName: item.teamName || currentTeam }; const created = await createRecord(fields); accounts.push({ id: created.id, email: created.fields.Email, joinedTeam: created.fields.joinedTeam, isGenuine: created.fields.isGenuine, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: created.fields.teamName, syncing: false }); } renderTable(); showToast(`导入 ${accounts.length} 个账号`); } catch(err) { showToast('JSON文件无效'); } finally { overlay.style.display = 'none'; } }; reader.readAsText(file); }
    function showToast(msg, duration = 2000) { let toastTimer; if (toastTimer) clearTimeout(toastTimer); const existing = document.querySelector('.toast-message'); if (existing) existing.remove(); const toast = document.createElement('div'); toast.className = 'toast-message'; toast.textContent = msg; document.body.appendChild(toast); toastTimer = setTimeout(() => toast.remove(), duration); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function setNewTeam(newTeam) { if (!newTeam.trim()) { showToast("团队名称不能为空"); return false; } currentTeam = newTeam.trim(); localStorage.setItem(TEAM_KEY, currentTeam); document.getElementById('teamNameInput').value = currentTeam; document.getElementById('currentTeamDisplay').innerText = `🏷️ 主团队: ${currentTeam}`; renderTable(); showToast(`主团队已更改为: ${currentTeam}`); return true; }

    function bindEvents() {
        const tbody = document.getElementById('tableBody');
        tbody?.addEventListener('change', async (e) => {
            if (e.target.classList.contains('team-checkbox') || e.target.classList.contains('genuine-checkbox')) {
                const idx = parseInt(e.target.dataset.index); if (isNaN(idx) || !accounts[idx] || accounts[idx].syncing) return;
                accounts[idx][e.target.classList.contains('team-checkbox') ? 'joinedTeam' : 'isGenuine'] = e.target.checked;
                renderTable();
                try { await updateSingleRecord(accounts[idx], false); showToast("已同步"); } catch(err) { showToast("同步失败"); }
            }
        });
        tbody?.addEventListener('blur', async (e) => { if (e.target.classList.contains('date-input')) { const idx = parseInt(e.target.dataset.index); const field = e.target.dataset.field; if (!isNaN(idx) && accounts[idx] && !accounts[idx].syncing) { let std = parseToStandardDate(e.target.value); if (!std) { showToast("日期格式无效"); renderTable(); return; } accounts[idx][field] = std; if (field === 'subscriptionStart') accounts[idx].subscriptionEnd = addOneYearToDateStr(std); renderTable(); try { await updateSingleRecord(accounts[idx], false); showToast("日期已更新"); } catch(err) { showToast("同步失败"); } } } });
        tbody?.addEventListener('click', (e) => { if (e.target.classList.contains('delete-icon') && !accounts[parseInt(e.target.dataset.index)]?.syncing) deleteSelected(); });
        document.getElementById('selectAllCheckbox')?.addEventListener('change', (e) => document.querySelectorAll('.row-selector:not([disabled])').forEach(cb => cb.checked = e.target.checked));
        document.getElementById('batchJoinTeam')?.addEventListener('click', () => batchUpdate('joinedTeam', true));
        document.getElementById('batchLeaveTeam')?.addEventListener('click', () => batchUpdate('joinedTeam', false));
        document.getElementById('batchSetGenuine')?.addEventListener('click', () => batchUpdate('isGenuine', true));
        document.getElementById('batchRemoveGenuine')?.addEventListener('click', () => batchUpdate('isGenuine', false));
        document.getElementById('deleteSelectedBtn')?.addEventListener('click', deleteSelected);
        document.getElementById('addAccountBtn')?.addEventListener('click', () => { const inp = document.getElementById('newEmailInput'); if (inp.value) optimisticAddAccount(inp.value).then(() => inp.value = ''); });
        document.getElementById('resetDefaultBtn')?.addEventListener('click', resetToDefault);
        document.getElementById('exportJsonBtn')?.addEventListener('click', exportToJson);
        document.getElementById('refreshFromCloud')?.addEventListener('click', async () => { showToast("刷新中..."); await loadAllCloudData(); showToast("刷新完成"); });
        document.getElementById('updateTeamBtn')?.addEventListener('click', () => setNewTeam(document.getElementById('teamNameInput').value));
        document.getElementById('importJsonInput')?.addEventListener('change', (e) => { if (e.target.files[0]) importFromJson(e.target.files[0]); e.target.value = ''; });
        document.getElementById('txtImportInput')?.addEventListener('change', async (e) => { if (e.target.files[0]) { const autoJoin = confirm('是否将导入的所有账号自动加入当前团队？'); const file = e.target.files[0]; const reader = new FileReader(); reader.onload = async (ev) => { const lines = ev.target.result.split(/\r?\n/); const emails = lines.filter(l => l.trim() && /^\S+@\S+\.\S+$/.test(l.trim()) && !accounts.some(a => a.email.toLowerCase() === l.trim().toLowerCase())); if (!emails.length) { showToast("无新账号"); return; } const overlay = document.getElementById('loadingOverlay'); overlay.style.display = 'flex'; try { for (let email of emails) { const sub = getDefaultSubscription(); const created = await createRecord({ Email: email, joinedTeam: autoJoin, isGenuine: false, subscriptionStart: sub.subscriptionStart, subscriptionEnd: sub.subscriptionEnd, teamName: currentTeam }); accounts.push({ id: created.id, email, joinedTeam: autoJoin, isGenuine: false, subscriptionStart: sub.subscriptionStart, subscriptionEnd: sub.subscriptionEnd, teamName: currentTeam, syncing: false }); } renderTable(); showToast(`导入完成，新增 ${emails.length} 个账号`); } catch(err) { showToast("导入失败"); } finally { overlay.style.display = 'none'; } }; reader.readAsText(file, 'UTF-8'); e.target.value = ''; } });
        document.getElementById('addSubAccountBtn')?.addEventListener('click', () => { const u = document.getElementById('newSubUsername').value; const p = document.getElementById('newSubPassword').value; if (u && p) optimisticAddSubAdmin(u, p); else showToast("请填写用户名和密码"); document.getElementById('newSubUsername').value = ''; document.getElementById('newSubPassword').value = ''; });
        document.getElementById('refreshLogsBtn')?.addEventListener('click', async () => { await loadLogsFromCloud(); showToast("日志已刷新"); });
    }
    async function optimisticAddAccount(email) { if (!email.trim()) { showToast('邮箱不能为空'); return false; } if (!/^\S+@\S+\.\S+$/.test(email)) { showToast('邮箱格式无效'); return false; } if (accounts.some(acc => acc.email.toLowerCase() === email.toLowerCase())) { showToast('账号已存在'); return false; } const tempId = `temp_${Date.now()}_${Math.random()}`; const defaultSub = getDefaultSubscription(); const newAccount = { id: tempId, email: email.trim(), joinedTeam: false, isGenuine: false, subscriptionStart: defaultSub.subscriptionStart, subscriptionEnd: defaultSub.subscriptionEnd, teamName: currentTeam, syncing: true }; accounts.push(newAccount); renderTable(); try { const created = await createRecord({ Email: newAccount.email, joinedTeam: false, isGenuine: false, subscriptionStart: newAccount.subscriptionStart, subscriptionEnd: newAccount.subscriptionEnd, teamName: currentTeam }); const realAcc = { id: created.id, email: created.fields.Email, joinedTeam: created.fields.joinedTeam === true, isGenuine: created.fields.isGenuine === true, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: created.fields.teamName || currentTeam, syncing: false }; const index = accounts.findIndex(a => a.id === tempId); if (index !== -1) accounts[index] = realAcc; renderTable(); showToast(`添加成功: ${email}`); return true; } catch(err) { accounts = accounts.filter(a => a.id !== tempId); renderTable(); showToast(`添加失败: ${email}`); return false; } }
    async function initApp() { const saved = localStorage.getItem(TEAM_KEY); if (saved && saved.trim()) currentTeam = saved; document.getElementById('teamNameInput').value = currentTeam; document.getElementById('currentTeamDisplay').innerText = `🏷️ 主团队: ${currentTeam}`; await loadAllCloudData(); bindEvents(); }
    showLogin();
