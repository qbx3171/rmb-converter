<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Adobe 团队管家 · 子管理员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 20%, rgba(15,35,55,0.05) 0%, rgba(10,25,40,0.08) 100%); padding: 20px 16px; min-height: 100vh; }
        .glass-panel { max-width: 1600px; margin: 0 auto; background: rgba(255,255,255,0.97); backdrop-filter: blur(2px); border-radius: 1.8rem; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #0a2b3c 0%, #1b5a6e 100%); padding: 1rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; color: white; }
        .hero-left h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .hero-left p { font-size: 0.6rem; opacity: 0.8; margin-top: 2px; }
        .stats-grid { display: flex; gap: 8px; padding: 0.8rem 1rem; background: #f9fbfd; border-bottom: 1px solid #e9eef3; flex-wrap: wrap; }
        .stat-item { background: white; border-radius: 30px; padding: 0.2rem 0.8rem; box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px #eef2f8; font-weight: 500; display: flex; align-items: baseline; gap: 5px; font-size: 0.7rem; }
        .stat-number { font-size: 1.2rem; font-weight: 800; color: #1f6e5c; line-height: 1; }
        .action-bar { padding: 0.6rem 1rem; background: white; border-bottom: 1px solid #eef2f8; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; }
        .btn-group, .sync-group { display: flex; flex-wrap: wrap; gap: 5px; }
        button, .btn-outline { background: #f1f5f9; border: none; padding: 5px 10px; border-radius: 30px; font-weight: 500; font-size: 0.7rem; cursor: pointer; transition: all 0.2s ease; color: #1e3a5f; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        button.primary { background: #1b6b5e; color: white; }
        button.accent { background: #2c5f8a; color: white; }
        button.warning { background: #fff1e5; color: #b45a2e; }
        button.danger { background: #ffe8e8; color: #c2412c; }
        button.success { background: #e0f2e9; color: #146b3a; }
        .add-section { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex: 1; }
        .add-section input { padding: 5px 10px; border-radius: 30px; border: 1px solid #cbdde9; background: white; min-width: 150px; font-size: 0.7rem; flex: 1; }
        .file-import { background: #eef2ff; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 0.5rem 0; }
        .modern-table { min-width: 700px; width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .modern-table th { text-align: left; padding: 0.6rem 0.4rem; background: #fefefe; font-weight: 600; color: #2c4c6c; border-bottom: 1px solid #e4e9f0; }
        .modern-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid #f0f3f9; vertical-align: middle; }
        .email-cell { font-family: monospace; font-weight: 500; word-break: break-all; max-width: 180px; }
        .date-input { padding: 4px 6px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 0.65rem; width: 100px; background: white; font-family: monospace; }
        .checkbox-smart { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .checkbox-smart input { width: 16px; height: 16px; accent-color: #1b6b5e; }
        .badge-team { background: #ddf3e8; color: #146b3a; border-radius: 30px; padding: 1px 6px; font-size: 0.6rem; font-weight: 600; margin-left: 4px; white-space: nowrap; }
        .delete-icon { background: none; border: none; font-size: 1rem; cursor: pointer; color: #9aaebf; padding: 2px 6px; border-radius: 30px; }
        .toast-message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a36e6; backdrop-filter: blur(12px); color: white; padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; z-index: 1000; pointer-events: none; white-space: nowrap; }
        .footer-note { padding: 0.6rem 1rem; background: #fafdff; border-top: 1px solid #eef2f8; font-size: 0.6rem; color: #6a7c8f; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; display: none; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 1.5rem; padding: 1.5rem 1.2rem; width: 280px; text-align: center; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.5); }
        .login-card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; color: #1e3a5f; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .login-card p { font-size: 0.7rem; color: #6c86a3; margin-bottom: 1rem; }
        .login-card input { width: 100%; padding: 8px 12px; margin: 0.5rem 0; border: 1px solid #cbdde9; border-radius: 40px; font-size: 0.85rem; background: white; outline: none; text-align: center; }
        .login-card input:focus { border-color: #1b6b5e; box-shadow: 0 0 0 2px rgba(27,107,94,0.2); }
        .login-card button { background: linear-gradient(135deg, #1b6b5e, #0f5348); color: white; border: none; padding: 8px 16px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        .login-card button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .login-card .error { color: #c2412c; font-size: 0.65rem; margin-top: 0.5rem; }
        .team-info-bar {
            background: #eef2ff;
            border-radius: 0.8rem;
            margin: 0.5rem 1rem;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .team-info-bar .team-name { color: #1e6bdf; font-weight: 700; }
        .team-info-bar button { background: #1b6b5e; color: white; border: none; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; cursor: pointer; }
        .team-info-bar .btn-change-pwd { background: #2c5f8a; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .hero-left h1 { font-size: 1rem; }
            .stat-item { font-size: 0.6rem; }
            .stat-number { font-size: 1rem; }
            button, .btn-outline { font-size: 0.65rem; padding: 4px 8px; }
            .add-section input { font-size: 0.65rem; min-width: 120px; }
            .date-input { width: 85px; }
            .modern-table th, .modern-table td { padding: 0.4rem 0.3rem; }
        }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 子管理员登录</h2>
        <p>请输入用户名和密码</p>
        <input type="text" id="subUsername" placeholder="用户名" autocomplete="off">
        <input type="password" id="subPassword" placeholder="密码" autocomplete="off">
        <button id="loginBtn">登录</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
<div class="glass-panel">
    <div class="hero">
        <div class="hero-left">
            <h1>📋 Adobe 团队管家 · 子管理员</h1>
            <p>所有操作自动记录日志 · 主管理员实时可见</p>
        </div>
    </div>

    <div id="teamInfoBar" class="team-info-bar" style="display: none;">

    <div class="stats-grid">

        <div class="stat-item">⏳ 即将过期 <span class="stat-number" id="expiringCount">0</span></div>
    </div>
    <div class="action-bar">
        <div class="btn-group">
            <button id="batchJoinTeam" class="primary">➕ 批量加入</button>
            <button id="batchLeaveTeam" class="warning">➖ 批量移出</button>
            <button id="batchSetGenuine" class="primary">⭐ 批量正版</button>
            <button id="batchRemoveGenuine" class="warning">🔄 取消正版</button>
            <button id="deleteSelectedBtn" class="danger">🗑️ 删除选中</button>
        </div>
        <div class="sync-group">
            <button id="refreshFromCloud" class="accent">🔄 刷新</button>
            <button id="exportJsonBtn" class="">💾 导出JSON</button>
            <label for="importJsonInput" class="btn-outline" style="cursor:pointer;">📂 导入JSON</label>
            <input type="file" id="importJsonInput" accept=".json" style="display:none">

    </div>
    <div class="action-bar" style="border-top: none; padding-top: 0; flex-wrap: wrap;">
        <div class="add-section">
            <input type="email" id="newEmailInput" placeholder="单个邮箱添加 ...">
            <button id="addAccountBtn" class="primary">➕ 添加</button>
            <label for="txtImportInput" class="btn-outline file-import" style="cursor:pointer;">📄 从TXT导入</label>
            <input type="file" id="txtImportInput" accept=".txt" style="display:none">

    <div class="table-container">
        <table class="modern-table" id="accountTable">
            <thead><tr><th style="width:30px;"><input type="checkbox" id="selectAllCheckbox"></th><th>邮箱地址</th><th>团队状态</th><th>Adobe正版</th><th>订阅起始</th><th>到期时间</th><th>所属团队</th><th style="width:40px;"></th></thead>
            <tbody id="tableBody"><tr><td colspan="8" style="text-align:center; padding:40px;">⏳ 加载中...</td></tr></tbody>
        </table>
    </div>
    <div class="footer-note">
        <span>⚡ 所有操作实时写入Airtable · 主管理员同步可见 · 操作日志自动记录</span>
        <span id="currentTeamDisplay"></span>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div>⏳ 处理中...</div></div>
</div>

<script>
    // ================= 配置 =================
    const AIRTABLE_TOKEN = "patlLxSFx112EGSkC.eb05637ecfaa9c618deb159bbb5ce78c82680898975ed3cd6da73e72f316c586";
    const BASE_ID = "appKUCGZCrZIH51dG";
    const ADMINS_TABLE = "admins";
    const ACCOUNTS_TABLE = "accounts";
    const LOGS_TABLE = "logs";

    const loginOverlay = document.getElementById('loginOverlay');
    const mainContent = document.getElementById('mainContent');
    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('subUsername');
    const passwordInput = document.getElementById('subPassword');
    const loginError = document.getElementById('loginError');

    let accounts = [];
    let currentUserTeam = "";
    let currentAdminRecordId = "";
    let currentUsername = "";
    let dateSyncTimeout = null;

    // ================= 日期工具 =================
    function parseToStandardDate(input) {
        if (!input || typeof input !== 'string') return null;
        let str = input.trim();
        let parts = str.split(/[-/\.]/);
        if (parts.length === 3) {
            let year = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10) - 1;
            let day = parseInt(parts[2], 10);
            if (!isNaN(year) && !isNaN(month) && !isNaN(day)) {
                let date = new Date(year, month, day);
                if (date.getFullYear() === year && date.getMonth() === month && date.getDate() === day) return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            }
        }
        let d = new Date(str);
        if (!isNaN(d.getTime())) { let y = d.getFullYear(); let m = String(d.getMonth()+1).padStart(2,'0'); let day = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
        return null;
    }
    function addOneYearToDateStr(dateStr) {
        let std = parseToStandardDate(dateStr);
        if (!std) return "";
        let [year, month, day] = std.split('-').map(Number);
        let newDate = new Date(year, month-1, day);
        newDate.setFullYear(newDate.getFullYear() + 1);
        return `${newDate.getFullYear()}-${String(newDate.getMonth()+1).padStart(2,'0')}-${String(newDate.getDate()).padStart(2,'0')}`;
    }
    function todayStandard() { let d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getDefaultSubscription() { let start = todayStandard(); return { subscriptionStart: start, subscriptionEnd: addOneYearToDateStr(start) }; }
    function daysRemaining(endDateStr) {
        let stdEnd = parseToStandardDate(endDateStr);
        if (!stdEnd) return Infinity;
        let today = new Date(); today.setHours(0,0,0,0);
        let end = new Date(stdEnd);
        if (isNaN(end.getTime())) return Infinity;
        return Math.ceil((end - today) / (1000*60*60*24));
    }
    function showToast(msg, duration=2500) { let existing = document.querySelector('.toast-message'); if(existing) existing.remove(); let toast = document.createElement('div'); toast.className='toast-message'; toast.textContent=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(), duration); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ================= 日志写入（增强版，带详细日志）=================
    async function addAccountLog(operation, targetEmail, extraInfo = '') {
        const timestamp = new Date().toISOString();
        const operator = currentUsername || '子管理员';
        console.log('[LOG] 准备写入日志:', { operation, targetEmail, extraInfo, timestamp, operator });
        try {
            const url = `https://api.airtable.com/v0/${BASE_ID}/${LOGS_TABLE}`;
            const payload = {
                fields: {
                    operation: operation,
                    targetUsername: targetEmail,
                    extraInfo: extraInfo,
                    timestamp: timestamp,
                    operator: operator
                }
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const responseData = await response.json();
            if (!response.ok) {
                console.error('[LOG] 写入失败:', response.status, responseData);
                showToast(`⚠️ 日志记录失败: ${responseData.error?.message || '未知错误'}，请检查logs表字段`, 4000);
            } else {
                console.log('[LOG] 写入成功:', responseData);
                showToast(`📝 操作已记录日志`, 1500);
            }
        } catch(e) {
            console.error('[LOG] 网络错误:', e);
            showToast(`⚠️ 日志记录网络错误: ${e.message}`, 4000);
        }
    }

    // ================= Airtable 通用请求 =================
    async function fetchAllRecords(table) {
        let url = `https://api.airtable.com/v0/${BASE_ID}/${table}?pageSize=100`;
        let all=[], offset=null;
        do {
            let fetchUrl = url + (offset ? `&offset=${offset}` : '');
            const resp = await fetch(fetchUrl, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            all = all.concat(data.records);
            offset = data.offset;
        } while (offset);
        return all;
    }

    async function updateSingleRecord(account, showSuccessToast = true) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ACCOUNTS_TABLE}/${account.id}`;
        const resp = await fetch(url, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { Email: account.email, joinedTeam: account.joinedTeam, isGenuine: account.isGenuine, subscriptionStart: account.subscriptionStart, subscriptionEnd: account.subscriptionEnd, teamName: account.teamName } })
        });
        if (!resp.ok) throw new Error(`更新失败 ${resp.status}`);
        if (showSuccessToast) showToast("已保存");
        return await resp.json();
    }

    async function createRecord(fields) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ACCOUNTS_TABLE}`;
        const resp = await fetch(url, { method: 'POST', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields }) });
        if (!resp.ok) throw new Error(`创建失败 ${resp.status}`);
        return await resp.json();
    }

    async function deleteRecord(recordId) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${ACCOUNTS_TABLE}/${recordId}`;
        const resp = await fetch(url, { method: 'DELETE', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
        if (!resp.ok) throw new Error(`删除失败 ${resp.status}`);
    }

    async function batchUpdateRecords(accountsToUpdate) {
        const batchSize = 5;
        for (let i = 0; i < accountsToUpdate.length; i += batchSize) {
            const batch = accountsToUpdate.slice(i, i + batchSize);
            await Promise.all(batch.map(acc => updateSingleRecord(acc, false)));
            await new Promise(r => setTimeout(r, 30));
        }
    }

    async function batchUpdateTeamName(recordsToUpdate, newTeamName) {
        const batchSize = 10;
        for (let i = 0; i < recordsToUpdate.length; i += batchSize) {
            const batch = recordsToUpdate.slice(i, i + batchSize);
            const updates = batch.map(rec => ({ id: rec.id, fields: { teamName: newTeamName } }));
            const url = `https://api.airtable.com/v0/${BASE_ID}/${ACCOUNTS_TABLE}`;
            const resp = await fetch(url, { method: 'PATCH', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ records: updates }) });
            if (!resp.ok) throw new Error(`批量更新失败: ${resp.status}`);
            await new Promise(r => setTimeout(r, 50));
        }
    }

    // ================= 业务逻辑 =================
    async function loadFromCloud() {
        try {
            const records = await fetchAllRecords(ACCOUNTS_TABLE);
            let allAccounts = records.map(rec => ({
                id: rec.id, email: rec.fields.Email,
                joinedTeam: rec.fields.joinedTeam === true,
                isGenuine: rec.fields.isGenuine === true,
                subscriptionStart: rec.fields.subscriptionStart || getDefaultSubscription().subscriptionStart,
                subscriptionEnd: rec.fields.subscriptionEnd || getDefaultSubscription().subscriptionEnd,
                teamName: rec.fields.teamName || ''
            }));
            accounts = allAccounts.filter(acc => acc.teamName === currentUserTeam);
            renderTable();
        } catch(e) { console.error(e); showToast("加载云端数据失败"); }
    }

    async function updateOwnTeamName(newTeamName) {
        if (!newTeamName.trim()) { showToast("团队名称不能为空"); return false; }
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            const urlAdmin = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${currentAdminRecordId}`;
            const respAdmin = await fetch(urlAdmin, { method: 'PATCH', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { teamName: newTeamName } }) });
            if (!respAdmin.ok) throw new Error(`更新管理员记录失败`);
            const recordsToUpdate = accounts.filter(acc => acc.teamName === currentUserTeam);
            if (recordsToUpdate.length > 0) await batchUpdateTeamName(recordsToUpdate, newTeamName);
            currentUserTeam = newTeamName;
            document.getElementById('currentTeamNameDisplay').innerText = currentUserTeam;
            document.getElementById('currentTeamDisplay').innerHTML = `🏷️ 当前团队: ${currentUserTeam}`;
            await loadFromCloud();
            await addAccountLog('✏️ 修改团队名称', '系统', `团队名称变更为“${newTeamName}”，影响 ${recordsToUpdate.length} 个账号`);
            showToast(`团队名称已更新为“${newTeamName}”，共更新 ${recordsToUpdate.length} 个客户`);
            return true;
        } catch (err) { console.error(err); showToast("更新失败，请重试"); return false; }
        finally { overlay.style.display = 'none'; }
    }

    async function updateOwnPassword(newPassword) {
        if (!newPassword.trim()) { showToast("密码不能为空"); return false; }
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            const url = `https://api.airtable.com/v0/${BASE_ID}/${ADMINS_TABLE}/${currentAdminRecordId}`;
            const resp = await fetch(url, { method: 'PATCH', headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ fields: { password: newPassword } }) });
            if (!resp.ok) throw new Error(`更新密码失败`);
            await addAccountLog('🔑 修改登录密码', currentUsername, '密码已变更');
            showToast("密码已更新，下次登录请使用新密码");
            return true;
        } catch (err) { console.error(err); showToast("更新密码失败，请重试"); return false; }
        finally { overlay.style.display = 'none'; }
    }

    async function addAccount(emailRaw) {
        const email = emailRaw.trim();
        if (!email) { showToast('邮箱不能为空'); return false; }
        if (!/^\S+@\S+\.\S+$/.test(email)) { showToast('邮箱格式无效'); return false; }
        if (accounts.some(acc => acc.email.toLowerCase() === email.toLowerCase())) { showToast('账号已存在'); return false; }
        let sub = getDefaultSubscription();
        const newFields = { Email: email, joinedTeam: false, isGenuine: false, subscriptionStart: sub.subscriptionStart, subscriptionEnd: sub.subscriptionEnd, teamName: currentUserTeam };
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            const created = await createRecord(newFields);
            accounts.push({ id: created.id, email: created.fields.Email, joinedTeam: created.fields.joinedTeam, isGenuine: created.fields.isGenuine, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: created.fields.teamName });
            renderTable();
            await addAccountLog('➕ 添加邮箱账号', email, `所属团队: ${currentUserTeam}`);
            showToast(`添加成功: ${email}`);
            return true;
        } catch(e) { showToast("添加失败，请重试"); return false; }
        finally { overlay.style.display = 'none'; }
    }

    async function deleteSelected() {
        const indices = getSelectedIndices();
        if (indices.length === 0) { showToast('没有选中任何账号'); return; }
        if (!confirm(`永久删除 ${indices.length} 个账号？`)) return;
        const toDelete = indices.map(i => accounts[i]);
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            for (let i = 0; i < toDelete.length; i += 5) {
                const batch = toDelete.slice(i, i+5);
                await Promise.all(batch.map(acc => deleteRecord(acc.id)));
            }
            const deletedEmails = toDelete.map(acc => acc.email).join(', ');
            accounts = accounts.filter((_, idx) => !indices.includes(idx));
            renderTable();
            await addAccountLog('🗑️ 批量删除邮箱账号', `${toDelete.length} 个账号`, `邮箱列表: ${deletedEmails.substring(0, 200)}`);
            showToast(`已删除 ${toDelete.length} 个账号`);
        } catch (err) { showToast("删除失败，请重试"); }
        finally { overlay.style.display = 'none'; }
    }

    async function batchUpdate(property, newValue) {
        const indices = getSelectedIndices();
        if (indices.length === 0) { showToast('请至少勾选一个账号'); return; }
        const toUpdate = [];
        for (let idx of indices) {
            if (accounts[idx]) {
                accounts[idx][property] = newValue;
                toUpdate.push(accounts[idx]);
            }
        }
        renderTable();
        if (toUpdate.length === 0) return;
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            await batchUpdateRecords(toUpdate);
            const opName = property === 'joinedTeam' ? (newValue ? '批量加入团队' : '批量移出团队') : (newValue ? '批量标记正版' : '批量取消正版');
            const targetInfo = toUpdate.map(acc => acc.email).join(', ');
            await addAccountLog(opName, `${toUpdate.length} 个账号`, `操作对象: ${targetInfo.substring(0, 200)}`);
            showToast(`已更新 ${toUpdate.length} 个账号的${property === 'joinedTeam' ? '团队状态' : '正版状态'}`);
        } catch (err) { showToast("同步失败，请重试"); }
        finally { overlay.style.display = 'none'; }
    }

        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        try {
            for (let acc of accounts) await deleteRecord(acc.id);
            const defaultEmails = ["chenshe2007@outlook.com","ChenGorGor@outlook.com","AdobeCloud999@outlook.com","AdobeCloud1888@outlook.com","qzkm68e4@outlook.com","jantek1000@gmail.com","hello@tanlineproject.biz","wuyiping315@outlook.com","dibox.diego@gmail.com","2571138584@qq.com","Adoblife8888@outlook.com","panjingru0210@outlook.com","3168551@qq.com","molanjunfeng@outlook.com","liubabya@outlook.com","wudie881031@gmail.com","llllynn076@gmail.com","sharkmoment2018@outlook.com","Gscf7890@outlook.com","wangjian@liangzao.wang","imwangyeah@gmail.com","ezaiezaixse@gmail.com","xiaoxuelian121@outlook.com","libaozeng038@gmail.com","t15651116661@gmail.com","threefinger520@outlook.com","qiangqiangx2@gmail.com","zhshy0506@gmail.com","DAFAWW124@outlook.com","1468890279@qq.com","jun6hao0719@gmail.com"];
            let newAccounts = [];
            for (let email of defaultEmails) {
                let sub = getDefaultSubscription();
                const created = await createRecord({ Email: email, joinedTeam: false, isGenuine: false, subscriptionStart: sub.subscriptionStart, subscriptionEnd: sub.subscriptionEnd, teamName: currentUserTeam });
                newAccounts.push({ id: created.id, email: created.fields.Email, joinedTeam: created.fields.joinedTeam, isGenuine: created.fields.isGenuine, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: created.fields.teamName });

            showToast('已重置为默认账号列表');
        } catch (err) { showToast("重置失败，请重试"); }

    function exportToJson() {
        const exportData = accounts.map(({ id, ...rest }) => rest);
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `adobe_team_${todayStandard()}.json`; a.click(); URL.revokeObjectURL(a.href);
        showToast('导出JSON成功');
    }

    async function importFromJson(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (!Array.isArray(imported)) throw new Error();
                const overlay = document.getElementById('loadingOverlay');
                overlay.style.display = 'flex';
                for (let acc of accounts) await deleteRecord(acc.id);
                accounts = [];
                for (let i = 0; i < imported.length; i += 5) {
                    const batch = imported.slice(i, i+5);
                    await Promise.all(batch.map(async (item) => {
                        if (!item.email) return;
                        const fields = { Email: item.email, joinedTeam: !!item.joinedTeam, isGenuine: !!item.isGenuine, subscriptionStart: item.subscriptionStart || getDefaultSubscription().subscriptionStart, subscriptionEnd: item.subscriptionEnd || addOneYearToDateStr(item.subscriptionStart || todayStandard()), teamName: currentUserTeam };
                        const created = await createRecord(fields);
                        accounts.push({ id: created.id, email: created.fields.Email, joinedTeam: created.fields.joinedTeam, isGenuine: created.fields.isGenuine, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: created.fields.teamName });
                    }));
                }
                renderTable();
                await addAccountLog('📂 导入JSON', `${imported.length} 个账号`, `来源文件: ${file.name}`);
                showToast(`导入 ${accounts.length} 个账号`);
            } catch(err) { showToast('JSON文件无效'); }
            finally { overlay.style.display = 'none'; }
        };
        reader.readAsText(file);
    }

    async function importFromTxt(file, autoJoinTeam) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split(/\r?\n/);
            const emailsToAdd = [];
            for (let line of lines) {
                let email = line.trim();
                if (email === "") continue;
                if (!/^\S+@\S+\.\S+$/.test(email)) continue;
                if (accounts.some(acc => acc.email.toLowerCase() === email.toLowerCase())) continue;
                emailsToAdd.push(email);
            }
            if (emailsToAdd.length === 0) { showToast(`没有新增账号`); return; }
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            try {
                for (let i = 0; i < emailsToAdd.length; i += 5) {
                    const batch = emailsToAdd.slice(i, i+5);
                    await Promise.all(batch.map(async (email) => {
                        let sub = getDefaultSubscription();
                        const fields = { Email: email, joinedTeam: autoJoinTeam, isGenuine: false, subscriptionStart: sub.subscriptionStart, subscriptionEnd: sub.subscriptionEnd, teamName: currentUserTeam };
                        const created = await createRecord(fields);
                        accounts.push({ id: created.id, email: created.fields.Email, joinedTeam: created.fields.joinedTeam, isGenuine: created.fields.isGenuine, subscriptionStart: created.fields.subscriptionStart, subscriptionEnd: created.fields.subscriptionEnd, teamName: created.fields.teamName });
                    }));
                }
                renderTable();
                await addAccountLog('📄 从TXT导入', `${emailsToAdd.length} 个账号`, `自动加入团队: ${autoJoinTeam ? '是' : '否'}`);
                showToast(`TXT导入完成: 新增 ${emailsToAdd.length} 个账号`);
            } catch(err) { showToast("导入失败，请重试"); }
            finally { overlay.style.display = 'none'; }
        };
        reader.readAsText(file, 'UTF-8');
    }

    // ================= UI 渲染 =================
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        let joinedTotal = 0, genuineTotal = 0;
        accounts.forEach((acc, idx) => {
            if (acc.joinedTeam) joinedTotal++;
            if (acc.isGenuine) genuineTotal++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="row-selector" data-index="${idx}"></td>
                <td class="email-cell">${escapeHtml(acc.email)}</td>
                <td><label class="checkbox-smart"><input type="checkbox" class="team-checkbox" data-index="${idx}" ${acc.joinedTeam ? 'checked' : ''}><span>${acc.joinedTeam ? `已加入 ${currentUserTeam}` : '未加入'}</span>${acc.joinedTeam ? `<span class="badge-team">${currentUserTeam.length > 10 ? currentUserTeam.slice(0,8)+'..' : currentUserTeam}</span>` : ''}</label></td>
                <td><label class="checkbox-smart"><input type="checkbox" class="genuine-checkbox" data-index="${idx}" ${acc.isGenuine ? 'checked' : ''}><span>${acc.isGenuine ? '✅ 正版' : '⭕ 未认证'}</span></label></td>
                <td><input type="text" class="date-input" data-index="${idx}" data-field="subscriptionStart" value="${escapeHtml(acc.subscriptionStart || '')}" placeholder="YYYY-MM-DD"></td>
                <td><input type="text" class="date-input" data-index="${idx}" data-field="subscriptionEnd" value="${escapeHtml(acc.subscriptionEnd || '')}" placeholder="YYYY-MM-DD"></td>
                <td>${escapeHtml(acc.teamName)}</td>
                <td><button class="delete-icon" data-index="${idx}">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('totalAccounts').innerText = accounts.length;
        document.getElementById('joinedTeamCount').innerText = joinedTotal;
        document.getElementById('genuineCount').innerText = genuineTotal;
        document.getElementById('expiringCount').innerText = accounts.filter(acc => daysRemaining(acc.subscriptionEnd) <= 30).length;
        const allSelectors = document.querySelectorAll('.row-selector');
        const selectAllChk = document.getElementById('selectAllCheckbox');
        if (selectAllChk) {
            const checkedCount = Array.from(allSelectors).filter(cb => cb.checked).length;
            selectAllChk.checked = (checkedCount === allSelectors.length && allSelectors.length > 0);
            selectAllChk.indeterminate = (checkedCount > 0 && checkedCount < allSelectors.length);
        }
    }

    function getSelectedIndices() {
        return Array.from(document.querySelectorAll('.row-selector:checked')).map(cb => parseInt(cb.dataset.index)).filter(i => !isNaN(i));
    }

    function handleDateChange(e) {
        if (e.target && e.target.classList && e.target.classList.contains('date-input')) {
            const idx = parseInt(e.target.dataset.index);
            const field = e.target.dataset.field;
            if (isNaN(idx) || !accounts[idx]) return;
            let rawValue = e.target.value.trim();
            if (rawValue === "") { showToast("日期不能为空"); e.target.value = accounts[idx][field]; return; }
            let stdDate = parseToStandardDate(rawValue);
            if (!stdDate) { showToast(`日期格式无效，请使用 YYYY-MM-DD 格式`); e.target.value = accounts[idx][field]; return; }
            const acc = accounts[idx];
            if (field === 'subscriptionStart') {
                acc.subscriptionStart = stdDate;
                acc.subscriptionEnd = addOneYearToDateStr(stdDate);
                showToast(`订阅起始已更新为 ${stdDate}，到期自动顺延`);
            } else if (field === 'subscriptionEnd') {
                acc.subscriptionEnd = stdDate;
                showToast(`到期日期已更新为 ${stdDate}`);
            }
            renderTable();
            if (dateSyncTimeout) clearTimeout(dateSyncTimeout);
            dateSyncTimeout = setTimeout(async () => {
                try {
                    await updateSingleRecord(acc, false);
                    await addAccountLog('📅 修改订阅日期', acc.email, `${field}: ${stdDate}`);
                    showToast("日期已同步");
                } catch (err) { showToast("同步失败，请重试"); }
            }, 500);
        }
    }

    async function deleteAccountByIndex(index) {
        if (index >= 0 && index < accounts.length && confirm(`删除 ${accounts[index].email} ？`)) {
            const acc = accounts[index];
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            try {
                await deleteRecord(acc.id);
                accounts.splice(index, 1);
                renderTable();
                await addAccountLog('🗑️ 删除邮箱账号', acc.email, '单个删除');
                showToast('已删除');
            } catch (err) { showToast("删除失败"); }
            finally { overlay.style.display = 'none'; }
        }
    }

    function bindEvents() {
        const tbody = document.getElementById('tableBody');
        tbody?.addEventListener('change', async (e) => {
            if (e.target.classList.contains('team-checkbox')) {
                const idx = parseInt(e.target.dataset.index);
                if (!isNaN(idx) && accounts[idx]) {
                    accounts[idx].joinedTeam = e.target.checked;
                    renderTable();
                    showToast("保存中...");
                    try {
                        await updateSingleRecord(accounts[idx], false);
                        await addAccountLog(e.target.checked ? '✅ 加入团队' : '❌ 移出团队', accounts[idx].email, `团队: ${currentUserTeam}`);
                        showToast("团队状态已同步");
                    } catch(err) { showToast("同步失败"); }
                }
            }
            if (e.target.classList.contains('genuine-checkbox')) {
                const idx = parseInt(e.target.dataset.index);
                if (!isNaN(idx) && accounts[idx]) {
                    accounts[idx].isGenuine = e.target.checked;
                    renderTable();
                    showToast("保存中...");
                    try {
                        await updateSingleRecord(accounts[idx], false);
                        await addAccountLog(e.target.checked ? '⭐ 标记正版' : '🔄 取消正版', accounts[idx].email, '状态变更');
                        showToast("正版状态已同步");
                    } catch(err) { showToast("同步失败"); }
                }
            }
        });
        tbody?.addEventListener('blur', handleDateChange, true);
        tbody?.addEventListener('click', (e) => { if (e.target.classList.contains('delete-icon')) deleteAccountByIndex(parseInt(e.target.dataset.index)); });
        document.getElementById('selectAllCheckbox')?.addEventListener('change', (e) => document.querySelectorAll('.row-selector').forEach(cb => cb.checked = e.target.checked));
        document.getElementById('batchJoinTeam')?.addEventListener('click', () => batchUpdate('joinedTeam', true));
        document.getElementById('batchLeaveTeam')?.addEventListener('click', () => batchUpdate('joinedTeam', false));
        document.getElementById('batchSetGenuine')?.addEventListener('click', () => batchUpdate('isGenuine', true));
        document.getElementById('batchRemoveGenuine')?.addEventListener('click', () => batchUpdate('isGenuine', false));
        document.getElementById('deleteSelectedBtn')?.addEventListener('click', deleteSelected);
        document.getElementById('addAccountBtn')?.addEventListener('click', () => { const inp = document.getElementById('newEmailInput'); if (inp.value && addAccount(inp.value)) inp.value = ''; });
        document.getElementById('resetDefaultBtn')?.addEventListener('click', resetToDefault);
        document.getElementById('exportJsonBtn')?.addEventListener('click', exportToJson);
        document.getElementById('refreshFromCloud')?.addEventListener('click', async () => { showToast("刷新中..."); await loadFromCloud(); showToast("刷新完成"); });
        document.getElementById('importJsonInput')?.addEventListener('change', (e) => { if (e.target.files[0]) importFromJson(e.target.files[0]); e.target.value = ''; });
        document.getElementById('txtImportInput')?.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                const autoJoin = confirm('是否将导入的所有账号自动加入当前团队？\n点击“确定”则自动加入，点击“取消”仅添加账号不加入团队。');
                importFromTxt(e.target.files[0], autoJoin);
            }
            e.target.value = '';
        });
        document.getElementById('newEmailInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const inp = e.target; if (inp.value && addAccount(inp.value)) inp.value = ''; } });
        document.getElementById('changeTeamNameBtn')?.addEventListener('click', async () => {
            const newTeam = prompt("请输入新的团队名称：", currentUserTeam);
            if (newTeam && newTeam.trim() !== currentUserTeam) await updateOwnTeamName(newTeam.trim());
        });
        document.getElementById('changePasswordBtn')?.addEventListener('click', async () => {
            const newPwd = prompt("请输入新的登录密码：");
            if (newPwd && newPwd.trim()) await updateOwnPassword(newPwd.trim());
            else if (newPwd !== null) showToast("密码不能为空");
        });
    }

    // ================= 登录验证 =================
    async function verifySubAdmin() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!username || !password) { loginError.textContent = "请输入用户名和密码"; return false; }
        try {
            const records = await fetchAllRecords(ADMINS_TABLE);
            const found = records.find(rec => rec.fields.username === username && rec.fields.password === password);
            if (found) {
                currentAdminRecordId = found.id;
                currentUserTeam = found.fields.teamName || "";
                currentUsername = username;
                loginOverlay.style.display = 'none';
                mainContent.style.display = 'block';
                const teamInfoBar = document.getElementById('teamInfoBar');
                teamInfoBar.style.display = 'flex';
                document.getElementById('currentTeamNameDisplay').innerText = currentUserTeam || "未设置";
                document.getElementById('currentTeamDisplay').innerHTML = `🏷️ 当前团队: ${currentUserTeam || "未设置"}`;
                if (currentUserTeam) {
                    await loadFromCloud();
                    bindEvents();
                } else {
                    setTimeout(async () => {
                        const newTeam = prompt("请设置您的团队名称：");
                        if (newTeam && newTeam.trim()) {
                            await updateOwnTeamName(newTeam.trim());
                            await loadFromCloud();
                            bindEvents();
                        } else {
                            showToast("必须设置团队名称才能继续使用");
                        }
                    }, 100);
                }
                return true;
            } else {
                loginError.textContent = "用户名或密码错误";
                return false;
            }
        } catch(e) {
            loginError.textContent = "验证失败，请重试";
            return false;
        }
    }

    loginBtn.addEventListener('click', verifySubAdmin);
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifySubAdmin(); });
    usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifySubAdmin(); });
</script>
