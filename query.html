<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Adobe 订阅查询 – 跳转助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #eef2f9 0%, #d9e2ef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Inter', sans-serif;
            padding: 1.5rem;
        }

        /* 卡片容器 */
        .redirect-card {
            max-width: 560px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: transform 0.2s ease;
            text-align: center;
        }

        /* 头部渐变区域 */
        .card-header {
            background: linear-gradient(135deg, #0a2b3c 0%, #1b5a6e 100%);
            padding: 2rem 1.5rem;
            color: white;
        }

        .card-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .card-header p {
            opacity: 0.85;
            font-size: 0.95rem;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            margin-top: 1rem;
        }

        /* 内容区域 */
        .card-body {
            padding: 2rem 2rem 2rem 2rem;
            background: white;
        }

        /* 主要的跳转按钮 */
        .jump-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1b6b5e;
            color: white;
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(27, 107, 94, 0.3);
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .jump-button:hover {
            background: #0f554a;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(27, 107, 94, 0.4);
        }

        .jump-button:active {
            transform: translateY(1px);
        }

        /* 提示文字 */
        .info-text {
            margin-top: 2rem;
            color: #4a627a;
            font-size: 0.85rem;
            border-top: 1px solid #eef2f8;
            padding-top: 1.5rem;
        }

        .info-text a {
            color: #1b6b5e;
            text-decoration: none;
            font-weight: 500;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .footer-note {
            background: #fafcff;
            border-top: 1px solid #eef2f8;
            padding: 1rem 1.5rem;
            font-size: 0.7rem;
            color: #6a7c8f;
            text-align: center;
        }

        @media (max-width: 550px) {
            .card-header h1 { font-size: 1.4rem; }
            .jump-button { padding: 12px 24px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="redirect-card">
    <div class="card-header">
        <h1>🔍 Adobe 订阅查询</h1>
        <p>前往官方查询平台，实时查看团队授权与订阅状态</p>
        <div class="badge">⚡ 数据同步 · 安全快捷</div>
    </div>
    <div class="card-body">
        <a href="https://reseller.ado-besoft.com/status" target="_blank" rel="noopener noreferrer" class="jump-button">
            <span>🚀 前往查询</span>
            <span>→</span>
        </a>
        <div class="info-text">
            💡 点击后将在新标签页打开 <strong>Adobe 授权查询系统</strong><br>
            无需重复输入，页面由官方提供，信息实时可靠。
        </div>
    </div>
    <div class="footer-note">
        ✨ 如有团队加入或续期问题，请联系您的经销商或管理员。<br>
        本页面仅作为跳转入口，不保存任何个人数据。
    </div>
</div>
</body>
</html>
