<!-- 高级动态客服组件 - 可拖拽，机器人“乐哲麦” -->
<style>
    .chatbot-container {
        position: fixed;
        z-index: 200;
        font-family: 'Inter', sans-serif;

        flex-direction: column;

        transition: all 0.2s ease;
    }
    .chat-header {
        background: linear-gradient(125deg, #1E6DFF, #8B5CF6);
        color: white;
        padding: 18px 20px;
        font-weight: 700;
        display: flex;

        user-select: none;

    }
    .chat-header:active {
        cursor: grabbing;
    }
    .chat-header span {
        font-size: 16px;
        letter-spacing: -0.2px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .chat-header span i {
        font-size: 22px;
    }
    .chat-close {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        font-size: 18px;
        width: 28px;
        height: 28px;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .chat-close:hover {
        background: rgba(255,255,255,0.4);
    }
    .chat-messages {
        flex: 1;
        padding: 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
        background: rgba(248, 250, 253, 0.6);

    .message {
        max-width: 85%;
        padding: 10px 16px;
        border-radius: 24px;

        line-height: 1.45;
        word-wrap: break-word;
        animation: fadeInUp 0.2s ease;
        box-shadow: 0 1px 1px rgba(0,0,0,0.05);

    @keyframes fadeInUp {

    .message.customer {

    .message strong {

<div class="chatbot-container" id="chatbotContainer">
    <div class="chat-toggle" id="chatToggleBtn">
        <i class="fas fa-comment-dots"></i>
    </div>
    <div class="chat-window" id="chatWindow" style="display: none;">
        <div class="chat-header" id="chatHeaderDrag">
            <span><i class="fas fa-robot"></i> 乐哲麦 · 智能客服</span>
            <button class="chat-close" id="chatCloseBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-messages" id="chatMessagesList">
            <!-- 欢迎语将由 js 动态生成，确保内容一致 -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="输入您的需求或问题...">
            <button id="chatSendBtn">发送</button>
        </div>
        <div class="chat-status" id="chatStatus">✨ 在线 · 乐哲麦为您服务</div>
    </div>
</div>

<script>
    // ==================== 客服系统（带机器人自动回复 + 高级UI） ====================
    (function() {
        let clientId = localStorage.getItem('lezhe_client_id');
        if (!clientId) {
            clientId = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('lezhe_client_id', clientId);
        }
        
        const STORAGE_KEY = 'lezhe_chat_messages';
        // 机器人的固定回复内容
        const BOT_REPLY_TEXT = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～";
        
        function getAllMessages() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return [];
            try { return JSON.parse(raw); } catch(e) { return []; }
        }
        
        function saveAllMessages(messages) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }
        
        function addMessage(text, sender, targetClientId = null, senderName = null) {
            const messages = getAllMessages();
            const newMsg = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                clientId: targetClientId || clientId,
                text: text,
                sender: sender, // 'customer', 'bot', 'admin'
                senderName: senderName || (sender === 'customer' ? '客户' : (sender === 'bot' ? '乐哲麦' : '客服')),
                timestamp: new Date().toISOString(),
                isRead: false
            };
            messages.push(newMsg);
            saveAllMessages(messages);
            return newMsg;
        }
        
        function getMyMessages() {
            const all = getAllMessages();
            return all.filter(msg => msg.clientId === clientId).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        }
        
        function renderMessages() {
            const container = document.getElementById('chatMessagesList');
            if (!container) return;
            const msgs = getMyMessages();
            container.innerHTML = '';
            if (msgs.length === 0) {
                // 欢迎消息：机器人主动发送一条
                const welcomeDiv = document.createElement('div');
                welcomeDiv.className = 'message bot';
                welcomeDiv.innerHTML = `<strong>乐哲麦</strong>${escapeHtml(BOT_REPLY_TEXT)}`;
                container.appendChild(welcomeDiv);
                // 同时把这条欢迎消息存入存储，避免每次打开都重复添加
                const existingWelcome = msgs.some(m => m.sender === 'bot' && m.text === BOT_REPLY_TEXT);
                if (!existingWelcome) {
                    addMessage(BOT_REPLY_TEXT, 'bot', clientId, '乐哲麦');
                }
            } else {
                msgs.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.sender === 'customer' ? 'customer' : 'bot'}`;
                    const displayName = msg.sender === 'customer' ? '我' : (msg.senderName || '乐哲麦');
                    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    msgDiv.innerHTML = `<strong>${escapeHtml(displayName)}</strong>${escapeHtml(msg.text)}<small>${timeStr}</small>`;
                    container.appendChild(msgDiv);
                });
            }
            container.scrollTop = container.scrollHeight;
        }
        
        function botAutoReply() {
            const myMsgs = getMyMessages();
            // 避免重复回复：检查最后一条机器人消息是否已经是相同内容，且时间间隔小于10秒
            const lastBotMsg = [...myMsgs].reverse().find(m => m.sender === 'bot');
            if (lastBotMsg && lastBotMsg.text === BOT_REPLY_TEXT && (new Date() - new Date(lastBotMsg.timestamp) < 10000)) {
                return;
            }
            addMessage(BOT_REPLY_TEXT, 'bot', clientId, '乐哲麦');
            renderMessages();
        }
        
        function sendCustomerMessage(text) {
            if (!text.trim()) return;
            addMessage(text.trim(), 'customer', clientId, null);
            renderMessages();
            setTimeout(() => { botAutoReply(); }, 400);
            const statusSpan = document.getElementById('chatStatus');
            if (statusSpan) statusSpan.innerText = '📤 消息已发送，乐哲麦思考中...';
            setTimeout(() => {
                if (statusSpan) statusSpan.innerText = '✨ 在线 · 乐哲麦为您服务';
            }, 2000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        let pollingInterval = null;
        let chatVisible = false;
        let lastMsgCount = 0;
        
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (chatVisible) {
                    const currentMsgs = getMyMessages();
                    if (currentMsgs.length !== lastMsgCount) {
                        renderMessages();
                        lastMsgCount = currentMsgs.length;
                        const statusSpan = document.getElementById('chatStatus');
                        if (statusSpan && currentMsgs[currentMsgs.length-1]?.sender !== 'customer') {
                            statusSpan.innerText = '💬 有新消息';
                            setTimeout(() => {
                                if (statusSpan && chatVisible) statusSpan.innerText = '✨ 在线 · 乐哲麦为您服务';
                            }, 2000);
                        }
                    }
                }
            }, 3000);
        }
        
        const chatToggle = document.getElementById('chatToggleBtn');
        const chatWindow = document.getElementById('chatWindow');
        const chatClose = document.getElementById('chatCloseBtn');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatInput = document.getElementById('chatInput');
        
        function openChat() {
            chatWindow.style.display = 'flex';
            chatVisible = true;
            renderMessages();
            const msgs = getMyMessages();
            lastMsgCount = msgs.length;
            startPolling();
        }
        function closeChat() {
            chatWindow.style.display = 'none';
            chatVisible = false;
            if (pollingInterval) clearInterval(pollingInterval);
        }
        
        chatToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (chatWindow.style.display === 'none' || !chatVisible) openChat();
            else closeChat();
        });
        chatClose.addEventListener('click', closeChat);
        chatSendBtn.addEventListener('click', () => {
            sendCustomerMessage(chatInput.value);
            chatInput.value = '';
        });
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendCustomerMessage(chatInput.value);
                chatInput.value = '';
            }
        });
        
        chatWindow.style.display = 'none';
        chatVisible = false;
        
        // 拖拽
        const dragContainer = document.getElementById('chatbotContainer');
        const dragHandle = document.getElementById('chatHeaderDrag');
        let isDragging = false, startX, startY, startRight, startBottom;
        function getPos() {
            const style = window.getComputedStyle(dragContainer);
            let right = style.right, bottom = style.bottom;
            if (right === 'auto') right = '32px';
            if (bottom === 'auto') bottom = '110px';
            return { right: parseFloat(right), bottom: parseFloat(bottom) };
        }
        dragHandle.addEventListener('mousedown', (e) => {
            if (e.target.closest('.chat-close')) return;
            e.preventDefault();
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            const pos = getPos();
            startRight = pos.right; startBottom = pos.bottom;
            dragContainer.style.transition = 'none';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.clientX - startX, dy = e.clientY - startY;
            let newRight = startRight - dx, newBottom = startBottom - dy;
            const maxRight = window.innerWidth - 70, maxBottom = window.innerHeight - 90;
            newRight = Math.min(Math.max(10, newRight), maxRight);
            newBottom = Math.min(Math.max(10, newBottom), maxBottom);
            dragContainer.style.right = newRight + 'px';
            dragContainer.style.bottom = newBottom + 'px';
        });
        window.addEventListener('mouseup', () => { isDragging = false; dragContainer.style.transition = ''; });
        dragHandle.addEventListener('touchstart', (e) => {
            if (e.target.closest('.chat-close')) return;
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            startX = touch.clientX; startY = touch.clientY;
            const pos = getPos();
            startRight = pos.right; startBottom = pos.bottom;
            dragContainer.style.transition = 'none';
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - startX, dy = touch.clientY - startY;
            let newRight = startRight - dx, newBottom = startBottom - dy;
            const maxRight = window.innerWidth - 70, maxBottom = window.innerHeight - 90;
            newRight = Math.min(Math.max(10, newRight), maxRight);
            newBottom = Math.min(Math.max(10, newBottom), maxBottom);
            dragContainer.style.right = newRight + 'px';
            dragContainer.style.bottom = newBottom + 'px';
        });
        window.addEventListener('touchend', () => { isDragging = false; dragContainer.style.transition = ''; });
    })();
</script>

<script>

    let softwareLibrary = [

        { id: 7, name: "AutoCAD", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2025", description: "计算机辅助设计，二维绘图与三维建模行业标准", status: "pending", downloadUrl: null },
        { id: 8, name: "Maya", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2026", description: "三维动画、建模、渲染及特效软件", status: "pending", downloadUrl: null },
        { id: 9, name: "3ds Max", category: "Autodesk系列", osSupport: ["Windows"], version: "2025", description: "专业三维建模、动画与渲染，游戏开发首选", status: "uploaded", downloadUrl: "https://v6fsd03qf7.feishu.cn/drive/folder/OXY9fBtWqlWSptdr059c0dvZnFg" },
        { id: 10, name: "Sketch", category: "其他软件", osSupport: ["Mac"], version: "100", description: "轻量级UI/UX设计工具，矢量编辑与原型设计", status: "pending", downloadUrl: null },
        { id: 11, name: "Figma", category: "其他软件", osSupport: ["Windows","Mac"], version: "2026", description: "协作式界面设计工具，云端实时协作", status: "pending", downloadUrl: null },
        { id: 12, name: "Blender", category: "其他软件", osSupport: ["Windows","Mac"], version: "4.2", description: "开源全能3D创作套件，建模雕刻动画渲染", status: "pending", downloadUrl: null },
        { id: 13, name: "Revit", category: "Autodesk系列", osSupport: ["Windows"], version: "2026", description: "建筑信息模型BIM软件，建筑设计施工", status: "pending", downloadUrl: null },
        { id: 14, name: "Substance 3D Painter", category: "Adobe系列", osSupport: ["Windows","Mac"], version: "即将发布", description: "3D纹理绘制工具，物理材质渲染", status: "pending", downloadUrl: null },
        { id: 15, name: "Fusion 360", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2026 Beta", description: "云端三维CAD/CAM，工业设计协作", status: "pending", downloadUrl: null },
        { id: 16, name: "Capture One", category: "其他软件", osSupport: ["Windows","Mac"], version: "2025", description: "专业级RAW图像处理与联机拍摄", status: "pending", downloadUrl: null }
    ];
    let currentCategory = "all", currentOS = "all", currentStatus = "all", searchKeyword = "";
    const gridContainer = document.getElementById("softwareGridContainer");
    const searchInput = document.getElementById("globalSearchInput");
    const categoryBtns = document.querySelectorAll("#categoryFilters .filter-chip");
    const osBtns = document.querySelectorAll("#osFilters .filter-chip");
    const statusBtns = document.querySelectorAll("#statusFilters .filter-chip");
    
    function updateStatsUI() {
        const total = softwareLibrary.length;
        const winCount = softwareLibrary.filter(sw => sw.osSupport.includes("Windows")).length;
        const macCount = softwareLibrary.filter(sw => sw.osSupport.includes("Mac")).length;
        document.getElementById("totalCountHero").innerText = total;
        document.getElementById("windowsCountHero").innerText = winCount;
        document.getElementById("macCountHero").innerText = macCount;
    }
    function getFilteredSoftware() {
        return softwareLibrary.filter(sw => {
            if (currentCategory !== "all" && sw.category !== currentCategory) return false;
            if (currentOS !== "all" && !sw.osSupport.includes(currentOS)) return false;
            if (currentStatus !== "all" && sw.status !== currentStatus) return false;
            if (searchKeyword.trim() !== "") {
                const kw = searchKeyword.trim().toLowerCase();
                const matchName = sw.name.toLowerCase().includes(kw);
                const matchDesc = sw.description.toLowerCase().includes(kw);
                if (!matchName && !matchDesc) return false;
            }
            return true;
        });
    }
    function escapeHtmlSoft(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    function renderGrid() {
        const filtered = getFilteredSoftware();
        if (filtered.length === 0) { gridContainer.innerHTML = `<div class="empty-state"><i class="fas fa-box-open" style="font-size: 48px; opacity: 0.6;"></i><p style="margin-top: 20px; font-weight: 500;">暂无匹配的软件，试试清除筛选～</p></div>`; updateStatsUI(); return; }
        const cardsHtml = filtered.map(sw => { const hasRealLink = sw.downloadUrl && sw.downloadUrl.trim() !== ""; const displayStatus = hasRealLink ? "uploaded" : "pending"; const statusClass = displayStatus === "uploaded" ? "status-uploaded" : "status-pending"; const statusText = displayStatus === "uploaded" ? "已上传" : "待上传"; const btnClass = hasRealLink ? "btn-active" : "btn-pending"; const btnDisabled = hasRealLink ? "" : "disabled"; const btnText = hasRealLink ? '<i class="fas fa-download"></i> 下载安装包' : '<i class="fas fa-hourglass-half"></i> 待上传'; const osTagsHtml = sw.osSupport.map(os => { const icon = os === "Windows" ? '<i class="fab fa-windows"></i>' : '<i class="fab fa-apple"></i>'; return `<span class="os-badge">${icon} ${os}</span>`; }).join(''); return `<div class="software-card" data-id="${sw.id}"><div class="card-header"><span class="software-name">${escapeHtmlSoft(sw.name)}</span><span class="status-badge ${statusClass}"><i class="fas ${displayStatus === 'uploaded' ? 'fa-check-circle' : 'fa-clock'}"></i> ${statusText}</span></div><div class="version-tag">版本 ${escapeHtmlSoft(sw.version)}</div><div class="description">${escapeHtmlSoft(sw.description)}</div><div class="os-tags">${osTagsHtml}</div><button class="download-btn ${btnClass}" ${btnDisabled} data-url="${hasRealLink ? escapeHtmlSoft(sw.downloadUrl) : ''}" data-name="${escapeHtmlSoft(sw.name)}">${btnText}</button></div>`; }).join('');
        gridContainer.innerHTML = cardsHtml;
        document.querySelectorAll('.download-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const url = btn.getAttribute('data-url'); const softName = btn.getAttribute('data-name'); if (url && url.trim() !== "") { window.open(url, '_blank'); } else { alert(`⏳ “${softName}” 暂未提供下载链接，敬请期待后续上传。`); } }); });
        updateStatsUI();
    }
    function refreshAll() { renderGrid(); }
    function bindEvents() {
        categoryBtns.forEach(btn => { btn.addEventListener('click', () => { currentCategory = btn.getAttribute('data-cat'); categoryBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshAll(); }); });
        osBtns.forEach(btn => { btn.addEventListener('click', () => { currentOS = btn.getAttribute('data-os'); osBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshAll(); }); });
        statusBtns.forEach(btn => { btn.addEventListener('click', () => { currentStatus = btn.getAttribute('data-status'); statusBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshAll(); }); });
        searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; refreshAll(); });
    }
    bindEvents(); refreshAll();
</script>
