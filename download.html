<script>
    (function(){

            EMAILJS_TEMPLATE_REG: 'template_pds6dsj',
            EMAILJS_TEMPLATE_RESET: 'template_xcv0pdc'
        };

        function showToast(msg, type='success') {
            const t = document.createElement('div'); t.className = `toast-message ${type}`;
            t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-triangle'}"></i> ${msg}`;
            document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
        }
        function escapeHtml(s) { return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        // ========== 汉堡菜单交互 ==========
        const hamburger = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', function() {
            this.classList.toggle('active');
            navLinks.classList.toggle('show');
        });
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('show');
            });
        });

        // ========== 默认广告数据 ==========
        const DEFAULT_ADS = [
            { image: 'https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?auto=compress&cs=tinysrgb&w=1200&h=514&fit=crop', link: 'https://www.adobe.com/', title: 'Adobe Creative Cloud' },
            { image: 'https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg?auto=compress&cs=tinysrgb&w=1200&h=514&fit=crop', link: 'https://www.autodesk.com/', title: 'Autodesk' }
        ];
        // 顶部横幅广告也可使用相同默认广告，或单独配置，这里复用
        let bannerAds = [...DEFAULT_ADS];
        let sidebarAds = [...DEFAULT_ADS];
        
        let bannerCurrentSlide = 0, bannerInterval = null;
        let sidebarCurrentSlide = 0, sidebarInterval = null;

        // ========== 通用轮播渲染函数 ==========
        function renderCarousel(containerSlides, containerDots, ads, currentSlideObj, intervalObj, startAutoPlayFn, dotClickHandler) {
            containerSlides.innerHTML = ads.map((ad, index) => `
                <div class="${containerSlides.classList.contains('banner-carousel-slides') ? 'banner-carousel-slide' : 'sidebar-carousel-slide'}">
                    <div class="${containerSlides.classList.contains('banner-carousel-slides') ? 'banner-loading-placeholder' : 'ad-loading-placeholder'}"></div>
                    <a href="${escapeHtml(ad.link)}" target="_blank" rel="noopener noreferrer">
                        <img src="${escapeHtml(ad.image)}" alt="${escapeHtml(ad.title)}" data-index="${index}">
                    </a>
                </div>
            `).join('');
            
            containerDots.innerHTML = ads.map((_, i) => `<div class="${containerSlides.classList.contains('banner-carousel-slides') ? 'banner-carousel-dot' : 'sidebar-carousel-dot'} ${i===0?'active':''}" data-index="${i}"></div>`).join('');
            
            const slides = containerSlides.querySelectorAll(containerSlides.classList.contains('banner-carousel-slides') ? '.banner-carousel-slide' : '.sidebar-carousel-slide');
            slides.forEach((slide, i) => {
                const img = slide.querySelector('img');
                const placeholder = slide.querySelector(containerSlides.classList.contains('banner-carousel-slides') ? '.banner-loading-placeholder' : '.ad-loading-placeholder');
                if (img && placeholder) {
                    if (img.complete) {
                        placeholder.style.display = 'none';
                        img.classList.add('loaded');
                    } else {
                        img.onload = () => { placeholder.style.display = 'none'; img.classList.add('loaded'); };
                        img.onerror = () => { placeholder.style.display = 'none'; img.style.background = '#cbd5e1'; };
                    }
                    img.decoding = 'async';
                    if (i === 0) img.loading = 'eager';
                }
            });
            
            const updateFn = (index) => {
                currentSlideObj.val = index;
                containerSlides.style.transform = `translateX(-${index*100}%)`;
                containerDots.querySelectorAll(`.${containerSlides.classList.contains('banner-carousel-slides') ? 'banner-carousel-dot' : 'sidebar-carousel-dot'}`).forEach((d,i)=> d.classList.toggle('active', i===index));
                // 预加载下一张
                const nextIndex = (index + 1) % ads.length;
                if (ads[nextIndex]) {
                    const preloadImg = new Image();
                    preloadImg.src = ads[nextIndex].image;
                }
            };
            
            containerDots.querySelectorAll(`.${containerSlides.classList.contains('banner-carousel-slides') ? 'banner-carousel-dot' : 'sidebar-carousel-dot'}`).forEach(dot => {
                dot.addEventListener('click', e => {
                    const idx = parseInt(e.target.dataset.index);
                    updateFn(idx);
                    if (intervalObj.val) { clearInterval(intervalObj.val); startAutoPlayFn(); }
                });
            });
            
            return updateFn;
        }

        // ========== 顶部横幅广告 ==========
        const bannerSlides = document.getElementById('bannerCarouselSlides');
        const bannerDots = document.getElementById('bannerCarouselDots');
        let bannerCurrent = { val: 0 };
        
        function startBannerAutoPlay() {
            if (bannerInterval) clearInterval(bannerInterval);
            bannerInterval = setInterval(() => {
                if (bannerAds.length) {
                    bannerUpdate((bannerCurrent.val + 1) % bannerAds.length);
                }
            }, 4000);
        }
        
        const bannerUpdate = renderCarousel(bannerSlides, bannerDots, bannerAds, bannerCurrent, { val: bannerInterval }, startBannerAutoPlay);
        bannerUpdate(0);
        startBannerAutoPlay();

        // ========== 侧边栏广告 ==========
        const sidebarSlides = document.getElementById('sidebarCarouselSlides');
        const sidebarDots = document.getElementById('sidebarCarouselDots');
        let sidebarCurrent = { val: 0 };
        
        function startSidebarAutoPlay() {
            if (sidebarInterval) clearInterval(sidebarInterval);
            sidebarInterval = setInterval(() => {
                if (sidebarAds.length) {
                    sidebarUpdate((sidebarCurrent.val + 1) % sidebarAds.length);
                }
            }, 4000);
        }
        
        const sidebarUpdate = renderCarousel(sidebarSlides, sidebarDots, sidebarAds, sidebarCurrent, { val: sidebarInterval }, startSidebarAutoPlay);
        sidebarUpdate(0);
        startSidebarAutoPlay();

        // ========== 从Airtable更新广告（后台静默） ==========
        async function updateAdsFromAirtable() {
            try {
                const data = await airtableRequest('GET', 'Ads?maxRecords=20');
                const fetched = data.records.map(r => r.fields).filter(f => (f.Enabled===undefined||f.Enabled) && (f.Image||f.image) && (f.Link||f.link))
                    .map(f => ({ image: f.Image||f.image, link: f.Link||f.link, title: f.Title||f.title||'' }));
                if (fetched.length) {
                    // 更新顶部横幅广告（若内容变化则重新渲染）
                    if (JSON.stringify(fetched) !== JSON.stringify(bannerAds)) {
                        bannerAds = fetched;
                        bannerUpdate = renderCarousel(bannerSlides, bannerDots, bannerAds, bannerCurrent, { val: bannerInterval }, startBannerAutoPlay);
                        bannerUpdate(bannerCurrent.val);
                        if (bannerInterval) { clearInterval(bannerInterval); startBannerAutoPlay(); }
                    }
                    // 更新侧边栏广告
                    if (JSON.stringify(fetched) !== JSON.stringify(sidebarAds)) {
                        sidebarAds = fetched;
                        sidebarUpdate = renderCarousel(sidebarSlides, sidebarDots, sidebarAds, sidebarCurrent, { val: sidebarInterval }, startSidebarAutoPlay);
                        sidebarUpdate(sidebarCurrent.val);
                        if (sidebarInterval) { clearInterval(sidebarInterval); startSidebarAutoPlay(); }
                    }
                }
            } catch(e) { console.warn('Airtable广告获取失败', e); }
        }
        setTimeout(updateAdsFromAirtable, 800);

        // ========== 日历 ==========
        let currentDate = new Date();
        function renderCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
            document.getElementById('calendarMonthYear').innerText = `${year}年 ${monthNames[month]}`;
            let html = `<div class="calendar-day-name">一</div><div class="calendar-day-name">二</div><div class="calendar-day-name">三</div><div class="calendar-day-name">四</div><div class="calendar-day-name">五</div><div class="calendar-day-name">六</div><div class="calendar-day-name">日</div>`;
            let day = 1;
            for (let i=0; i<6; i++) for (let j=0; j<7; j++) {
                if (i===0 && j < (firstDay===0?6:firstDay-1)) html += '<div class="calendar-day"></div>';
                else if (day > daysInMonth) html += '<div class="calendar-day"></div>';
                else { const isToday = day===new Date().getDate() && month===new Date().getMonth() && year===new Date().getFullYear(); html += `<div class="calendar-day ${isToday?'today':''}">${day}</div>`; day++; }
            }
            document.getElementById('calendarDays').innerHTML = html;

        async function airtableRequest(method, path, body=null) {
            const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE_ID}/${path}`;
            const headers = { 'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' };
            const opts = { method, headers }; if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(url, opts); if (!resp.ok) throw new Error((await resp.json()).error?.message||`HTTP ${resp.status}`);
            return resp.json();

        function getField(fields, possibleNames, defaultValue='') { for (let n of possibleNames) if (fields[n]!==undefined) return fields[n]; return defaultValue; }
        function parseIcon(iconField) {
            if (!iconField) return { type:'icon', value:'fa-cube' };
            if (Array.isArray(iconField) && iconField.length>0 && iconField[0].url) return { type:'image', value:iconField[0].url };
            if (typeof iconField==='string') { if (iconField.startsWith('http')||iconField.startsWith('data:image')) return { type:'image', value:iconField }; return { type:'icon', value:iconField }; }
            return { type:'icon', value:'fa-cube' };
        }

        async function fetchAirtableSoftwares() {
            try {
                const data = await airtableRequest('GET', 'softwares?maxRecords=100');
                return data.records.map(rec => {
                    const f = rec.fields;
                    const name = getField(f, ['A name', 'name', 'Name'], '未命名软件');
                    const category = getField(f, ['A category', 'category', 'Category'], 'other');
                    const version = getField(f, ['version', 'Version'], '');
                    const description = getField(f, ['description', 'Description'], '');
                    const iconParsed = parseIcon(getField(f, ['icon', 'Icon'], null));
                    const url = getField(f, ['url', 'URL'], '#');
                    const noVerify = getField(f, ['noVerify', 'NoVerify'], false);
                    const addedDate = getField(f, ['addedDate', 'AddedDate'], new Date().toISOString().split('T')[0]);
                    const downloads = Number(getField(f, ['downloads', 'Downloads'], 0));
                    let osArray = ['Windows','Mac']; const osField = getField(f, ['os', 'OS'], null);
                    if (osField) { if (Array.isArray(osField)) osArray = osField; else if (typeof osField==='string') osArray = osField.split(',').map(s=>s.trim()); }
                    return { id: rec.id, name, category, os: osArray, version, description, icon: iconParsed, url, noVerify: !!noVerify, addedDate, downloads };
                });
            } catch(e) { console.error('获取软件失败', e); return null; }
        }

        async function updateSoftwaresFromAirtable() {
            const airtableSoftwares = await fetchAirtableSoftwares();
            if (airtableSoftwares) {
                const mergedMap = new Map();
                DEFAULT_SOFTWARES.forEach(sw => mergedMap.set(sw.name.toLowerCase(), { ...sw, icon: { type: 'icon', value: sw.icon } }));
                airtableSoftwares.forEach(sw => mergedMap.set(sw.name.toLowerCase(), sw));
                softwares = Array.from(mergedMap.values());
                renderCategories(); renderGrid();
            }
        }

        function getSmartAbbreviation(name) { if(!name) return '软'; const chineseMatch = name.match(/[\u4e00-\u9fa5]/); if(chineseMatch) return chineseMatch[0]; const words = name.split(/[\s\-_]+/).filter(w=>w.length); if(words.length>=2) return words.map(w=>w.charAt(0).toUpperCase()).slice(0,3).join(''); const letters = name.replace(/[^a-zA-Z]/g,''); return letters.slice(0,2).toUpperCase()||name.charAt(0).toUpperCase(); }
        function getColorFromName(name) { let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash); return `hsl(${Math.abs(hash)%360}, 70%, 55%)`; }

        function renderGrid() {

            document.getElementById('sendRegCodeBtn').addEventListener('click', async function(e) { e.preventDefault(); const email = document.getElementById('regEmail').value.trim(); if (!email) return showToast('请输入邮箱','error'); try { if (await findUserByEmail(email)) return showToast('该邮箱已被注册','error'); } catch(err) { return showToast('验证失败: '+err.message,'error'); } this.disabled = true; this.textContent = '发送中...'; try { const code = await sendCode(email, '注册', CONFIG.EMAILJS_TEMPLATE_REG); regEmail=email; regCode=code; regCodeExpire=Date.now()+600000; showToast('验证码已发送'); let sec=60; const timer=setInterval(()=>{ sec--; this.textContent=`${sec}秒后重发`; if(sec<=0){ clearInterval(timer); this.disabled=false; this.textContent='发送验证码'; } },1000); } catch(err) { showToast('发送失败: '+err.message,'error'); this.disabled=false; this.textContent='发送验证码'; } });
            document.getElementById('registerBtn').addEventListener('click', async function() { const username = document.getElementById('regUsername').value.trim(), email = document.getElementById('regEmail').value.trim(), code = document.getElementById('regCodeInput').value.trim(), pwd = document.getElementById('regPassword').value, confirm = document.getElementById('regConfirm').value; if (!username) return showToast('请输入用户名','error'); if (!regEmail||!regCode) return showToast('请先获取验证码','error'); if (email!==regEmail) return showToast('邮箱不匹配','error'); if (code!==regCode||Date.now()>regCodeExpire) return showToast('验证码错误或已过期','error'); if (pwd!==confirm) return showToast('两次密码不一致','error'); if (pwd.length<6) return showToast('密码至少6位','error'); this.disabled = true; this.textContent = '注册中...'; try { await registerUser(email, pwd, username); showToast('注册成功，请登录'); openAuthModal('login'); regEmail=''; regCode=''; } catch(err) { showToast('注册失败: '+err.message,'error'); } finally { this.disabled=false; this.textContent='注册'; } });
            document.getElementById('loginBtn').addEventListener('click', async function() { const email = document.getElementById('loginEmail').value.trim(), pwd = document.getElementById('loginPassword').value; this.disabled = true; this.textContent = '登录中...'; try { currentUser = await loginUser(email, pwd); localStorage.setItem('lezhe_user', JSON.stringify(currentUser)); updateUserUI(); modal.classList.remove('active'); showToast('登录成功'); } catch(e) { showToast(e.message,'error'); } finally { this.disabled=false; this.textContent='登录'; } });
            document.getElementById('sendResetCodeBtn').addEventListener('click', async function() { const email = document.getElementById('forgotEmail').value.trim(); if (!email) return showToast('请输入邮箱','error'); try { if (!await findUserByEmail(email)) return showToast('邮箱未注册','error'); } catch(err) { return showToast('验证失败: '+err.message,'error'); } this.disabled = true; this.textContent = '发送中...'; try { const code = await sendCode(email, '重置密码', CONFIG.EMAILJS_TEMPLATE_RESET); resetEmail=email; resetCode=code; resetCodeExpire=Date.now()+600000; showToast('验证码已发送'); let sec=60; const timer=setInterval(()=>{ sec--; this.textContent=`${sec}秒后重发`; if(sec<=0){ clearInterval(timer); this.disabled=false; this.textContent='发送验证码'; } },1000); } catch(err) { showToast('发送失败: '+err.message,'error'); this.disabled=false; this.textContent='发送验证码'; } });
            document.getElementById('resetPasswordBtn').addEventListener('click', async function() { const email = document.getElementById('forgotEmail').value.trim(), code = document.getElementById('resetCodeInput').value.trim(), newPwd = document.getElementById('newPassword').value, confirm = document.getElementById('confirmNewPassword').value; if (!resetEmail||!resetCode) return showToast('请先获取验证码','error'); if (email!==resetEmail) return showToast('邮箱不匹配','error'); if (code!==resetCode||Date.now()>resetCodeExpire) return showToast('验证码错误或已过期','error'); if (newPwd!==confirm) return showToast('两次密码不一致','error'); if (newPwd.length<6) return showToast('密码至少6位','error'); this.disabled = true; this.textContent = '重置中...'; try { await updatePassword(email, newPwd); showToast('密码重置成功，请登录'); openAuthModal('login'); resetEmail=''; resetCode=''; } catch(e) { showToast('重置失败: '+e.message,'error'); } finally { this.disabled=false; this.textContent='重置密码'; } });
            const saved = localStorage.getItem('lezhe_user'); if(saved) { try { currentUser = JSON.parse(saved); } catch(e){} } updateUserUI();
        }

        // 搜索
        document.getElementById('searchInput').addEventListener('input', e => { searchKeyword = e.target.value; renderGrid(); });
        document.getElementById('searchBtn').addEventListener('click', ()=> renderGrid());

        // 聊天机器人（触摸拖拽支持）
        let chatInitialized = false;
        function initChat() { if(chatInitialized) return; chatInitialized = true; const toggle=document.getElementById('chatToggleBtn'), win=document.getElementById('chatWindow'), close=document.getElementById('chatCloseBtn'), send=document.getElementById('chatSendBtn'), input=document.getElementById('chatInput'), msgDiv=document.getElementById('chatMessagesList'); const botReply = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～"; let messages = []; function renderMsgs() { msgDiv.innerHTML = ''; if(!messages.length) { const d=document.createElement('div'); d.className='message bot'; d.innerHTML=`<strong>乐哲麦</strong>${botReply}`; msgDiv.appendChild(d); } else messages.forEach(m=>{ const d=document.createElement('div'); d.className=`message ${m.sender}`; d.innerHTML=`<strong>${m.sender==='customer'?'我':'乐哲麦'}</strong>${escapeHtml(m.text)}`; msgDiv.appendChild(d); }); } function addMsg(text, sender) { messages.push({text, sender}); renderMsgs(); } send.onclick = ()=>{ const v=input.value.trim(); if(v) { addMsg(v, 'customer'); setTimeout(()=>addMsg(botReply, 'bot'), 500); input.value=''; } }; input.onkeypress = e=>{ if(e.key==='Enter') send.click(); }; toggle.onclick = ()=>{ win.style.display = win.style.display==='none'?'flex':'none'; renderMsgs(); }; close.onclick = ()=> win.style.display = 'none';
        
        const dragHandle=document.getElementById('chatHeaderDrag'), container=document.getElementById('chatbotContainer');
        let isDragging=false, startX, startY, startRight, startBottom;
        function onDragStart(e) {
            if(e.target.closest('.chat-close')) return;
            e.preventDefault();
            isDragging=true;
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            startX=clientX; startY=clientY;
            const style=getComputedStyle(container);
            startRight=parseFloat(style.right)||24;
            startBottom=parseFloat(style.bottom)||100;
            container.style.transition='none';
        }
        function onDragMove(e) {
            if(!isDragging) return;
            e.preventDefault();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let newRight=startRight-(clientX-startX), newBottom=startBottom-(clientY-startY);
            newRight=Math.min(Math.max(10,newRight),window.innerWidth-70);
            newBottom=Math.min(Math.max(10,newBottom),window.innerHeight-90);
            container.style.right=newRight+'px';
            container.style.bottom=newBottom+'px';
        }
        function onDragEnd() { isDragging=false; container.style.transition=''; }
        
        dragHandle.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);
        dragHandle.addEventListener('touchstart', onDragStart, {passive: false});
        window.addEventListener('touchmove', onDragMove, {passive: false});
        window.addEventListener('touchend', onDragEnd);
        window.addEventListener('touchcancel', onDragEnd);
        }
        document.getElementById('chatToggleBtn').addEventListener('click', initChat, { once: true });

        document.getElementById('closeDetailModal').addEventListener('click', ()=> document.getElementById('detailModal').classList.remove('active'));
        document.getElementById('detailModal').addEventListener('click', e=> { if (e.target===document.getElementById('detailModal')) document.getElementById('detailModal').classList.remove('active'); });
        document.getElementById('closeProfileModal').addEventListener('click', ()=> document.getElementById('profileModal').classList.remove('active'));
        document.getElementById('cancelProfileBtn').addEventListener('click', ()=> document.getElementById('profileModal').classList.remove('active'));
        document.getElementById('saveProfileBtn').addEventListener('click', async function() { const newUsername = document.getElementById('profileUsername').value.trim(); const newPwd = document.getElementById('profileNewPassword').value, confirmPwd = document.getElementById('profileConfirmPassword').value; if (!newUsername) return showToast('用户名不能为空','error'); if (newPwd && newPwd!==confirmPwd) return showToast('两次密码不一致','error'); if (newPwd && newPwd.length<6) return showToast('密码至少6位','error'); this.disabled = true; this.textContent = '保存中...'; try { await updateUserProfile(currentUser.id, newUsername, newPwd||null); currentUser.username = newUsername; localStorage.setItem('lezhe_user', JSON.stringify(currentUser)); updateUserUI(); showToast('资料更新成功'); document.getElementById('profileModal').classList.remove('active'); } catch(e) { showToast('更新失败: '+e.message,'error'); } finally { this.disabled=false; this.textContent='保存修改'; } });
        document.getElementById('closeAdminModal').addEventListener('click', ()=> document.getElementById('adminModal').classList.remove('active'));
        document.getElementById('adminAddUserBtn').addEventListener('click', async function() { const email = document.getElementById('newUserEmail').value.trim(), username = document.getElementById('newUsername').value.trim(), password = document.getElementById('newUserPassword').value.trim(), role = document.getElementById('newUserRole').value; if (!email||!username||!password) return showToast('请填写完整','error'); if (await findUserByEmail(email)) return showToast('邮箱已存在','error'); this.disabled = true; this.textContent = '添加中...'; try { await registerUser(email, password, username, role); showToast('用户添加成功'); document.getElementById('newUserEmail').value=''; document.getElementById('newUsername').value=''; document.getElementById('newUserPassword').value=''; openAdminModal(); } catch(e) { showToast('添加失败: '+e.message,'error'); } finally { this.disabled=false; this.textContent='添加'; } });
        document.getElementById('submitFeedbackBtn').addEventListener('click', async function() { const name = document.getElementById('feedbackName').value.trim(), msg = document.getElementById('feedbackMessage').value.trim(); if (!msg) return showToast('请填写留言内容','error'); this.disabled = true; this.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 提交中...'; try { await submitMessage(name, msg); showToast('留言提交成功！'); document.getElementById('feedbackName').value=''; document.getElementById('feedbackMessage').value=''; await renderFeedbackList(); } catch(e) { showToast('提交失败: '+e.message,'error'); } finally { this.disabled=false; this.innerHTML='<i class="fas fa-paper-plane"></i> 提交留言'; } });

        document.getElementById('loadMoreBtn').addEventListener('click', ()=>{ showAll=true; renderGrid(); });

        let lastScrollY=0; window.addEventListener('scroll', ()=>{ const nav=document.getElementById('topNav'); if(window.scrollY > lastScrollY && window.scrollY>70) nav.classList.add('hidden'); else nav.classList.remove('hidden'); lastScrollY = window.scrollY; });

        const backBtn = document.getElementById('backToTop'); window.addEventListener('scroll', ()=> backBtn.classList.toggle('show', window.scrollY>300)); backBtn.addEventListener('click', ()=> window.scrollTo({ top:0, behavior:'smooth' }));

        // ========== 启动一切 ==========
        async function initAll() { initSoftware(); initAuthEvents(); initTheme(); addBaiduPush(); renderFeedbackList(); }
        initAll();
    })();
</script>
