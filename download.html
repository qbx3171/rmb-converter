        const cardsHtml = filtered.map(sw => {
            const osTagsHtml = sw.os.map(os => {
                const icon = os === "Windows" ? '<i class="fab fa-windows"></i>' : '<i class="fab fa-apple"></i>';
                return `<span class="os-badge">${icon} ${os}</span>`;
            }).join('');
            const iconClass = sw.icon || "fa-download";
            return `
                <div class="software-card" data-name="${escapeHtml(sw.name)}" data-url="${escapeHtml(sw.url)}">
                    <div class="card-header">
                        <div class="card-icon"><i class="fas ${iconClass}"></i></div>
                        <div class="software-name">${escapeHtml(sw.name)}</div>
                    </div>
                    <div class="version">版本 ${escapeHtml(sw.version)}</div>
                    <div class="description">${escapeHtml(sw.description)}</div>
                    <div class="os-tags">${osTagsHtml}</div>
                    <div class="download-hint"><i class="fas fa-external-link-alt"></i> 点击获取下载链接</div>
                </div>
            `;
        }).join('');
        gridContainer.innerHTML = cardsHtml;

        document.querySelectorAll('.software-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const name = card.getAttribute('data-name');
                const sw = softwareData.find(s => s.name === name);
                if (sw) handleDownload(sw);
            });
        });
    }

    // 验证逻辑
    function verifyAndDownload() {
        const code = verifyCodeInput.value.trim();
        if (code === VALID_PASSWORD) {
            if (pendingUrl) {
                window.open(pendingUrl, '_blank');
                pendingUrl = null;
            }
            verifyModal.classList.remove('active');
        } else {
            alert("口令错误，请确认后重试。");
        }
    }

    function closeModal() {
        verifyModal.classList.remove('active');
        pendingUrl = null;
    }

    confirmVerifyBtn.addEventListener('click', verifyAndDownload);
    cancelVerifyBtn.addEventListener('click', closeModal);
    verifyModal.addEventListener('click', (e) => {
        if (e.target === verifyModal) closeModal();
    });

    function bindEvents() {
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.getAttribute('data-cat');
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrid();
            });
        });
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            renderGrid();
        });
    }

    bindEvents();
    renderGrid();

    // ==================== 纯前端客服模拟（无后端API） ====================
    (function() {
        let messages = [];
        const botReplyText = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～";

        const chatWindow = document.getElementById('chatWindow');
        const chatMessagesDiv = document.getElementById('chatMessagesList');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatToggle = document.getElementById('chatToggleBtn');
        const chatClose = document.getElementById('chatCloseBtn');
        const chatStatus = document.getElementById('chatStatus');

        function renderMessages() {
            chatMessagesDiv.innerHTML = '';
            if (messages.length === 0) {
                const welcomeDiv = document.createElement('div');
                welcomeDiv.className = 'message bot';
                welcomeDiv.innerHTML = `<strong>乐哲麦</strong>${botReplyText}`;
                chatMessagesDiv.appendChild(welcomeDiv);
            } else {
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.sender === 'customer' ? 'customer' : 'bot'}`;
                    const displayName = msg.sender === 'customer' ? '我' : '乐哲麦';
                    const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    msgDiv.innerHTML = `<strong>${displayName}</strong>${escapeHtml(msg.text)}<small>${timeStr}</small>`;
                    chatMessagesDiv.appendChild(msgDiv);
                });
            }
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }

        function addMessage(text, sender) {
            messages.push({ text, sender, timestamp: new Date() });
            renderMessages();
        }

        function botReply() {
            const lastMsg = messages[messages.length - 1];
            if (lastMsg && lastMsg.sender === 'bot' && lastMsg.text === botReplyText) return;
            addMessage(botReplyText, 'bot');
        }

        function sendCustomerMessage(text) {
            if (!text.trim()) return;
            addMessage(text.trim(), 'customer');
            setTimeout(() => { botReply(); }, 500);
            if (chatStatus) chatStatus.innerText = '📤 消息已发送，乐哲麦思考中...';
            setTimeout(() => {
                if (chatStatus) chatStatus.innerText = '✨ 在线 · 乐哲麦为您服务';
            }, 2000);
        }

        function openChat() {
            chatWindow.style.display = 'flex';
            renderMessages();
        }
        function closeChat() {
            chatWindow.style.display = 'none';
        }

        chatToggle.addEventListener('click', () => {
            if (chatWindow.style.display === 'none') openChat();
            else closeChat();
        });
        chatClose.addEventListener('click', closeChat);
        chatSendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (!text) return;
            sendCustomerMessage(text);
            chatInput.value = '';
        });
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = chatInput.value.trim();
                if (!text) return;
                sendCustomerMessage(text);
                chatInput.value = '';
            }
        });
        chatWindow.style.display = 'none';

        // 拖拽功能
        const dragContainer = document.getElementById('chatbotContainer');
        const dragHandle = document.getElementById('chatHeaderDrag');
        let isDragging = false, startX, startY, startRight, startBottom;
        function getPos() {
            const style = getComputedStyle(dragContainer);
            return { right: parseFloat(style.right) || 32, bottom: parseFloat(style.bottom) || 110 };
        }
        dragHandle.addEventListener('mousedown', (e) => {
            if (e.target.closest('.chat-close')) return;
            e.preventDefault();
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            const pos = getPos();
            startRight = pos.right; startBottom = pos.bottom;
            dragContainer.style.transition = 'none';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.clientX - startX, dy = e.clientY - startY;
            let newRight = startRight - dx, newBottom = startBottom - dy;
            newRight = Math.min(Math.max(10, newRight), window.innerWidth - 70);
            newBottom = Math.min(Math.max(10, newBottom), window.innerHeight - 90);
            dragContainer.style.right = newRight + 'px';
            dragContainer.style.bottom = newBottom + 'px';
        });
        window.addEventListener('mouseup', () => { isDragging = false; dragContainer.style.transition = ''; });
    })();
</script>
</body>
</html>
