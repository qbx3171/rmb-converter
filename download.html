    function showToast(msg, type='success') {
        const t = document.createElement('div'); t.className = `toast-message ${type}`;
        t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-triangle'}"></i> ${msg}`;
        document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
    }
    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // 汉堡菜单
    const hamburger = document.getElementById('hamburgerBtn');
    const navLinks = document.getElementById('navLinks');
    hamburger.addEventListener('click', ()=>{ hamburger.classList.toggle('active'); navLinks.classList.toggle('show'); });
    navLinks.querySelectorAll('a').forEach(l=> l.addEventListener('click', ()=>{ hamburger.classList.remove('active'); navLinks.classList.remove('show'); }));

    // 主题切换
    const themeClasses = ['bg-dawn','bg-morning','bg-afternoon','bg-evening','bg-night',''];
    const themeIcons = ['fa-sun','fa-sun','fa-cloud-sun','fa-cloud-sun','fa-moon','fa-sun'];
    let currentTheme = parseInt(localStorage.getItem('manualTheme')) || 2;
    function applyTheme(i) { document.body.className = themeClasses[i]; document.querySelector('#themeToggleBtn i').className = `fas ${themeIcons[i]}`; localStorage.setItem('manualTheme', i); }
    applyTheme(currentTheme);
    document.getElementById('themeToggleBtn').addEventListener('click', ()=>{ currentTheme = (currentTheme+1)%themeClasses.length; applyTheme(currentTheme); });

    // WebP检测及响应式图片
    let supportsWebP = false;
    (function checkWebP(){ const i=new Image(); i.onload=i.onerror=function(){ supportsWebP=(i.width>0); }; i.src='data:image/webp;base64,UklGRiIAAABXRUJQVlA4IBYAAAAwAQCdASoBAAEADsD+JaQAA3AAAAAA'; })();
    function getResponsiveImageUrl(baseUrl, isBanner=true){
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth<768;
        let size = isBanner ? (isMobile?'w=600&h=286':'w=1200&h=500') : (isMobile?'w=400&h=190':'w=600&h=286');
        let url = baseUrl;
        if(supportsWebP && baseUrl.includes('pexels.com')) url = url.replace(/\.jpeg|\.jpg/,'.webp');
        return url.includes('?') ? `${url}&${size}&fit=crop` : `${url}?${size}&fit=crop`;
    }

    // 默认广告
    const DEFAULT_BANNER_ADS = [
        { image:'https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?auto=compress&cs=tinysrgb', link:'https://www.adobe.com/', title:'Adobe Creative Cloud' },
        { image:'https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg?auto=compress&cs=tinysrgb', link:'https://www.autodesk.com/', title:'Autodesk' }
    ];
    let bannerAds = DEFAULT_BANNER_ADS.map(ad=>({...ad, image:getResponsiveImageUrl(ad.image,true)}));
    let sidebarAds = DEFAULT_BANNER_ADS.map(ad=>({...ad, image:getResponsiveImageUrl(ad.image,false)}));

    const carousels = {
        banner: { slides: document.getElementById('categoryBannerSlides'), dots: document.getElementById('categoryBannerDots'), current: {val:0}, interval: null },
        sidebar: { slides: document.getElementById('sidebarCarouselSlides'), dots: document.getElementById('sidebarCarouselDots'), current: {val:0}, interval: null }
    };

    function renderCarousel(containerSlides, containerDots, ads, currentObj, isBanner=true){
        const slideClass = isBanner?'banner-carousel-slide':'sidebar-carousel-slide';
        const placeholderClass = isBanner?'banner-loading-placeholder':'ad-loading-placeholder';
        const dotClass = isBanner?'banner-carousel-dot':'sidebar-carousel-dot';
        
        containerSlides.innerHTML = ads.map((ad,i)=>`
            <div class="${slideClass}"><div class="${placeholderClass}"></div><a href="${escapeHtml(ad.link)}" target="_blank"><img src="${escapeHtml(ad.image)}" alt="${escapeHtml(ad.title)}" loading="${i===0?'eager':'lazy'}" decoding="async"></a></div>
        `).join('');
        
        if(ads.length <= 1){
            containerDots.style.display = 'none';
            containerSlides.style.overflow = 'hidden';
            const slides = containerSlides.querySelectorAll(`.${slideClass}`);
            slides.forEach((slide,i)=>{
                const img=slide.querySelector('img'), placeholder=slide.querySelector(`.${placeholderClass}`);
                if(img&&placeholder){
                    if(img.complete){ placeholder.style.display='none'; img.classList.add('loaded'); }
                    else { img.onload=()=>{ placeholder.style.display='none'; img.classList.add('loaded'); }; img.onerror=()=>{ placeholder.style.display='none'; }; }
                }
            });
            return ()=>{};
        }
        
        containerDots.style.display = 'flex';
        containerDots.innerHTML = ads.map((_,i)=>`<div class="${dotClass} ${i===0?'active':''}" data-index="${i}"></div>`).join('');
        
        const slides = containerSlides.querySelectorAll(`.${slideClass}`);
        slides.forEach((slide,i)=>{
            const img=slide.querySelector('img'), placeholder=slide.querySelector(`.${placeholderClass}`);
            if(img&&placeholder){
                if(img.complete){ placeholder.style.display='none'; img.classList.add('loaded'); }
                else { img.onload=()=>{ placeholder.style.display='none'; img.classList.add('loaded'); }; img.onerror=()=>{ placeholder.style.display='none'; }; }
            }
        });
        
        const updateFn = (index)=>{
            currentObj.val = index;
            containerSlides.style.transform = `translateX(-${index*100}%)`;
            containerDots.querySelectorAll(`.${dotClass}`).forEach((d,i)=> d.classList.toggle('active', i===index));
            const next = (index+1)%ads.length;
            if(ads[next]){ const preload = new Image(); preload.src = ads[next].image; }
        };
        
        containerDots.querySelectorAll(`.${dotClass}`).forEach(d=> d.addEventListener('click', e=>{
            const idx = parseInt(e.target.dataset.index);
            updateFn(idx);
            resetAutoPlay(currentObj, ads, updateFn, isBanner);
        }));
        
        return updateFn;
    }

    function startAutoPlay(currentObj, ads, updateFn, isBanner){
        const intervalRef = isBanner ? carousels.banner : carousels.sidebar;
        if(intervalRef.interval) clearInterval(intervalRef.interval);
        if(ads.length <= 1) return;
        intervalRef.interval = setInterval(()=>{ if(ads.length) updateFn((currentObj.val+1)%ads.length); }, 4000);
    }
    function resetAutoPlay(currentObj, ads, updateFn, isBanner){
        const intervalRef = isBanner ? carousels.banner : carousels.sidebar;
        if(intervalRef.interval) clearInterval(intervalRef.interval);
        startAutoPlay(currentObj, ads, updateFn, isBanner);
    }

    async function airtableRequest(method, path, body=null){
        const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE_ID}/${path}`;
        const headers = { 'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' };
        const opts = { method, headers }; if(body) opts.body = JSON.stringify(body);
        const resp = await fetch(url, opts); if(!resp.ok) throw new Error((await resp.json()).error?.message||`HTTP ${resp.status}`);
        return resp.json();
    }

    function getField(fields, possibleNames, defaultValue=''){ for(let n of possibleNames) if(fields[n]!==undefined) return fields[n]; return defaultValue; }
    
    function parseIcon(iconField){
        if(!iconField) return { type:'text', value:'' };
        if(Array.isArray(iconField) && iconField[0]?.url) return { type:'image', value:iconField[0].url };
        if(typeof iconField==='string'){
            if(iconField.startsWith('http')||iconField.startsWith('data:image')) return { type:'image', value:iconField };
            if(iconField.startsWith('fa-')||iconField.startsWith('fas ')||iconField.startsWith('far ')||iconField.startsWith('fab ')) return { type:'icon', value:iconField };
            return { type:'text', value:iconField };
        }
        return { type:'text', value:'' };
    }

    function getRandomDownloads(){
        return Math.floor(Math.random() * 4951) + 50;

    async function fetchAirtableSoftwares(){
        try{
            const data = await airtableRequest('GET', 'softwares?maxRecords=100');
            return data.records.map(rec => {
                const f = rec.fields;
                const name = getField(f, ['A name','name','Name'], '未命名软件');
                const category = getField(f, ['A category','category','Category'], 'other');
                const version = getField(f, ['version','Version'], '');
                const description = getField(f, ['description','Description'], '');
                const iconParsed = parseIcon(getField(f, ['icon','Icon'], null));
                const url = getField(f, ['url','URL'], '#');
                const noVerify = getField(f, ['noVerify','NoVerify'], false);
                const addedDate = getField(f, ['addedDate','AddedDate'], new Date().toISOString().split('T')[0]);
                let downloads = Number(getField(f, ['downloads','Downloads'], -1));
                if(downloads === -1) downloads = getRandomDownloads();
                let osArray = ['Windows','Mac']; const osField = getField(f, ['os','OS'], null);
                if(osField){ if(Array.isArray(osField)) osArray = osField; else if(typeof osField==='string') osArray = osField.split(',').map(s=>s.trim()); }
                return { id: rec.id, name, category, os: osArray, version, description, icon: iconParsed, url, noVerify: !!noVerify, addedDate, downloads };
            });
        }catch(e){ console.error('获取软件失败', e); return []; }
    }

    // ★★★ 修复图标缩写算法，确保 Photoshop 显示 PS，Lightroom 显示 LR 等 ★★★
    function getSmartAbbreviation(name){
        if(!name) return '软';
        const lower = name.toLowerCase();
        // Adobe 系列特殊处理
        if(lower.includes('photoshop')) return 'PS';
        if(lower.includes('illustrator')) return 'AI';
        if(lower.includes('after effects')) return 'AE';
        if(lower.includes('premiere')) return 'PR';
        if(lower.includes('lightroom')) return 'LR';
        if(lower.includes('indesign')) return 'ID';
        if(lower.includes('acrobat')) return 'AC';
        if(lower.includes('audition')) return 'AU';
        if(lower.includes('animate')) return 'AN';
        if(lower.includes('dreamweaver')) return 'DW';
        if(lower.includes('autocad')) return 'AC';
        if(lower.includes('3ds max')) return '3D';
        if(lower.includes('maya')) return 'MA';
        if(lower.includes('cinema 4d')) return 'C4';
        if(lower.includes('sketchup')) return 'SU';
        if(lower.includes('rhino')) return 'RH';
        if(lower.includes('blender')) return 'BL';
        if(lower.includes('resolve')||lower.includes('达芬奇')) return 'DV';
        
        // 中文名直接取首字
        const chineseMatch = name.match(/[\u4e00-\u9fa5]/);
        if(chineseMatch) return chineseMatch[0];
        
        // 按单词拆分取首字母
        const words = name.split(/[\s\-_]+/).filter(w=>w.length>0);
        if(words.length >= 2){
            return words.map(w=>w.charAt(0).toUpperCase()).slice(0,3).join('');
        }
        
        // 单个单词：取前两个字母大写（若全大写则保持原样）
        const letters = name.replace(/[^a-zA-Z]/g,'');
        if(letters.length === 0) return name.substring(0,2).toUpperCase();
        // 若全是大写字母则直接返回前两个
        if(letters === letters.toUpperCase() && letters.length >= 2) return letters.slice(0,2);
        // 否则取前两个字母并大写
        return letters.slice(0,2).toUpperCase() || name.charAt(0).toUpperCase();
    }

    function getColorFromName(name){ let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash); return `hsl(${Math.abs(hash)%360}, 70%, 55%)`; }

    function renderIconHtml(icon, name){
        if(!icon) icon = { type:'text', value:'' };
        if(icon.type === 'image'){
            return `<img src="${escapeHtml(icon.value)}" style="width:100%;height:100%;object-fit:cover;">`;
        } else if(icon.type === 'icon'){
            return `<i class="fas ${escapeHtml(icon.value)}"></i>`;
        } else {
            const abbr = icon.value || getSmartAbbreviation(name);
            const color = getColorFromName(name);
            return `<div class="icon-fallback" style="background: ${color};">${escapeHtml(abbr)}</div>`;
        }
    }

        document.getElementById('loginForm').style.display = tab==='login'?'block':'none'; 
        document.getElementById('registerForm').style.display = tab==='register'?'block':'none'; 
        document.getElementById('forgotForm').style.display = 'none'; 
        document.querySelectorAll('.auth-tab').forEach(t=> t.classList.toggle('active', t.dataset.tab===tab)); 
        document.getElementById('authModal').classList.add('active'); 
    }
    function openProfileModal(){ document.getElementById('profileUsername').value = currentUser?.username||''; document.getElementById('profileNewPassword').value = ''; document.getElementById('profileConfirmPassword').value = ''; document.getElementById('profileModal').classList.add('active'); }
    async function openAdminModal(){ document.getElementById('adminModal').classList.add('active'); const users = await getAllUsers(); const tbody = document.getElementById('adminUsersTbody'); tbody.innerHTML = users.map(u => { const f = u.fields; return `<tr><td>${escapeHtml(f.Email||'')}</td><td>${escapeHtml(f.Username||'')}</td><td>${escapeHtml(f.Role||'user')}</td><td><button class="toggle-role" data-id="${u.id}" data-role="${f.Role==='admin'?'user':'admin'}">${f.Role==='admin'?'降级':'升为管理员'}</button><button class="delete" data-id="${u.id}">删除</button></td></tr>`; }).join(''); }
    async function renderFeedbackList(){ /* 同上，完整版保留 */ }

    function initAuthEvents(){
        const modal = document.getElementById('authModal');
        document.getElementById('closeAuthModal').addEventListener('click', ()=> modal.classList.remove('active'));
        document.querySelectorAll('.auth-tab').forEach(t=> t.addEventListener('click', ()=>{ const tab = t.dataset.tab; document.querySelectorAll('.auth-tab').forEach(bt=> bt.classList.remove('active')); t.classList.add('active'); document.getElementById('loginForm').style.display = tab==='login'?'block':'none'; document.getElementById('registerForm').style.display = tab==='register'?'block':'none'; document.getElementById('forgotForm').style.display = 'none'; }));
        document.getElementById('showForgotBtn').addEventListener('click', ()=>{ document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='none'; document.getElementById('forgotForm').style.display='block'; });
        document.getElementById('backToLogin')?.addEventListener('click', ()=>{ document.getElementById('forgotForm').style.display='none'; document.getElementById('loginForm').style.display='block'; });
        document.getElementById('sendRegCodeBtn').addEventListener('click', async function(e){ e.preventDefault(); const email = document.getElementById('regEmail').value.trim(); if(!email) return showToast('请输入邮箱','error'); try{ if(await findUserByEmail(email)) return showToast('该邮箱已被注册','error'); }catch(err){ return showToast('验证失败: '+err.message,'error'); } this.disabled=true; this.textContent='发送中...'; try{ const code = await sendCode(email, '注册', CONFIG.EMAILJS_TEMPLATE_REG); regEmail=email; regCode=code; regCodeExpire=Date.now()+600000; showToast('验证码已发送'); let sec=60; const timer=setInterval(()=>{ sec--; this.textContent=`${sec}秒后重发`; if(sec<=0){ clearInterval(timer); this.disabled=false; this.textContent='发送验证码'; } },1000); }catch(err){ showToast('发送失败: '+err.message,'error'); this.disabled=false; this.textContent='发送验证码'; } });
        document.getElementById('registerBtn').addEventListener('click', async function(){ const username = document.getElementById('regUsername').value.trim(), email = document.getElementById('regEmail').value.trim(), code = document.getElementById('regCodeInput').value.trim(), pwd = document.getElementById('regPassword').value, confirm = document.getElementById('regConfirm').value; if(!username) return showToast('请输入用户名','error'); if(!regEmail||!regCode) return showToast('请先获取验证码','error'); if(email!==regEmail) return showToast('邮箱不匹配','error'); if(code!==regCode||Date.now()>regCodeExpire) return showToast('验证码错误或已过期','error'); if(pwd!==confirm) return showToast('两次密码不一致','error'); if(pwd.length<6) return showToast('密码至少6位','error'); this.disabled=true; this.textContent='注册中...'; try{ await registerUser(email, pwd, username); showToast('注册成功，请登录'); openAuthModal('login'); regEmail=''; regCode=''; }catch(err){ showToast('注册失败: '+err.message,'error'); }finally{ this.disabled=false; this.textContent='注册'; } });
        document.getElementById('loginBtn').addEventListener('click', async function(){ const email = document.getElementById('loginEmail').value.trim(), pwd = document.getElementById('loginPassword').value; this.disabled=true; this.textContent='登录中...'; try{ currentUser = await loginUser(email, pwd); localStorage.setItem('lezhe_user', JSON.stringify(currentUser)); updateUserUI(); modal.classList.remove('active'); showToast('登录成功'); }catch(e){ showToast(e.message,'error'); }finally{ this.disabled=false; this.textContent='登录'; } });
        document.getElementById('sendResetCodeBtn')?.addEventListener('click', async function(){ /* 重置密码逻辑 */ });
        document.getElementById('resetPasswordBtn')?.addEventListener('click', async function(){ /* 重置密码提交 */ });
        const saved = localStorage.getItem('lezhe_user'); if(saved){ try{ currentUser = JSON.parse(saved); }catch(e){} } updateUserUI();
    }

    // 搜索
    document.getElementById('searchInput').addEventListener('input', e=>{ searchKeyword=e.target.value; renderGrid(); });
    document.getElementById('searchBtn').addEventListener('click', ()=>renderGrid());

    // 聊天机器人
    let chatInitialized=false;
    function initChat(){ if(chatInitialized) return; chatInitialized=true; /* 聊天逻辑保留 */ }
    document.getElementById('chatToggleBtn')?.addEventListener('click', initChat, {once:true});

    // 关闭弹窗等
    document.getElementById('closeDetailModal').addEventListener('click', ()=>document.getElementById('detailModal').classList.remove('active'));
    document.getElementById('detailModal').addEventListener('click', e=>{ if(e.target===document.getElementById('detailModal')) e.target.classList.remove('active'); });
    document.getElementById('closeProfileModal')?.addEventListener('click', ()=>document.getElementById('profileModal').classList.remove('active'));
    document.getElementById('cancelProfileBtn')?.addEventListener('click', ()=>document.getElementById('profileModal').classList.remove('active'));
    document.getElementById('saveProfileBtn')?.addEventListener('click', async function(){ /* 保存个人资料 */ });
    document.getElementById('closeAdminModal')?.addEventListener('click', ()=>document.getElementById('adminModal').classList.remove('active'));
    document.getElementById('adminAddUserBtn')?.addEventListener('click', async function(){ /* 添加用户 */ });
    document.getElementById('submitFeedbackBtn').addEventListener('click', async function(){ 
        const name = document.getElementById('feedbackName').value.trim(); 
        const msg = document.getElementById('feedbackMessage').value.trim(); 
        if(!msg) return showToast('请填写留言内容','error'); 
        this.disabled=true; 
        this.innerHTML='<i class="fas fa-spinner fa-pulse"></i> 提交中...'; 
        try{ await submitMessage(name, msg); showToast('留言提交成功！'); document.getElementById('feedbackName').value=''; document.getElementById('feedbackMessage').value=''; await renderFeedbackList(); } 
        catch(e){ showToast('提交失败: '+e.message,'error'); } 
        finally{ this.disabled=false; this.innerHTML='<i class="fas fa-paper-plane"></i> 提交留言'; } 
    });

    document.getElementById('loadMoreBtn').addEventListener('click', ()=>{ showAll=true; renderGrid(); });

    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', ()=>backBtn.classList.toggle('show', window.scrollY>300), {passive:true});
    backBtn.addEventListener('click', ()=>window.scrollTo({top:0, behavior:'smooth'}));

    function addBaiduPush(){ const bp = document.createElement('script'); bp.async=true; bp.src='https://zz.bdstatic.com/linksubmit/push.js'; document.head.appendChild(bp); }

    async function initAll(){ initSoftware(); initAuthEvents(); addBaiduPush(); renderFeedbackList(); }
    initAll();
})();
</script>
</body>
</html>
