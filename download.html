    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f9fe;
            color: #121826;
            line-height: 1.5;
        }
        html {
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9cadb;
            border-radius: 10px;
        }
        .app-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 32px 56px;
        }
        /* 顶部导航 */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            margin: 24px 0 28px;
            padding: 8px 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(125deg, #0F2B4D, #1E6DFF, #A855F7);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .domain-badge {
            background: #eef3fc;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #1E6DFF;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            font-weight: 500;
        }
        .nav-links a {
            text-decoration: none;
            color: #2c3f5c;
            transition: 0.2s;
            font-size: 15px;
        }
        .nav-links a.active, .nav-links a:hover {
            color: #1E6DFF;
        }
        .top-search {
            background: white;
            border-radius: 48px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 260px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #e2edf7;
            transition: all 0.2s;
        }
        .top-search i {
            color: #8ba0bc;
            font-size: 16px;
        }
        .top-search input {
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            width: 100%;
            outline: none;
            font-weight: 400;
        }
        .top-search:focus-within {
            border-color: #1E6DFF;
            box-shadow: 0 0 0 3px rgba(30,109,255,0.1);
        }
        /* 英雄区 + 统计卡片 */
        .hero-stats-wrap {
            background: linear-gradient(110deg, #FFFFFF 0%, #F0F7FF 100%);
            border-radius: 40px;
            padding: 24px 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid #eef2ff;
        }
        .hero-text h2 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1A2C42, #1E6DFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero-text p {
            color: #4a627a;
            margin-top: 6px;
            font-size: 14px;
        }
        .stats-group {
            display: flex;
            gap: 28px;
            background: white;
            padding: 8px 28px;
            border-radius: 60px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }
        .stat-card {
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #0f2b4d;
        }
        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: #6b85a4;
        }
        /* 筛选面板 */
        .filter-panel {
            background: white;
            border-radius: 36px;
            padding: 20px 28px;
            margin-bottom: 40px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.02);
            border: 1px solid #eef2fc;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 28px;
        }
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .filter-label {
            font-weight: 600;
            font-size: 13px;
            background: #f0f4fa;
            padding: 5px 14px;
            border-radius: 32px;
            color: #2c405c;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-chip {
            background: #f1f5f9;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #2f405b;

        .filter-chip i {
            margin-right: 6px;
        }
        .filter-chip.active {
            background: #1E6DFF;
            color: white;
            box-shadow: 0 4px 10px rgba(30,109,255,0.2);
        }
        /* 软件网格 - 紧凑卡片 */
        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .software-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 18px 20px 20px 20px;
            transition: all 0.3s ease;
            border: 1px solid #eef3fc;
            box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.04);
        }
        .software-card:hover {
            transform: translateY(-4px);
            border-color: #d4e2fc;
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .software-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.2px;
            background: linear-gradient(145deg, #14273e, #1f3b5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
        }
        .status-uploaded {
            background: #e1f7ea;
            color: #1f7840;
        }
        .status-pending {
            background: #f0f2f5;
            color: #6c7a8f;
        }
        .version-tag {
            display: inline-block;
            background: #f0f4fc;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            margin: 8px 0 10px;
        }
        .description {

            font-size: 13px;
            line-height: 1.45;
            margin: 6px 0 14px;
            min-height: 58px;
        }
        .os-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .os-badge {
            background: #f4f8fe;
            border-radius: 28px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .download-btn {
            width: 100%;
            border: none;
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-active {
            background: #1E6DFF;
            color: white;
            box-shadow: 0 3px 6px rgba(30,109,255,0.2);
        }
        .btn-active:hover {
            background: #0f5be6;
            transform: scale(0.98);
        }
        .btn-pending {
            background: #eef2f8;
            color: #7e92ac;
            cursor: not-allowed;
        }
        .empty-state {
            background: white;
            border-radius: 48px;
            padding: 60px 24px;
            text-align: center;
            grid-column: 1 / -1;
        }
        /* 浮动添加按钮 */
        .floating-add {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: #1E6DFF;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(30,109,255,0.4);
            transition: 0.2s;
            z-index: 100;
            border: none;
        }
        .floating-add:hover {
            background: #0c54d6;
            transform: scale(1.02);
        }
        /* 模态框 */
        .modal-mask {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            background: white;
            max-width: 540px;
            width: 90%;
            border-radius: 48px;
            padding: 28px;
            box-shadow: 0 40px 60px rgba(0,0,0,0.3);
            animation: fadeUp 0.2s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .modal-container h3 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .form-item {
            margin-bottom: 18px;
        }
        .form-item label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }
        .form-item input, .form-item select, .form-item textarea {
            width: 100%;
            padding: 10px 16px;
            border-radius: 28px;
            border: 1px solid #dce5f0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .form-item input:focus, .form-item select:focus {
            border-color: #1E6DFF;
        }
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 6px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
        }
        .btn-cancel {
            background: #f0f4fa;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm {
            background: #1E6DFF;
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        footer {
            margin-top: 56px;
            text-align: center;
            font-size: 12px;
            color: #8aa0bc;
            border-top: 1px solid #e2ecf5;
            padding-top: 24px;
        }
        @media (max-width: 860px) {
            .app-wrapper { padding: 0 20px 40px; }
            .top-nav { flex-direction: column; align-items: stretch; border-radius: 40px; padding: 16px 20px; }
            .nav-links { justify-content: center; }
            .top-search { width: 100%; }
            .filter-panel { flex-direction: column; align-items: flex-start; }
            .hero-stats-wrap { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

<!-- 动态客服组件 HTML/CSS -->
<style>
    /* 客服组件 - 不干扰原布局 */
    .chatbot-container {
        position: fixed;
        bottom: 110px;
        right: 32px;
        z-index: 200;
        font-family: 'Inter', sans-serif;
    }
    .chat-toggle {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #1E6DFF, #A855F7);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(30,109,255,0.4);
        transition: all 0.2s;
        color: white;
        font-size: 26px;
    }
    .chat-toggle:hover {
        transform: scale(1.02);
        background: linear-gradient(135deg, #0f5be6, #9b3df5);
    }
    .chat-window {
        position: absolute;
        bottom: 70px;
        right: 0;
        width: 360px;
        height: 480px;
        background: white;
        border-radius: 28px;
        box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(30,109,255,0.2);
        transition: all 0.2s;
    }
    .chat-header {
        background: #1E6DFF;
        color: white;
        padding: 16px 20px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chat-header span i {
        margin-right: 8px;
    }
    .chat-close {
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
    }
    .chat-messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f8fafd;
    }
    .message {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 20px;
        font-size: 13px;
        line-height: 1.4;
        word-wrap: break-word;
    }
    .message.customer {
        background: #1E6DFF;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    .message.admin {
        background: #eef2f8;
        color: #1a2c42;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    .message small {
        display: block;
        font-size: 10px;
        opacity: 0.7;
        margin-top: 4px;
    }
    .chat-input-area {
        display: flex;
        padding: 12px;
        background: white;
        border-top: 1px solid #eef2fc;
        gap: 8px;
    }
    .chat-input-area input {
        flex: 1;
        border: 1px solid #dce5f0;
        border-radius: 40px;
        padding: 10px 16px;
        font-size: 13px;
        outline: none;
    }
    .chat-input-area button {
        background: #1E6DFF;
        border: none;
        border-radius: 40px;
        padding: 0 20px;
        color: white;
        font-weight: 600;
        cursor: pointer;
    }
    .chat-status {
        font-size: 10px;
        padding: 5px 12px;
        background: #eef2f8;
        text-align: center;
        color: #4f657f;
    }
    @media (max-width: 560px) {
        .chat-window { width: 300px; right: -20px; }
        .chatbot-container { right: 16px; bottom: 100px; }
        .floating-add { right: 16px; bottom: 32px; }
    }
</style>

<div class="chatbot-container" id="chatbotContainer">

        <i class="fas fa-comment-dots"></i>
    </div>
    <div class="chat-window" id="chatWindow" style="display: none;">
        <div class="chat-header">

        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="输入您的需求或问题...">
            <button id="chatSendBtn">发送</button>
        </div>
        <div class="chat-status" id="chatStatus">在线 · 客服响应中</div>
    </div>
</div>

<script>
    // ========== 客服聊天组件逻辑 (与后端API通信) ==========
    (function() {
        // 生成或获取唯一的客户ID
        let clientId = localStorage.getItem('lezhe_client_id');
        if (!clientId) {
            clientId = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('lezhe_client_id', clientId);
        }
        
        const API_BASE = '/api'; // 后端API根路径
        let pollingInterval = null;
        let chatWindowVisible = false;
        
        // DOM 元素
        const chatToggle = document.getElementById('chatToggleBtn');
        const chatWindow = document.getElementById('chatWindow');
        const chatClose = document.getElementById('chatCloseBtn');
        const chatMessagesDiv = document.getElementById('chatMessagesList');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatStatusSpan = document.getElementById('chatStatus');
        
        // 辅助函数: 获取历史消息
        async function fetchMessages() {
            try {
                const res = await fetch(`${API_BASE}/messages/${clientId}`);
                if (!res.ok) throw new Error();
                const messages = await res.json();
                renderMessages(messages);
            } catch (err) {
                console.warn('获取消息失败', err);
                if (chatStatusSpan) chatStatusSpan.innerText = '连接中...';
            }
        }
        
        // 渲染消息列表
        function renderMessages(messages) {
            if (!chatMessagesDiv) return;
            // 保留原始DOM？ 清空但保留可能没有历史消息时，可显示欢迎语，但避免重复清空欢迎语。正确方式：先清空，再渲染所有
            // 但为了防止覆盖欢迎语导致空窗，如果有消息则全量渲染，若没有消息则显示默认欢迎语。
            chatMessagesDiv.innerHTML = '';
            if (!messages || messages.length === 0) {
                // 显示默认欢迎语
                const welcomeDiv = document.createElement('div');
                welcomeDiv.className = 'message admin';
                welcomeDiv.innerText = '👋 您好！我是乐哲软件客服，有任何需求或问题请留言，我们会尽快回复您～';
                chatMessagesDiv.appendChild(welcomeDiv);
            } else {
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.sender === 'customer' ? 'customer' : 'admin'}`;
                    msgDiv.innerHTML = `${escapeHtml(msg.text)}<small>${new Date(msg.timestamp).toLocaleTimeString()}</small>`;
                    chatMessagesDiv.appendChild(msgDiv);
                });
            }
            // 滚动到底部
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // 发送消息
        async function sendMessage(text) {
            if (!text.trim()) return;
            const message = {
                clientId: clientId,
                text: text.trim(),
                sender: 'customer'
            };
            try {
                const res = await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });
                if (!res.ok) throw new Error('发送失败');
                chatInput.value = '';
                // 发送成功后重新拉取消息
                await fetchMessages();
                // 可选：告知用户消息已发送
                if (chatStatusSpan) chatStatusSpan.innerText = '消息已发送，客服会尽快回复';
                setTimeout(() => {
                    if (chatStatusSpan) chatStatusSpan.innerText = '在线 · 客服响应中';
                }, 2000);
            } catch (err) {
                alert('发送失败，请稍后重试');
                console.error(err);
            }
        }
        
        // 开始轮询新消息
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (chatWindowVisible) {
                    fetchMessages();
                }
            }, 4000);
        }
        
        // 界面控制
        function openChat() {
            chatWindow.style.display = 'flex';
            chatWindowVisible = true;
            fetchMessages();
            startPolling();
        }
        function closeChat() {
            chatWindow.style.display = 'none';
            chatWindowVisible = false;
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }
        
        chatToggle.addEventListener('click', () => {
            if (chatWindow.style.display === 'none' || !chatWindowVisible) {
                openChat();
            } else {
                closeChat();
            }
        });
        chatClose.addEventListener('click', closeChat);
        chatSendBtn.addEventListener('click', () => sendMessage(chatInput.value));
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage(chatInput.value);
        });
        
        // 初始隐藏聊天窗口，不轮询，打开时才轮询
        chatWindow.style.display = 'none';
        chatWindowVisible = false;
        // 确保页面加载完成后测试API连通性 (不主动拉取)
        window.addEventListener('load', () => {
            // 静默测试API，不影响体验
            fetch(`${API_BASE}/messages/${clientId}`).catch(e => console.log("等待后端启动"));
        });
    })();
</script>

<script>

    let softwareLibrary = [

        { id: 7, name: "AutoCAD", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2025", description: "计算机辅助设计，二维绘图与三维建模行业标准", status: "pending", downloadUrl: null },
        { id: 8, name: "Maya", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2026", description: "三维动画、建模、渲染及特效软件", status: "pending", downloadUrl: null },
        { id: 9, name: "3ds Max", category: "Autodesk系列", osSupport: ["Windows"], version: "2025", description: "专业三维建模、动画与渲染，游戏开发首选", status: "uploaded", downloadUrl: "https://v6fsd03qf7.feishu.cn/drive/folder/OXY9fBtWqlWSptdr059c0dvZnFg" },
        { id: 10, name: "Sketch", category: "其他软件", osSupport: ["Mac"], version: "100", description: "轻量级UI/UX设计工具，矢量编辑与原型设计", status: "pending", downloadUrl: null },
        { id: 11, name: "Figma", category: "其他软件", osSupport: ["Windows","Mac"], version: "2026", description: "协作式界面设计工具，云端实时协作", status: "pending", downloadUrl: null },
        { id: 12, name: "Blender", category: "其他软件", osSupport: ["Windows","Mac"], version: "4.2", description: "开源全能3D创作套件，建模雕刻动画渲染", status: "pending", downloadUrl: null },
        { id: 13, name: "Revit", category: "Autodesk系列", osSupport: ["Windows"], version: "2026", description: "建筑信息模型BIM软件，建筑设计施工", status: "pending", downloadUrl: null },
        { id: 14, name: "Substance 3D Painter", category: "Adobe系列", osSupport: ["Windows","Mac"], version: "即将发布", description: "3D纹理绘制工具，物理材质渲染", status: "pending", downloadUrl: null },
        { id: 15, name: "Fusion 360", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2026 Beta", description: "云端三维CAD/CAM，工业设计协作", status: "pending", downloadUrl: null },
        { id: 16, name: "Capture One", category: "其他软件", osSupport: ["Windows","Mac"], version: "2025", description: "专业级RAW图像处理与联机拍摄", status: "pending", downloadUrl: null }
    ];
    let currentCategory = "all", currentOS = "all", currentStatus = "all", searchKeyword = "";
    const gridContainer = document.getElementById("softwareGridContainer");
    const searchInput = document.getElementById("globalSearchInput");
    const categoryBtns = document.querySelectorAll("#categoryFilters .filter-chip");
    const osBtns = document.querySelectorAll("#osFilters .filter-chip");
    const statusBtns = document.querySelectorAll("#statusFilters .filter-chip");
    const openModalBtn = document.getElementById("openUploadModalBtn");
    const modal = document.getElementById("uploadModal");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const confirmAddBtn = document.getElementById("confirmAddBtn");
    function updateStatsUI() {
        const total = softwareLibrary.length;
        const winCount = softwareLibrary.filter(sw => sw.osSupport.includes("Windows")).length;
        const macCount = softwareLibrary.filter(sw => sw.osSupport.includes("Mac")).length;
        document.getElementById("totalCountHero").innerText = total;
        document.getElementById("windowsCountHero").innerText = winCount;
        document.getElementById("macCountHero").innerText = macCount;
    }
    function getFilteredSoftware() {
        return softwareLibrary.filter(sw => {
            if (currentCategory !== "all" && sw.category !== currentCategory) return false;
            if (currentOS !== "all" && !sw.osSupport.includes(currentOS)) return false;
            if (currentStatus !== "all" && sw.status !== currentStatus) return false;
            if (searchKeyword.trim() !== "") {
                const kw = searchKeyword.trim().toLowerCase();
                const matchName = sw.name.toLowerCase().includes(kw);
                const matchDesc = sw.description.toLowerCase().includes(kw);
                if (!matchName && !matchDesc) return false;
            }
            return true;
        });
    }
    function escapeHtmlSoft(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    function renderGrid() {
        const filtered = getFilteredSoftware();
        if (filtered.length === 0) { gridContainer.innerHTML = `<div class="empty-state"><i class="fas fa-box-open" style="font-size: 48px; opacity: 0.6;"></i><p style="margin-top: 20px; font-weight: 500;">暂无匹配的软件，试试清除筛选或上传新软件～</p></div>`; updateStatsUI(); return; }
        const cardsHtml = filtered.map(sw => { const hasRealLink = sw.downloadUrl && sw.downloadUrl.trim() !== ""; const displayStatus = hasRealLink ? "uploaded" : "pending"; const statusClass = displayStatus === "uploaded" ? "status-uploaded" : "status-pending"; const statusText = displayStatus === "uploaded" ? "已上传" : "待上传"; const btnClass = hasRealLink ? "btn-active" : "btn-pending"; const btnDisabled = hasRealLink ? "" : "disabled"; const btnText = hasRealLink ? '<i class="fas fa-download"></i> 下载安装包' : '<i class="fas fa-hourglass-half"></i> 待上传'; const osTagsHtml = sw.osSupport.map(os => { const icon = os === "Windows" ? '<i class="fab fa-windows"></i>' : '<i class="fab fa-apple"></i>'; return `<span class="os-badge">${icon} ${os}</span>`; }).join(''); return `<div class="software-card" data-id="${sw.id}"><div class="card-header"><span class="software-name">${escapeHtmlSoft(sw.name)}</span><span class="status-badge ${statusClass}"><i class="fas ${displayStatus === 'uploaded' ? 'fa-check-circle' : 'fa-clock'}"></i> ${statusText}</span></div><div class="version-tag">版本 ${escapeHtmlSoft(sw.version)}</div><div class="description">${escapeHtmlSoft(sw.description)}</div><div class="os-tags">${osTagsHtml}</div><button class="download-btn ${btnClass}" ${btnDisabled} data-url="${hasRealLink ? escapeHtmlSoft(sw.downloadUrl) : ''}" data-name="${escapeHtmlSoft(sw.name)}">${btnText}</button></div>`; }).join('');
        gridContainer.innerHTML = cardsHtml;
        document.querySelectorAll('.download-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const url = btn.getAttribute('data-url'); const softName = btn.getAttribute('data-name'); if (url && url.trim() !== "") { window.open(url, '_blank'); } else { alert(`⏳ “${softName}” 暂未提供下载链接，敬请期待后续上传。`); } }); });
        updateStatsUI();
    }
    function refreshAll() { renderGrid(); }
    function bindEvents() {
        categoryBtns.forEach(btn => { btn.addEventListener('click', () => { currentCategory = btn.getAttribute('data-cat'); categoryBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshAll(); }); });
        osBtns.forEach(btn => { btn.addEventListener('click', () => { currentOS = btn.getAttribute('data-os'); osBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshAll(); }); });
        statusBtns.forEach(btn => { btn.addEventListener('click', () => { currentStatus = btn.getAttribute('data-status'); statusBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshAll(); }); });
        searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; refreshAll(); });
    }
    function showModal() { modal.style.display = "flex"; document.getElementById("newName").value = ""; document.getElementById("newCategory").value = "Adobe系列"; document.querySelectorAll(".os-multi").forEach(cb => cb.checked = false); document.getElementById("newVersion").value = "2026"; document.getElementById("newDesc").value = ""; document.querySelector("input[name='uploadStatus'][value='uploaded']").checked = true; }
    function hideModal() { modal.style.display = "none"; }
    function addNewSoftware() { const name = document.getElementById("newName").value.trim(); if (!name) { alert("请填写软件名称"); return; } const category = document.getElementById("newCategory").value; const version = document.getElementById("newVersion").value.trim() || "最新版"; const description = document.getElementById("newDesc").value.trim() || "专业的创意工具，支持正版授权"; const osSelected = Array.from(document.querySelectorAll(".os-multi:checked")).map(cb => cb.value); if (osSelected.length === 0) { alert("请至少选择一个支持的操作系统"); return; } const statusRadio = document.querySelector("input[name='uploadStatus']:checked").value; const newId = softwareLibrary.length > 0 ? Math.max(...softwareLibrary.map(s => s.id)) + 1 : 100; softwareLibrary.push({ id: newId, name, category, osSupport: osSelected, version, description, status: statusRadio, downloadUrl: null }); hideModal(); currentCategory = "all"; currentOS = "all"; currentStatus = "all"; searchKeyword = ""; searchInput.value = ""; categoryBtns.forEach(btn => { if(btn.getAttribute('data-cat') === 'all') btn.classList.add('active'); else btn.classList.remove('active'); }); osBtns.forEach(btn => { if(btn.getAttribute('data-os') === 'all') btn.classList.add('active'); else btn.classList.remove('active'); }); statusBtns.forEach(btn => { if(btn.getAttribute('data-status') === 'all') btn.classList.add('active'); else btn.classList.remove('active'); }); refreshAll(); alert(`✨ 软件“${name}”已成功添加。`); }
    openModalBtn.addEventListener("click", showModal); closeModalBtn.addEventListener("click", hideModal); confirmAddBtn.addEventListener("click", addNewSoftware); window.addEventListener("click", (e) => { if (e.target === modal) hideModal(); });
    bindEvents(); refreshAll();
</script>
