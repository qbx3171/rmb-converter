    // ========== 通用函数 ==========
    function showToast(msg, type='success') {

    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    const hamburger = document.getElementById('hamburgerBtn');

        hamburger.addEventListener('click', ()=>{ hamburger.classList.toggle('active'); navLinks.classList.toggle('show'); });
        navLinks.querySelectorAll('a').forEach(l=> l.addEventListener('click', ()=>{ hamburger.classList.remove('active'); navLinks.classList.remove('show'); }));
    }

    // 主题切换
    const themeClasses = ['bg-dawn','bg-morning','bg-afternoon','bg-evening','bg-night',''];
    const themeIcons = ['fa-sun','fa-sun','fa-cloud-sun','fa-cloud-sun','fa-moon','fa-sun'];
    let currentTheme = parseInt(localStorage.getItem('manualTheme')) || 2;
    function applyTheme(i) { document.body.className = themeClasses[i]; const icon = document.querySelector('#themeToggleBtn i'); if(icon) icon.className = `fas ${themeIcons[i]}`; localStorage.setItem('manualTheme', i); }
    applyTheme(currentTheme);

    if(themeBtn) themeBtn.addEventListener('click', ()=>{ currentTheme = (currentTheme+1)%themeClasses.length; applyTheme(currentTheme); });

    // 广告代理（仅用于 Airtable 附件）
    function getOptimizedAdImageUrl(originalUrl) {
        if(!originalUrl) return '';
        if(originalUrl.startsWith('http') && !originalUrl.includes('dl.airtable.com') && !originalUrl.includes('api.airtable.com')) return originalUrl;
        if(originalUrl.startsWith('data:')) return originalUrl;
        if(originalUrl.includes('dl.airtable.com') || originalUrl.includes('api.airtable.com')) {
            return `https://images.weserv.nl/?url=${encodeURIComponent(originalUrl)}&w=1200&h=500&fit=cover&we&q=80`;
        }
        return originalUrl;
    }

    // 广告轮播
    let bannerCarouselInterval = null, sidebarCarouselInterval = null;
    let currentBannerIndex = 0, currentSidebarIndex = 0;
    const bannerSlides = document.getElementById('categoryBannerSlides');
    const bannerDots = document.getElementById('categoryBannerDots');
    const sidebarSlides = document.getElementById('sidebarCarouselSlides');
    const sidebarDots = document.getElementById('sidebarCarouselDots');

    function renderCarousel(containerSlides, containerDots, ads, isBanner = true) {
        if(!containerSlides || !containerDots) return;
        const slideClass = isBanner ? 'banner-carousel-slide' : 'sidebar-carousel-slide';
        const dotClass = isBanner ? 'banner-carousel-dot' : 'sidebar-carousel-dot';
        containerSlides.innerHTML = ads.map((ad,i)=>`
            <div class="${slideClass}"><a href="${escapeHtml(ad.link)}" target="_blank"><img src="${escapeHtml(ad.image)}" alt="${escapeHtml(ad.title)}" loading="${i===0?'eager':'lazy'}" style="width:100%;height:100%;object-fit:cover;background:#e2e8f0;" onload="this.style.opacity='1';this.classList.add('loaded');" onerror="this.onerror=null; this.src='${FALLBACK_ADS[0].image}';"></a></div>
        `).join('');
        if(ads.length <=1) { containerDots.style.display = 'none'; return; }
        containerDots.style.display = 'flex';
        containerDots.innerHTML = ads.map((_,i)=>`<div class="${dotClass} ${i===0?'active':''}" data-index="${i}"></div>`).join('');
        const updateFn = (index) => {
            if(isBanner) currentBannerIndex = index;
            else currentSidebarIndex = index;
            containerSlides.style.transform = `translateX(-${index*100}%)`;
            const dotsEl = containerDots.querySelectorAll(`.${dotClass}`);
            dotsEl.forEach((d,idx)=> d.classList.toggle('active', idx===index));
        };
        containerDots.querySelectorAll(`.${dotClass}`).forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index);
                updateFn(idx);
                resetAutoPlay(isBanner);
            });
        });
        return updateFn;
    }

    function startAutoPlay(isBanner) {
        const intervalRef = isBanner ? bannerCarouselInterval : sidebarCarouselInterval;
        if(intervalRef) clearInterval(intervalRef);
        const slides = isBanner ? bannerSlides : sidebarSlides;
        const dots = isBanner ? bannerDots : sidebarDots;
        const ads = isBanner ? bannerAds : sidebarAds;
        if(ads.length <=1) return;
        const interval = setInterval(() => {
            const current = isBanner ? currentBannerIndex : currentSidebarIndex;
            const next = (current+1) % ads.length;
            if(isBanner) currentBannerIndex = next;
            else currentSidebarIndex = next;
            slides.style.transform = `translateX(-${next*100}%)`;
            const dotClass = isBanner ? 'banner-carousel-dot' : 'sidebar-carousel-dot';
            const dotsEl = dots.querySelectorAll(`.${dotClass}`);
            dotsEl.forEach((d,i)=> d.classList.toggle('active', i===next));
        }, 4000);
        if(isBanner) bannerCarouselInterval = interval;
        else sidebarCarouselInterval = interval;
    }
    function resetAutoPlay(isBanner) {
        if(isBanner && bannerCarouselInterval) clearInterval(bannerCarouselInterval);
        else if(!isBanner && sidebarCarouselInterval) clearInterval(sidebarCarouselInterval);
        startAutoPlay(isBanner);
    }

    if(bannerSlides && bannerDots) { renderCarousel(bannerSlides, bannerDots, bannerAds, true); startAutoPlay(true); }
    if(sidebarSlides && sidebarDots) { renderCarousel(sidebarSlides, sidebarDots, sidebarAds, false); startAutoPlay(false); }

    // 日历
    let currentDate = new Date();
    function renderCalendar() {
        const y=currentDate.getFullYear(), m=currentDate.getMonth();
        const firstDay=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
        const monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
        const monthYearEl = document.getElementById('calendarMonthYear');
        const daysEl = document.getElementById('calendarDays');
        if(monthYearEl) monthYearEl.innerText=`${y}年 ${monthNames[m]}`;
        if(!daysEl) return;
        let html='<div class="calendar-day-name">一</div><div class="calendar-day-name">二</div><div class="calendar-day-name">三</div><div class="calendar-day-name">四</div><div class="calendar-day-name">五</div><div class="calendar-day-name">六</div><div class="calendar-day-name">日</div>';
        let day=1;
        for(let i=0;i<6;i++) for(let j=0;j<7;j++){
            if(i===0 && j<(firstDay===0?6:firstDay-1)) html+='<div class="calendar-day"></div>';
            else if(day>days) html+='<div class="calendar-day"></div>';
            else{ const isToday=day===new Date().getDate()&&m===new Date().getMonth()&&y===new Date().getFullYear(); html+=`<div class="calendar-day ${isToday?'today':''}">${day}</div>`; day++; }
        }
        daysEl.innerHTML=html;
    }
    const prevMonth = document.getElementById('prevMonth');
    const nextMonth = document.getElementById('nextMonth');
    if(prevMonth) prevMonth.addEventListener('click', ()=>{ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); });
    if(nextMonth) nextMonth.addEventListener('click', ()=>{ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); });
    renderCalendar();

    // 软件相关
    const CATEGORY_DISPLAY = { 'adobe':'Adobe系列','autodesk':'Autodesk系列','c4d':'Cinema 4D','sketchup':'草图大师','rhino':'犀牛软件','plugin':'插件工具','other':'其他' };
    function getStandardAbbreviation(name) {
        if(!name) return 'SW';
        const lower = name.toLowerCase();
        const map = { 'photoshop':'PS','illustrator':'AI','premiere pro':'PR','after effects':'AE','lightroom':'LR','indesign':'ID','cinema 4d':'C4D','c4d':'C4D','autocad':'AC','cad':'CAD','3ds max':'3DS','maya':'MA','sketchup':'SU','rhino':'RH','blender':'BL' };
        if(map[lower]) return map[lower];
        for(let k in map) if(lower.includes(k)) return map[k];
        if(/[\u4e00-\u9fa5]/.test(name)) return name[0];
        const words = name.split(/[\s\-_]+/).filter(w=>w.length);
        if(words.length>=2) return words.map(w=>w[0].toUpperCase()).slice(0,3).join('');
        return name.slice(0,2).toUpperCase();
    }
    function getColorFromName(name) { let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash); return `hsl(${Math.abs(hash)%360},70%,55%)`; }
    function getLiked() { try{ return JSON.parse(localStorage.getItem('likedSoftwares'))||[]; } catch{ return []; } }
    function toggleLike(name) { let liked=getLiked(); if(liked.includes(name)) liked=liked.filter(n=>n!==name); else liked.push(name); localStorage.setItem('likedSoftwares', JSON.stringify(liked)); renderGrid(); }
    function addToHistory(sw) { let h=JSON.parse(localStorage.getItem('browseHistory'))||[]; h=h.filter(i=>i.name!==sw.name); h.unshift({name:sw.name, icon:sw.icon, category:sw.category}); if(h.length>10) h.pop(); localStorage.setItem('browseHistory', JSON.stringify(h)); renderHistoryList(); }
    function renderHistoryList() {
        const history = JSON.parse(localStorage.getItem('browseHistory')) || [];
        const container = document.getElementById('historyList');
        if(!container) return;
        if(!history.length) { container.innerHTML='<div style="color:#94a3b8; padding:8px 0;">暂无浏览记录</div>'; return; }
        container.innerHTML = history.map(h=> `<div class="history-item" data-name="${escapeHtml(h.name)}"><i class="fas fa-clock"></i> ${escapeHtml(h.name)}</div>`).join('');
        container.querySelectorAll('.history-item').forEach(item=>{ item.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===item.dataset.name); if(sw) downloadSoftware(sw); }); });
    }
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    if(clearHistoryBtn) clearHistoryBtn.addEventListener('click', ()=>{ localStorage.removeItem('browseHistory'); renderHistoryList(); showToast('浏览历史已清空'); });

    function renderIconHtml(icon, name) {
        if(!icon) icon = { type:'text', value: getStandardAbbreviation(name) };
        if(icon.type === 'image') {
            const imgUrl = icon.value;
            return `<img src="${escapeHtml(imgUrl)}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" onload="this.style.display='block'; this.nextElementSibling.style.display='none';"><div class="icon-fallback" style="background: ${getColorFromName(name)}; display:none;">${escapeHtml(getStandardAbbreviation(name))}</div>`;
        }
        if(icon.type === 'icon') {
            return `<i class="fas ${escapeHtml(icon.value)}"></i>`;
        }
        const abbr = icon.value || getStandardAbbreviation(name);
        const color = getColorFromName(name);
        return `<div class="icon-fallback" style="background: ${color};">${escapeHtml(abbr)}</div>`;
    }

    function downloadSoftware(sw) {
        addToHistory(sw);
        window.open(sw.url, '_blank');
        if(sw.id && !sw.id.startsWith('fb') && !sw.id.startsWith('b')) incrementDownloadCount(sw.id);
    }

    // 热门推荐滚动
    const hotScroll = document.getElementById('hotScroll');
    let hotScrollInterval = null;
    function startHotAutoScroll() { if(!hotScroll) return; if(hotScrollInterval) clearInterval(hotScrollInterval); hotScrollInterval = setInterval(()=>{ const maxScroll = hotScroll.scrollWidth - hotScroll.clientWidth; if(hotScroll.scrollLeft >= maxScroll-10) hotScroll.scrollTo({ left: 0, behavior: 'smooth' }); else hotScroll.scrollBy({ left: 220, behavior: 'smooth' }); }, 2000); }
    function stopHotAutoScroll() { if(hotScrollInterval) { clearInterval(hotScrollInterval); hotScrollInterval=null; } }
    const leftHot = document.getElementById('hotArrowLeft');
    const rightHot = document.getElementById('hotArrowRight');
    if(leftHot) leftHot.addEventListener('click', ()=>{ if(hotScroll) hotScroll.scrollBy({ left: -220, behavior: 'smooth' }); stopHotAutoScroll(); startHotAutoScroll(); });
    if(rightHot) rightHot.addEventListener('click', ()=>{ if(hotScroll) hotScroll.scrollBy({ left: 220, behavior: 'smooth' }); stopHotAutoScroll(); startHotAutoScroll(); });
    
    function renderHotSection() {
        if(!hotScroll || !softwares.length) return;
        const sorted = [...softwares].sort((a,b)=>(b.downloads||0)-(a.downloads||0));
        const top6 = sorted.slice(0,6);
        hotScroll.innerHTML = top6.map(sw=>`<div class="hot-card" data-name="${escapeHtml(sw.name)}"><div class="hot-icon">${renderIconHtml(sw.icon, sw.name)}</div><div class="hot-name">${escapeHtml(sw.name)}</div><div class="hot-meta"><span>${sw.os.join(' · ')}</span><span class="hot-downloads"><i class="fas fa-download"></i> ${sw.downloads||0}</span></div></div>`).join('');
        hotScroll.querySelectorAll('.hot-card').forEach(card=>{ card.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===card.dataset.name); if(sw) downloadSoftware(sw); }); });
        if(hotScroll) { hotScroll.removeEventListener('mouseenter', stopHotAutoScroll); hotScroll.removeEventListener('mouseleave', startHotAutoScroll); hotScroll.addEventListener('mouseenter', stopHotAutoScroll); hotScroll.addEventListener('mouseleave', startHotAutoScroll); }
        startHotAutoScroll();
    }
    function renderRankList() {
        const rankEl = document.getElementById('rankList');
        if(!rankEl) return;
        const sorted = [...softwares].sort((a,b)=>(b.downloads||0)-(a.downloads||0));
        const top5 = sorted.slice(0,5);
        rankEl.innerHTML = top5.map((sw,i)=>`<div class="rank-item" data-name="${escapeHtml(sw.name)}"><div class="rank-index ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div><div class="rank-info"><div class="rank-name">${escapeHtml(sw.name)}</div><div class="rank-downloads"><i class="fas fa-download"></i> ${sw.downloads||0}</div></div></div>`).join('');
        rankEl.querySelectorAll('.rank-item').forEach(item=>{ item.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===item.dataset.name); if(sw) downloadSoftware(sw); }); });
    }
    function renderRandomArticles() {
        const randomEl = document.getElementById('randomArticles');
        if(!randomEl || !softwares.length) return;
        const shuffled = [...softwares].sort(()=>0.5-Math.random()).slice(0,5);
        randomEl.innerHTML = shuffled.map(sw=>`<div class="random-article-item" data-name="${escapeHtml(sw.name)}"><div class="random-article-icon">${renderIconHtml(sw.icon, sw.name)}</div><div class="random-article-info"><div class="random-article-name">${escapeHtml(sw.name)}</div><div class="random-article-os">${sw.os.join(' · ')}</div></div></div>`).join('');
        randomEl.querySelectorAll('.random-article-item').forEach(item=>{ item.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===item.dataset.name); if(sw) downloadSoftware(sw); }); });
    }
    function renderCategories() {
        const catEl = document.getElementById('categoryTabs');
        if(!catEl) return;
        const catMap = new Map(); softwares.forEach(s=>catMap.set(CATEGORY_DISPLAY[s.category]||s.category, s.category));
        let html=`<button class="cat-chip ${currentCategory==='all'?'active':''}" data-cat="all">全部</button>`;
        Array.from(catMap.entries()).sort().forEach(([d,k])=>{ html+=`<button class="cat-chip ${currentCategory===k?'active':''}" data-cat="${k}">${d}</button>`; });
        catEl.innerHTML = html;
        catEl.querySelectorAll('.cat-chip').forEach(b=>b.addEventListener('click', ()=>{ currentCategory=b.dataset.cat; showAll=false; renderCategories(); renderGrid(); }));
    }
    let currentCategory="all", searchKeyword="", showAll=false;
    const DEFAULT_LIMIT=12;
    function renderGrid() {
        const filtered = softwares.filter(s=>(currentCategory==='all'||s.category===currentCategory) && s.name.toLowerCase().includes(searchKeyword.toLowerCase()));
        const items = showAll? filtered : filtered.slice(0,DEFAULT_LIMIT);
        const container = document.getElementById('softwareGridContainer');
        if(!container) return;
        if(!items.length){ container.innerHTML='<div class="no-results"><i class="fas fa-box-open"></i> 没有找到相关软件</div>'; document.getElementById('loadMoreContainer').style.display='none'; return; }
        const liked = getLiked();
        container.innerHTML = items.map(sw=>{
            const osTags = sw.os.map(o=>`<span class="os-badge">${o==='Windows'?'<i class="fab fa-windows"></i>':'<i class="fab fa-apple"></i>'} ${o}</span>`).join('');
            const isNew = (new Date()-new Date(sw.addedDate||'2024-01-01'))<7*86400000;
            const isHot = sw.downloads>2000;
            const badge = isNew?'<span class="new-badge">✨ 新</span>':(isHot?'<span class="hot-badge">🔥 热门</span>':'');
            const isLiked = liked.includes(sw.name);
            const iconHtml = renderIconHtml(sw.icon, sw.name);
            return `<div class="software-card" data-name="${escapeHtml(sw.name)}">${badge}<div class="card-header"><div class="card-icon">${iconHtml}</div><div class="software-name">${escapeHtml(sw.name)}</div></div><div class="version">版本 ${escapeHtml(sw.version)}</div><div class="description">${escapeHtml(sw.description)}</div><div class="os-tags">${osTags}</div><div class="card-footer"><div class="added-date"><i class="far fa-calendar-alt"></i> ${escapeHtml(sw.addedDate)}</div><div><span class="download-count"><i class="fas fa-download"></i> ${sw.downloads||0}</span><button class="like-btn" data-name="${escapeHtml(sw.name)}"><i class="${isLiked?'fas':'far'} fa-heart"></i></button></div></div></div>`;
        }).join('');
        const loadMoreDiv = document.getElementById('loadMoreContainer');
        if(loadMoreDiv) loadMoreDiv.style.display = (!showAll && filtered.length>DEFAULT_LIMIT)?'block':'none';
        container.querySelectorAll('.software-card').forEach(card=>{ card.addEventListener('click', (e)=>{ if(e.target.closest('.like-btn')) return; const sw = softwares.find(s=>s.name===card.dataset.name); if(sw) downloadSoftware(sw); }); });
        container.querySelectorAll('.like-btn').forEach(btn=>{ btn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleLike(btn.dataset.name); }); });
        renderRandomArticles();
    }
    async function incrementDownloadCount(recordId){ try{ const rec = await airtableRequest('GET', `softwares/${recordId}`); await airtableRequest('PATCH', `softwares/${recordId}`, { fields: { downloads: (rec.fields.downloads||0)+1 } }); const sw = softwares.find(s=>s.id===recordId); if(sw) sw.downloads = (sw.downloads||0)+1; renderRankList(); renderHotSection(); } catch(e){ console.warn(e); } }

    // Airtable 请求（带超时和重试）
    async function fetchWithTimeout(url, options, timeout=10000) {
        const controller = new AbortController();
        const id = setTimeout(()=>controller.abort(), timeout);
        try { const resp = await fetch(url, {...options, signal: controller.signal}); clearTimeout(id); return resp; }
        catch(e){ clearTimeout(id); throw e; }
    }
    async function airtableRequest(method, path, body=null, retries=2) {
        const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE_ID}/${path}`;
        const headers = { 'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' };
        const opts = { method, headers }; if(body) opts.body = JSON.stringify(body);
        for(let i=0;i<=retries;i++) {
            try {
                const resp = await fetchWithTimeout(url, opts, 10000);
                if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch(e) {
                if(i===retries) throw e;
                await new Promise(r=>setTimeout(r, 1000*(i+1)));
            }
        }
    }
    function getField(fields, possibleNames, defaultValue=''){ for(let n of possibleNames) if(fields[n]!==undefined) return fields[n]; return defaultValue; }
    function parseIcon(iconField, softwareName){
        if(!iconField) return { type:'text', value: getStandardAbbreviation(softwareName) };
        if(Array.isArray(iconField) && iconField[0]?.url) return { type:'image', value: iconField[0].url };
        if(typeof iconField === 'string'){
            if(iconField.startsWith('http')||iconField.startsWith('data:image')) return { type:'image', value: iconField };
            if(iconField.startsWith('fa-')||iconField.startsWith('fas ')) return { type:'icon', value: iconField };
            return { type:'text', value: iconField };
        }
        return { type:'text', value: getStandardAbbreviation(softwareName) };
    }
    async function fetchAirtableSoftwares() {
        try {
            const data = await airtableRequest('GET', 'softwares?maxRecords=100');
            return data.records.map(rec=>{
                const f=rec.fields;
                const name = getField(f,['A name','name','Name'],'未命名');
                const category = getField(f,['A category','category','Category'],'other');
                const version = getField(f,['version','Version'],'');
                const description = getField(f,['description','Description'],'');
                const iconParsed = parseIcon(getField(f,['icon','Icon'],null), name);
                const url = getField(f,['url','URL'],'#');
                const addedDate = getField(f,['addedDate','AddedDate'],new Date().toISOString().split('T')[0]);
                let downloads = Number(getField(f,['downloads','Downloads'],-1));
                if(downloads===-1) downloads = Math.floor(Math.random()*4951)+50;
                let osArray = ['Windows','Mac']; const osField = getField(f,['os','OS'],null);
                if(osField){ if(Array.isArray(osField)) osArray=osField; else if(typeof osField==='string') osArray=osField.split(',').map(s=>s.trim()); }
                return { id:rec.id, name, category, os:osArray, version, description, icon:iconParsed, url, noVerify:!!getField(f,['noVerify','NoVerify'],false), addedDate, downloads };
            });
        } catch(e) { console.warn('从Airtable获取软件失败', e); return []; }
    }
    async function fetchAirtableAds() {
        try {
            const data = await airtableRequest('GET', 'Ads?maxRecords=50');
            return data.records.map(r=>{
                const f=r.fields;
                let img = f.Image||f.image||'';
                if(Array.isArray(img) && img[0] && img[0].url) img = img[0].url;
                return { image: img, link: f.Link||f.link||'#', title: f.Title||f.title||'', position: (f.Position||f.position||'sidebar').toLowerCase(), enabled: f.Enabled!==false };
            }).filter(a=>a.enabled && a.image && a.link);
        } catch(e) { console.warn('从Airtable获取广告失败', e); return []; }
    }
    async function updateFromAirtable() {
        const [airtableSoftwares, airtableAds] = await Promise.all([fetchAirtableSoftwares(), fetchAirtableAds()]);
        if(airtableSoftwares.length) { softwares = airtableSoftwares; localStorage.setItem('cachedSoftwares', JSON.stringify(softwares)); }
        else { const cached = localStorage.getItem('cachedSoftwares'); if(cached) softwares = JSON.parse(cached); else softwares = [...FALLBACK_SOFTWARES]; }
        if(airtableAds.length) {
            const newBanner = airtableAds.filter(a=>a.position==='banner').map(a=>({image:getOptimizedAdImageUrl(a.image), link:a.link, title:a.title}));
            const newSidebar = airtableAds.filter(a=>a.position==='sidebar').map(a=>({image:getOptimizedAdImageUrl(a.image), link:a.link, title:a.title}));
            if(newBanner.length) bannerAds = newBanner;
            if(newSidebar.length) sidebarAds = newSidebar;
        }
        // 刷新界面
        renderCategories(); renderGrid(); renderHotSection(); renderRankList(); renderRandomArticles(); renderHistoryList();
        if(bannerSlides && bannerDots) { renderCarousel(bannerSlides, bannerDots, bannerAds, true); resetAutoPlay(true); }
        if(sidebarSlides && sidebarDots) { renderCarousel(sidebarSlides, sidebarDots, sidebarAds, false); resetAutoPlay(false); }
    }

    // 留言功能
    async function fetchMessages(){ try{ const data = await airtableRequest('GET', 'Messages?maxRecords=50'); return data.records; } catch{ return []; } }
    async function submitMessage(name, message){ await airtableRequest('POST', 'Messages', { fields: { Name: name||'热心网友', Message: message } }); }
    async function renderFeedbackList(){
        try{
            const msgs = await fetchMessages();
            const container = document.getElementById('feedbackListContainer');
            if(!container) return;
            if(!msgs.length){ container.innerHTML='<div style="text-align:center; padding:20px;">暂无留言，快来抢沙发~</div>'; return; }
            container.innerHTML = msgs.slice().reverse().slice(0,20).map(m=>`<div style="padding:16px 0; border-bottom:1px solid rgba(0,0,0,0.05);"><strong>${escapeHtml(m.fields.Name||'匿名')}</strong><span style="font-size:12px; color:#94a3b8; margin-left:12px;">${m.fields.CreatedAt?new Date(m.fields.CreatedAt).toLocaleString('zh-CN'):''}</span><div style="margin-top:6px;">${escapeHtml(m.fields.Message||'')}</div></div>`).join('');
        } catch(e){ console.warn(e); }
    }

    // 搜索
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    if(searchInput) searchInput.addEventListener('input', e=>{ searchKeyword=e.target.value; renderGrid(); });
    if(searchBtn) searchBtn.addEventListener('click', ()=>renderGrid());

    // 详情弹窗
    const closeModal = document.getElementById('closeDetailModal');
    const modal = document.getElementById('detailModal');
    if(closeModal) closeModal.addEventListener('click', ()=>modal.classList.remove('active'));
    if(modal) modal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('active'); });
    
    const feedbackBtn = document.getElementById('submitFeedbackBtn');
    if(feedbackBtn) feedbackBtn.addEventListener('click', async function(){
        const name = document.getElementById('feedbackName')?.value.trim()||'';
        const msg = document.getElementById('feedbackMessage')?.value.trim()||'';
        if(!msg) return showToast('请填写留言内容','error');
        this.disabled=true; this.innerHTML='<i class="fas fa-spinner fa-pulse"></i> 提交中...';
        try{ await submitMessage(name, msg); showToast('留言提交成功！'); if(document.getElementById('feedbackName')) document.getElementById('feedbackName').value=''; if(document.getElementById('feedbackMessage')) document.getElementById('feedbackMessage').value=''; await renderFeedbackList(); } catch(e){ showToast('提交失败: '+e.message,'error'); }
        finally{ this.disabled=false; this.innerHTML='<i class="fas fa-paper-plane"></i> 提交留言'; }
    });
    
    const loadMore = document.getElementById('loadMoreBtn');
    if(loadMore) loadMore.addEventListener('click', ()=>{ showAll=true; renderGrid(); });

    const backTop = document.getElementById('backToTop');
    window.addEventListener('scroll', ()=>backTop?.classList.toggle('show', window.scrollY>300));
    if(backTop) backTop.addEventListener('click', ()=>window.scrollTo({top:0, behavior:'smooth'}));

    function addBaiduPush(){ const bp = document.createElement('script'); bp.async=true; bp.src='https://zz.bdstatic.com/linksubmit/push.js'; document.head.appendChild(bp); }
    async function initAll() {
        // 立即用后备数据渲染（秒开），文字缩写不闪烁
        renderCategories(); renderGrid(); renderHotSection(); renderRankList(); renderRandomArticles(); renderHistoryList();
        if(bannerSlides && bannerDots) { renderCarousel(bannerSlides, bannerDots, bannerAds, true); resetAutoPlay(true); }
        if(sidebarSlides && sidebarDots) { renderCarousel(sidebarSlides, sidebarDots, sidebarAds, false); resetAutoPlay(false); }
        // 后台静默更新
        updateFromAirtable().catch(console.warn);
        addBaiduPush();
        await renderFeedbackList();
    }
    initAll();
})();
</script>
