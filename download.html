<script>
    // 客服系统
    const API_BASE = '/api';
    let clientId = localStorage.getItem('lezhe_client_id');
    if (!clientId) {
        clientId = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('lezhe_client_id', clientId);
    }

    async function fetchMessages() {
        const res = await fetch(`${API_BASE}/messages/${clientId}`);
        if (!res.ok) throw new Error('获取失败');
        return res.json();
    }

    async function sendMessage(text) {
        const res = await fetch(`${API_BASE}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId, text, sender: 'customer' })
        });
        if (!res.ok) throw new Error('发送失败');
        return res.json();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    async function renderMessages() {
        const container = document.getElementById('chatMessagesList');
        if (!container) return;
        const messages = await fetchMessages();
        container.innerHTML = '';
        if (messages.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot';
            welcomeDiv.innerHTML = `<strong>乐哲麦</strong>您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～`;
            container.appendChild(welcomeDiv);
        } else {
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.sender === 'customer' ? 'customer' : 'bot'}`;
                const displayName = msg.sender === 'customer' ? '我' : (msg.senderName || '乐哲麦');
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                msgDiv.innerHTML = `<strong>${escapeHtml(displayName)}</strong>${escapeHtml(msg.text)}<small>${timeStr}</small>`;
                container.appendChild(msgDiv);
            });
        }
        container.scrollTop = container.scrollHeight;
    }

    let pollingInterval = null, chatVisible = false, lastMsgCount = 0;
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            if (chatVisible) {
                const messages = await fetchMessages();
                if (messages.length !== lastMsgCount) {
                    renderMessages();
                    lastMsgCount = messages.length;
                }
            }
        }, 3000);
    }

    const chatToggle = document.getElementById('chatToggleBtn');
    const chatWindow = document.getElementById('chatWindow');
    const chatClose = document.getElementById('chatCloseBtn');
    const chatSendBtn = document.getElementById('chatSendBtn');
    const chatInput = document.getElementById('chatInput');

    async function openChat() {
        chatWindow.style.display = 'flex';
        chatVisible = true;
        await renderMessages();
        const messages = await fetchMessages();
        lastMsgCount = messages.length;
        startPolling();
    }
    function closeChat() { chatWindow.style.display = 'none'; chatVisible = false; if (pollingInterval) clearInterval(pollingInterval); }

    chatToggle.addEventListener('click', () => { if (chatWindow.style.display === 'none') openChat(); else closeChat(); });
    chatClose.addEventListener('click', closeChat);
    chatSendBtn.addEventListener('click', async () => { const text = chatInput.value.trim(); if (!text) return; await sendMessage(text); chatInput.value = ''; await renderMessages(); });
    chatInput.addEventListener('keypress', async (e) => { if (e.key === 'Enter') { const text = chatInput.value.trim(); if (!text) return; await sendMessage(text); chatInput.value = ''; await renderMessages(); } });
    chatWindow.style.display = 'none';

    // 拖拽
    const dragContainer = document.getElementById('chatbotContainer');
    const dragHandle = document.getElementById('chatHeaderDrag');
    let isDragging = false, startX, startY, startRight, startBottom;
    function getPos() { const style = getComputedStyle(dragContainer); return { right: parseFloat(style.right) || 32, bottom: parseFloat(style.bottom) || 110 }; }
    dragHandle.addEventListener('mousedown', (e) => { if (e.target.closest('.chat-close')) return; e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY; const pos = getPos(); startRight = pos.right; startBottom = pos.bottom; dragContainer.style.transition = 'none'; });
    window.addEventListener('mousemove', (e) => { if (!isDragging) return; e.preventDefault(); const dx = e.clientX - startX, dy = e.clientY - startY; let newRight = startRight - dx, newBottom = startBottom - dy; newRight = Math.min(Math.max(10, newRight), window.innerWidth - 70); newBottom = Math.min(Math.max(10, newBottom), window.innerHeight - 90); dragContainer.style.right = newRight + 'px'; dragContainer.style.bottom = newBottom + 'px'; });
    window.addEventListener('mouseup', () => { isDragging = false; dragContainer.style.transition = ''; });
</script>

        { id: 15, name: "Fusion 360", category: "Autodesk系列", osSupport: ["Windows","Mac"], version: "2026 Beta", description: "云端CAD/CAM", status: "pending", downloadUrl: null },
        { id: 16, name: "Capture One", category: "其他软件", osSupport: ["Windows","Mac"], version: "2025", description: "RAW图像处理", status: "pending", downloadUrl: null }
    ];
    let currentCategory = "all", currentOS = "all", currentStatus = "all", searchKeyword = "";
    const gridContainer = document.getElementById("softwareGridContainer");
    const searchInput = document.getElementById("globalSearchInput");
    const categoryBtns = document.querySelectorAll("#categoryFilters .filter-chip");
    const osBtns = document.querySelectorAll("#osFilters .filter-chip");
    const statusBtns = document.querySelectorAll("#statusFilters .filter-chip");
    function updateStatsUI() {
        document.getElementById("totalCountHero").innerText = softwareLibrary.length;
        document.getElementById("windowsCountHero").innerText = softwareLibrary.filter(sw => sw.osSupport.includes("Windows")).length;
        document.getElementById("macCountHero").innerText = softwareLibrary.filter(sw => sw.osSupport.includes("Mac")).length;
    }
    function getFilteredSoftware() {
        return softwareLibrary.filter(sw => {
            if (currentCategory !== "all" && sw.category !== currentCategory) return false;
            if (currentOS !== "all" && !sw.osSupport.includes(currentOS)) return false;
            if (currentStatus !== "all" && sw.status !== currentStatus) return false;
            if (searchKeyword.trim()) { const kw = searchKeyword.trim().toLowerCase(); return sw.name.toLowerCase().includes(kw) || sw.description.toLowerCase().includes(kw); }
            return true;
        });
    }
    function escapeHtmlSoft(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function renderGrid() {
        const filtered = getFilteredSoftware();
        if (filtered.length === 0) { gridContainer.innerHTML = `<div class="empty-state">暂无匹配软件</div>`; updateStatsUI(); return; }
        gridContainer.innerHTML = filtered.map(sw => {
            const hasRealLink = sw.downloadUrl && sw.downloadUrl.trim();
            const statusClass = hasRealLink ? "status-uploaded" : "status-pending";
            const statusText = hasRealLink ? "已上传" : "待上传";
            const btnClass = hasRealLink ? "btn-active" : "btn-pending";
            const btnDisabled = hasRealLink ? "" : "disabled";
            const btnText = hasRealLink ? '<i class="fas fa-download"></i> 下载安装包' : '<i class="fas fa-hourglass-half"></i> 待上传';
            const osTagsHtml = sw.osSupport.map(os => `<span class="os-badge">${os === "Windows" ? '<i class="fab fa-windows"></i>' : '<i class="fab fa-apple"></i>'} ${os}</span>`).join('');
            return `<div class="software-card"><div class="card-header"><span class="software-name">${escapeHtmlSoft(sw.name)}</span><span class="status-badge ${statusClass}">${statusText}</span></div><div class="version-tag">版本 ${escapeHtmlSoft(sw.version)}</div><div class="description">${escapeHtmlSoft(sw.description)}</div><div class="os-tags">${osTagsHtml}</div><button class="download-btn ${btnClass}" ${btnDisabled} data-url="${hasRealLink ? escapeHtmlSoft(sw.downloadUrl) : ''}" data-name="${escapeHtmlSoft(sw.name)}">${btnText}</button></div>`;
        }).join('');
        document.querySelectorAll('.download-btn').forEach(btn => { btn.addEventListener('click', () => { const url = btn.dataset.url; if (url) window.open(url, '_blank'); else alert('暂未提供下载链接'); }); });
        updateStatsUI();
    }
    function bindEvents() {
        categoryBtns.forEach(btn => btn.addEventListener('click', () => { currentCategory = btn.dataset.cat; categoryBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }));
        osBtns.forEach(btn => btn.addEventListener('click', () => { currentOS = btn.dataset.os; osBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }));
        statusBtns.forEach(btn => btn.addEventListener('click', () => { currentStatus = btn.dataset.status; statusBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }));
        searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; renderGrid(); });
    }
    bindEvents(); renderGrid();
</script>
