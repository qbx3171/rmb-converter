            { name: "Illustrator", category: "adobe", os: ["Windows", "Mac"], version: "CS6-2026", description: "矢量图形设计，标志、插画、排版全能。", icon: "fa-paint-brush", url: "https://p0lcr45sc1m.feishu.cn/docx/CTGEd8BkFowM8CxsM7McEm2Cnsf", noVerify: false, addedDate: "2024-09-10" },
            { name: "Lightroom", category: "adobe", os: ["Windows", "Mac"], version: "CS6-2026", description: "摄影后期调色与管理，高效批量处理。", icon: "fa-camera", url: "https://p0lcr45sc1m.feishu.cn/docx/RBrkdSt8OoEjCyxFo5UcnecJn8J?from=from_copylink", noVerify: false, addedDate: "2024-10-01" },

            { name: "Premiere Pro", category: "adobe", os: ["Windows", "Mac"], version: "CS6-2026", description: "专业视频剪辑，剪辑、调色、音频一站式。", icon: "fa-film", url: "https://p0lcr45sc1m.feishu.cn/docx/OP8VdvI69ocLHDxIlfEcYBFJnzd", noVerify: false, addedDate: "2024-10-20" },
            { name: "Bridge", category: "adobe", os: ["Windows", "Mac"], version: "CS6-2026", description: "数字资产管理软件和照片管理工具", icon: "fa-images", url: "https://www.yuque.com/example/bridge", noVerify: false, addedDate: "2024-11-05" },
            { name: "InDesign", category: "adobe", os: ["Windows", "Mac"], version: "CS6-2026", description: "专业排版软件", icon: "fa-book", url: "https://www.yuque.com/example/indesign", noVerify: false, addedDate: "2024-11-12" },
            { name: "Acrobat DC", category: "adobe", os: ["Windows", "Mac"], version: "AcrXIPro-2026", description: "PDF编辑与转换，文档处理专家", icon: "fa-file-pdf", url: "https://www.yuque.com/example/acrobat", noVerify: false, addedDate: "2024-11-20" },
            { name: "Adobe Cleaner Tools", category: "adobe", os: ["Windows", "Mac"], version: "最新版", description: "Adobe 官方清理工具，用于彻底删除残留文件和清理旧版本，解决安装冲突。", icon: "fa-broom", url: "https://www.yuque.com/example/adobe-cleaner", noVerify: false, addedDate: "2025-01-10" },
            { name: "AutoCAD", category: "autodesk", os: ["Windows", "Mac"], version: "2025", description: "计算机辅助设计，二维绘图与三维建模。", icon: "fa-cube", url: "https://www.yuque.com/islandgg13/tdg1oz/lbt43ghrvznz0329?singleDoc#", noVerify: false, addedDate: "2024-09-18" },
            { name: "3ds Max", category: "autodesk", os: ["Windows"], version: "2025", description: "专业三维建模、动画与渲染，游戏开发首选。", icon: "fa-cubes", url: "https://v6fsd03qf7.feishu.cn/drive/folder/OXY9fBtWqlWSptdr059c0dvZnFg", noVerify: false, addedDate: "2024-10-05" },
            { name: "Maya", category: "autodesk", os: ["Windows", "Mac"], version: "2026", description: "三维动画、建模、渲染及特效软件。", icon: "fa-shapes", url: "https://www.yuque.com/islandgg13/tdg1oz/wfkwhi?", noVerify: false, addedDate: "2024-11-01" },
            { name: "Cinema 4D", category: "c4d", os: ["Windows", "Mac"], version: "R19-2025", description: "三维建模、动画、渲染，影视后期必备。", icon: "fa-cube", url: "https://www.yuque.com/islandgg13/tdg1oz/vyh4pi?", noVerify: false, addedDate: "2024-11-25" },
            { name: "草图大师 (SketchUp)", category: "sketchup", os: ["Windows", "Mac"], version: "2015-2026", description: "建筑设计、室内设计、园林景观、城市规划。", icon: "fa-drafting-compass", url: "https://www.yuque.com/islandgg13/tdg1oz/sicdf3?", noVerify: false, addedDate: "2024-12-01" },
            { name: "犀牛软件 Rhino 7/8 (Win)", category: "rhino", os: ["Windows"], version: "5.0-8.28", description: "工业设计、建筑设计、船舶设计、珠宝设计。", icon: "fa-ruler-combined", url: "https://www.yuque.com/islandgg13/tdg1oz/hxmtbq?", noVerify: false, addedDate: "2024-12-10" },
            { name: "犀牛软件 Rhino 7/8 (Mac)", category: "rhino", os: ["Mac"], version: "5.0-8.21", description: "工业设计、建筑设计、船舶设计、珠宝设计（Mac版）。", icon: "fa-ruler-combined", url: "https://www.yuque.com/islandgg13/tdg1oz/hq0syy?", noVerify: false, addedDate: "2024-12-12" },
            { name: "Adobe 插件全套", category: "plugin", os: ["Windows", "Mac"], version: "2026 最新版", description: "支持2026最新版软件，购买注册码请联系客服（一机一码）。", icon: "fa-puzzle-piece", url: "https://pan.baidu.com/s/1TEp8VSfZcCNgV6DBVUJTvA?pwd=8888", noVerify: true, addedDate: "2025-02-01" }
        ];

        const CATEGORY_DISPLAY = {
            'adobe': 'Adobe系列',
            'autodesk': 'Autodesk系列',
            'c4d': 'Cinema 4D',
            'sketchup': '草图大师',
            'rhino': '犀牛软件',
            'plugin': '插件工具'
        };

        let softwares = [];
        let currentCategory = "all";
        let searchKeyword = "";
        let pendingUrl = null;
        let showAll = false;          // 是否显示全部软件（默认 false，只显示前 LIMIT 条）
        const DEFAULT_LIMIT = 12;     // 默认显示数量

        const gridContainer = document.getElementById("softwareGridContainer");
        const searchInput = document.getElementById("searchInput");
        const categoryTabs = document.getElementById("categoryTabs");
        const loadMoreContainer = document.getElementById("loadMoreContainer");
        const loadMoreBtn = document.getElementById("loadMoreBtn");

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        function formatDate(dateStr) {
            if (!dateStr) return "2024-01-01";
            return dateStr;
        }

        function renderIcon(iconValue) {
            if (!iconValue) return '<span class="text-badge">📦</span>';
            if (typeof iconValue === 'string' && iconValue.startsWith('fa-')) {
                return `<i class="fas ${iconValue}"></i>`;
            } else {
                let text = iconValue.slice(0, 3).toUpperCase();
                return `<span class="text-badge">${escapeHtml(text)}</span>`;
            }
        }

        function renderCategories() {
            const catMap = new Map();
            for (const sw of softwares) {
                const display = sw.categoryDisplay;
                const key = sw.category;
                if (!catMap.has(display)) catMap.set(display, key);
            }
            let html = `<button class="cat-chip ${currentCategory === "all" ? "active" : ""}" data-cat="all">全部</button>`;
            for (let [display, key] of catMap.entries()) {
                html += `<button class="cat-chip ${currentCategory === key ? "active" : ""}" data-cat="${key}">${display}</button>`;
            }
            categoryTabs.innerHTML = html;
            document.querySelectorAll('.cat-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.getAttribute('data-cat');
                    showAll = false;  // 切换分类时重置为限制显示
                    renderCategories();
                    renderGrid();
                });
            });
        }

        function getFiltered() {
            return softwares.filter(sw => {
                if (currentCategory !== "all" && sw.category !== currentCategory) return false;
                if (searchKeyword.trim() !== "") {
                    return sw.name.toLowerCase().includes(searchKeyword.trim().toLowerCase());
                }
                return true;
            });
        }

        function renderGrid() {
            const filtered = getFiltered();
            const totalCount = filtered.length;
            const displayItems = showAll ? filtered : filtered.slice(0, DEFAULT_LIMIT);
            
            if (displayItems.length === 0) {
                gridContainer.innerHTML = `<div class="no-results"><i class="fas fa-box-open"></i> 没有找到相关软件，试试其他关键词～</div>`;
                loadMoreContainer.style.display = 'none';
                return;
            }

            let cardsHtml = '';
            for (const sw of displayItems) {
                const osTags = sw.os.map(os => {
                    const icon = os === "Windows" ? '<i class="fab fa-windows"></i>' : '<i class="fab fa-apple"></i>';
                    return `<span class="os-badge">${icon} ${os}</span>`;
                }).join('');
                const iconHtml = renderIcon(sw.icon);
                const addedDateFormatted = formatDate(sw.addedDate);
                cardsHtml += `
                    <div class="software-card" data-name="${escapeHtml(sw.name)}">
                        <div class="card-header">
                            <div class="card-icon">${iconHtml}</div>
                            <div class="software-name">${escapeHtml(sw.name)}</div>
                        </div>
                        <div class="version">版本 ${escapeHtml(sw.version)}</div>
                        <div class="description">${escapeHtml(sw.description)}</div>
                        <div class="os-tags">${osTags}</div>
                        <div class="card-footer">
                            <div class="added-date"><i class="far fa-calendar-alt"></i> ${addedDateFormatted}</div>
                            <div class="download-hint"><i class="fas fa-arrow-right"></i> 获取</div>
                        </div>
                    </div>
                `;
            }
            gridContainer.innerHTML = cardsHtml;
            
            // 控制“加载更多”按钮显示：当未显示全部且过滤后总数大于当前显示数量时显示
            if (!showAll && totalCount > DEFAULT_LIMIT) {
                loadMoreContainer.style.display = 'block';
            } else {
                loadMoreContainer.style.display = 'none';
            }
            
            // 绑定卡片点击事件
            document.querySelectorAll('.software-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.getAttribute('data-name');
                    const sw = softwares.find(s => s.name === name);
                    if (sw) {
                        if (sw.noVerify) {
                            window.open(sw.url, '_blank');
                        } else {
                            pendingUrl = sw.url;
                            document.getElementById('verifyModal').classList.add('active');
                            document.getElementById('verifyCode').value = '';
                        }
                    }
                });
            });
        }

        function initSoftwareList() {
            softwares = DEFAULT_SOFTWARES.map(def => {
                const normCat = (CATEGORY_DISPLAY[def.category] ? def.category : def.category).toLowerCase();
                return {
                    ...def,
                    category: normCat,
                    categoryDisplay: CATEGORY_DISPLAY[normCat] || def.category,
                    addedDate: def.addedDate || "2024-01-01"
                };
            });
        }

        async function mergeAirtableSilently() {
            const AIRTABLE_TOKEN = 'patOe6PVCcEuaswP1.9aaa8be443f568c5c5b9a5d02485e0221e3f5a1b8d3873e95b1a35671ecbef1e';
            const BASE_ID = 'appM4Ty76lOlslpU9';
            const TABLE = 'softwares';
            const API_URL = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                const resp = await fetch(API_URL, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!resp.ok) throw new Error();
                const data = await resp.json();
                const airRecords = data.records.map(rec => {
                    const f = rec.fields;
                    const name = f.Name || f.name;
                    if (!name) return null;
                    let categoryRaw = (f.Category || f.category || '').toLowerCase();
                    if (!CATEGORY_DISPLAY[categoryRaw]) categoryRaw = 'plugin';
                    return {
                        name: name,
                        category: categoryRaw,
                        os: f.OS || f.Os || f.os || [],
                        version: f.Version || f.version || '',
                        description: f.Description || f.description || '',
                        icon: f.Icon || f.icon || '📦',
                        url: f.URL || f.Url || f.url || '#',
                        noVerify: f.NoVerify === true || f.noVerify === true || false,
                        addedDate: f.AddedDate || f.addedDate || new Date().toISOString().slice(0,10)
                    };
                }).filter(v => v && v.name);
                if (!airRecords.length) return;

                const existingMap = new Map();
                for (let i = 0; i < softwares.length; i++) {
                    existingMap.set(softwares[i].name.toLowerCase(), { index: i, software: softwares[i] });
                }
                for (const air of airRecords) {
                    const lowerName = air.name.toLowerCase();
                    if (existingMap.has(lowerName)) {
                        const target = existingMap.get(lowerName).software;
                        target.version = air.version || target.version;
                        target.description = air.description || target.description;
                        target.icon = air.icon || target.icon;
                        target.url = air.url || target.url;
                        target.noVerify = air.noVerify;
                        target.os = air.os.length ? air.os : target.os;
                        target.category = air.category;
                        target.categoryDisplay = CATEGORY_DISPLAY[air.category] || air.category;
                        if (air.addedDate) target.addedDate = air.addedDate;
                    }
                }
                const newSoftwares = [];
                for (const air of airRecords) {
                    const lowerName = air.name.toLowerCase();
                    if (!existingMap.has(lowerName)) {
                        newSoftwares.push({
                            ...air,
                            categoryDisplay: CATEGORY_DISPLAY[air.category] || air.category,
                            addedDate: air.addedDate || new Date().toISOString().slice(0,10)
                        });
                    }
                }
                if (newSoftwares.length) {
                    softwares.push(...newSoftwares);
                }
                renderCategories();
                renderGrid();
            } catch (e) {}
        }

        initSoftwareList();
        renderCategories();
        renderGrid();

        if (window.requestIdleCallback) {
            requestIdleCallback(() => mergeAirtableSilently(), { timeout: 3000 });
        } else {
            setTimeout(mergeAirtableSilently, 2000);
        }

        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            showAll = false;   // 搜索时重置为限制模式
            renderGrid();
        });

        // 加载更多按钮点击
        loadMoreBtn.addEventListener('click', () => {
            showAll = true;
            renderGrid();
        });

        // 隐藏导航栏滚动监听
        let lastScrollY = window.scrollY;
        const topNav = document.getElementById('topNav');
        function handleScroll() {
            if (window.scrollY > lastScrollY && window.scrollY > 70) {
                topNav.classList.add('hidden');
            } else {
                topNav.classList.remove('hidden');
            }
            lastScrollY = window.scrollY;
        }
        window.addEventListener('scroll', handleScroll);
        handleScroll();

        // 验证弹窗逻辑
        const modal = document.getElementById('verifyModal');
        const verifyCodeInput = document.getElementById('verifyCode');
        const confirmBtn = document.getElementById('confirmVerify');
        const cancelBtn = document.getElementById('cancelVerify');
        function closeModal() { modal.classList.remove('active'); pendingUrl = null; }
        confirmBtn.addEventListener('click', () => {
            if (verifyCodeInput.value.trim() === 'Win_Mac_123') {
                if (pendingUrl) { window.open(pendingUrl, '_blank'); pendingUrl = null; }
                closeModal();
            } else { alert("口令错误，请确认后重试。"); }
        });
        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // 聊天组件
        (function initChat() {
            let messages = [];
            const botReplyText = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～";
            const chatWindow = document.getElementById('chatWindow');
            const chatMessagesDiv = document.getElementById('chatMessagesList');
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');
            const chatToggle = document.getElementById('chatToggleBtn');
            const chatClose = document.getElementById('chatCloseBtn');
            function renderMessages() {
                chatMessagesDiv.innerHTML = '';
                if (messages.length === 0) {
                    const w = document.createElement('div'); w.className = 'message bot'; w.innerHTML = `<strong>乐哲麦</strong>${botReplyText}`;
                    chatMessagesDiv.appendChild(w);
                } else {
                    messages.forEach(msg => {
                        const d = document.createElement('div'); d.className = `message ${msg.sender === 'customer' ? 'customer' : 'bot'}`;
                        d.innerHTML = `<strong>${msg.sender === 'customer' ? '我' : '乐哲麦'}</strong>${escapeHtml(msg.text)}`;
                        chatMessagesDiv.appendChild(d);
                    });
                    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
                }
            }
            function addMsg(t, s) { messages.push({ text: t, sender: s }); renderMessages(); }
            function botReply() { if (messages.length && messages[messages.length-1].text === botReplyText) return; addMsg(botReplyText, 'bot'); }
            function sendCustomer(t) { if (!t.trim()) return; addMsg(t.trim(), 'customer'); setTimeout(botReply, 500); }
            chatSendBtn.onclick = () => { let v = chatInput.value.trim(); if(v) sendCustomer(v); chatInput.value = ''; };
            chatInput.onkeypress = e => { if (e.key === 'Enter') chatSendBtn.onclick(); };
            chatToggle.onclick = () => { if (chatWindow.style.display === 'none') { chatWindow.style.display = 'flex'; renderMessages(); } else chatWindow.style.display = 'none'; };
            chatClose.onclick = () => chatWindow.style.display = 'none';
            chatWindow.style.display = 'none';
            const dragContainer = document.getElementById('chatbotContainer');
            const dragHandle = document.getElementById('chatHeaderDrag');
            let isDragging = false, startX, startY, startRight, startBottom;
            function getPos() { const style = getComputedStyle(dragContainer); return { right: parseFloat(style.right) || 32, bottom: parseFloat(style.bottom) || 110 }; }
            dragHandle.addEventListener('mousedown', (e) => {
                if (e.target.closest('.chat-close')) return;
                e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY;
                const pos = getPos(); startRight = pos.right; startBottom = pos.bottom;
                dragContainer.style.transition = 'none';
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); const dx = e.clientX - startX, dy = e.clientY - startY;
                let newRight = startRight - dx, newBottom = startBottom - dy;
                newRight = Math.min(Math.max(10, newRight), window.innerWidth - 70);
                newBottom = Math.min(Math.max(10, newBottom), window.innerHeight - 90);
                dragContainer.style.right = newRight + 'px'; dragContainer.style.bottom = newBottom + 'px';
            });
            window.addEventListener('mouseup', () => { isDragging = false; dragContainer.style.transition = ''; });
        })();
    })();
    </script>
