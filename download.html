                const osTags = sw.os.map(os => {

                    return `<span class="os-badge">${iconSvg} ${os}</span>`;
                }).join('');
                cardsHtml += `
                    <div class="software-card" data-name="${escapeHtml(sw.name)}">
                        <div class="card-header">
                            <div class="card-icon">${sw.icon}</div>
                            <div class="software-name">${escapeHtml(sw.name)}</div>
                        </div>
                        <div class="version">版本 ${escapeHtml(sw.version)}</div>
                        <div class="description">${escapeHtml(sw.description)}</div>
                        <div class="os-tags">${osTags}</div>
                        <div class="download-hint">🔗 点击获取下载链接</div>
                    </div>
                `;
            }
            gridContainer.innerHTML = cardsHtml;
            // 绑定点击事件
            document.querySelectorAll('.software-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.getAttribute('data-name');
                    const sw = currentSoftwares.find(s => s.name === name);
                    if (sw) {
                        if (sw.noVerify) {
                            window.open(sw.url, '_blank');
                        } else {
                            pendingUrl = sw.url;
                            const modal = document.getElementById('verifyModal');
                            modal.classList.add('active');
                            document.getElementById('verifyCode').value = '';
                        }
                    }
                });
            });
        }

        // 初始化：直接使用内置数据
        function initImmediate() {
            currentSoftwares = MASTER_SOFTWARE_LIST.map(item => {
                const catKey = item.category.toLowerCase();
                return {
                    ...item,
                    category: catKey,
                    categoryDisplay: CATEGORY_DISPLAY[catKey] || item.category,
                    icon: item.icon && !item.icon.includes('fa-') ? item.icon : '📦'
                };
            });
            renderCategories();
            renderGrid();
        }

        initImmediate();

        // 后台静默合并Airtable（保留原有逻辑，略）
        (function silentAirtableMerge() {
            const AIRTABLE_TOKEN = 'patOe6PVCcEuaswP1.9aaa8be443f568c5c5b9a5d02485e0221e3f5a1b8d3873e95b1a35671ecbef1e';
            const BASE_ID = 'appM4Ty76lOlslpU9';
            const TABLE = 'softwares';
            const API_URL = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;
            const startFetch = () => {
                fetch(API_URL, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` },
                    signal: AbortSignal.timeout ? AbortSignal.timeout(4000) : undefined
                }).then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                }).then(data => {
                    const airRecords = data.records.map(rec => {
                        const f = rec.fields;
                        const name = f.Name || f.name;
                        if (!name) return null;
                        return {
                            name: name,
                            category: (f.Category || f.category || '').toLowerCase(),
                            os: f.OS || f.Os || f.os || [],
                            version: f.Version || f.version || '',
                            description: f.Description || f.description || '',
                            url: f.URL || f.Url || f.url,
                            noVerify: f.NoVerify || f.noVerify || false
                        };
                    }).filter(v => v && v.name);
                    
                    if (airRecords.length) {
                        const localNames = new Set(MASTER_SOFTWARE_LIST.map(s => s.name));
                        const merged = [...currentSoftwares];
                        for (const rec of airRecords) {
                            if (!localNames.has(rec.name)) {
                                const safeIcon = "📦";
                                const catKey = rec.category || 'tool';
                                merged.push({
                                    name: rec.name,
                                    category: catKey,
                                    categoryDisplay: CATEGORY_DISPLAY[catKey] || catKey,
                                    os: rec.os,
                                    version: rec.version,
                                    description: rec.description,
                                    icon: safeIcon,
                                    url: rec.url,
                                    noVerify: rec.noVerify
                                });
                            }
                        }
                        if (merged.length !== currentSoftwares.length) {
                            currentSoftwares = merged;
                            renderCategories();
                            renderGrid();
                        }
                    }
                }).catch(e => { /* 静默失败 */ });
            };
            if (window.requestIdleCallback) {
                requestIdleCallback(startFetch, { timeout: 3000 });
            } else {
                setTimeout(startFetch, 2000);
            }
        })();

        // 搜索实时响应
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            renderGrid();
        });

        // 验证模态框逻辑
        const modal = document.getElementById('verifyModal');
        const verifyCodeInput = document.getElementById('verifyCode');
        const confirmBtn = document.getElementById('confirmVerify');
        const cancelBtn = document.getElementById('cancelVerify');
        function closeModal() {
            modal.classList.remove('active');
            pendingUrl = null;
        }
        confirmBtn.addEventListener('click', () => {
            if (verifyCodeInput.value.trim() === 'Win_Mac_123') {
                if (pendingUrl) {
                    window.open(pendingUrl, '_blank');
                    pendingUrl = null;
                }
                closeModal();
            } else {
                alert("口令错误，请确认后重试。");
            }
        });
        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // 客服模块（保留原有功能）
        (function initChat() {
            let messages = [];
            const botReplyText = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～";
            const chatWindow = document.getElementById('chatWindow');
            const chatMessagesDiv = document.getElementById('chatMessagesList');
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');
            const chatToggle = document.getElementById('chatToggleBtn');
            const chatClose = document.getElementById('chatCloseBtn');
            const chatStatus = document.getElementById('chatStatus');

            function renderMessages() {
                chatMessagesDiv.innerHTML = '';
                if (messages.length === 0) {
                    const welcomeDiv = document.createElement('div');
                    welcomeDiv.className = 'message bot';
                    welcomeDiv.innerHTML = `<strong>乐哲麦</strong>${botReplyText}`;
                    chatMessagesDiv.appendChild(welcomeDiv);
                } else {
                    messages.forEach(msg => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${msg.sender === 'customer' ? 'customer' : 'bot'}`;
                        const displayName = msg.sender === 'customer' ? '我' : '乐哲麦';
                        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        msgDiv.innerHTML = `<strong>${displayName}</strong>${escapeHtml(msg.text)}<small>${timeStr}</small>`;
                        chatMessagesDiv.appendChild(msgDiv);
                    });
                }
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            }

            function addMessage(text, sender) {
                messages.push({ text, sender, timestamp: new Date() });
                renderMessages();
            }

            function botReply() {
                const lastMsg = messages[messages.length - 1];
                if (lastMsg && lastMsg.sender === 'bot' && lastMsg.text === botReplyText) return;
                addMessage(botReplyText, 'bot');
            }

            function sendCustomerMessage(text) {
                if (!text.trim()) return;
                addMessage(text.trim(), 'customer');
                setTimeout(botReply, 500);
                if (chatStatus) chatStatus.innerText = '📤 消息已发送，乐哲麦思考中...';
                setTimeout(() => { if (chatStatus) chatStatus.innerText = '✨ 在线 · 乐哲麦为您服务'; }, 2000);
            }

            function openChat() { chatWindow.style.display = 'flex'; renderMessages(); }
            function closeChat() { chatWindow.style.display = 'none'; }

            chatToggle.addEventListener('click', () => {
                if (chatWindow.style.display === 'none') openChat();
                else closeChat();
            });
            chatClose.addEventListener('click', closeChat);
            chatSendBtn.addEventListener('click', () => {
                const text = chatInput.value.trim();
                if (!text) return;
                sendCustomerMessage(text);
                chatInput.value = '';
            });
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = chatInput.value.trim();
                    if (!text) return;
                    sendCustomerMessage(text);
                    chatInput.value = '';
                }
            });
            chatWindow.style.display = 'none';

            const dragContainer = document.getElementById('chatbotContainer');
            const dragHandle = document.getElementById('chatHeaderDrag');
            let isDragging = false, startX, startY, startRight, startBottom;
            function getPos() { const style = getComputedStyle(dragContainer); return { right: parseFloat(style.right) || 32, bottom: parseFloat(style.bottom) || 110 }; }
            dragHandle.addEventListener('mousedown', (e) => {
                if (e.target.closest('.chat-close')) return;
                e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY;
                const pos = getPos(); startRight = pos.right; startBottom = pos.bottom;
                dragContainer.style.transition = 'none';
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); const dx = e.clientX - startX, dy = e.clientY - startY;
                let newRight = startRight - dx, newBottom = startBottom - dy;
                newRight = Math.min(Math.max(10, newRight), window.innerWidth - 70);
                newBottom = Math.min(Math.max(10, newBottom), window.innerHeight - 90);
                dragContainer.style.right = newRight + 'px'; dragContainer.style.bottom = newBottom + 'px';
            });
            window.addEventListener('mouseup', () => { isDragging = false; dragContainer.style.transition = ''; });
        })();
    })();
</script>
