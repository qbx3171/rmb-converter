            if(cached) softwares = JSON.parse(cached);
        }
        renderCategories(); renderGrid(); renderHotSection(); renderRankList(); renderRandomArticles();
    }

    function getColorFromName(name){ let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash); return `hsl(${Math.abs(hash)%360},70%,55%)`; }
    function getLiked(){ try{ return JSON.parse(localStorage.getItem('likedSoftwares'))||[]; }catch{ return []; } }
    function toggleLike(name){ let liked=getLiked(); if(liked.includes(name)) liked=liked.filter(n=>n!==name); else liked.push(name); localStorage.setItem('likedSoftwares', JSON.stringify(liked)); renderGrid(); }
    function addToHistory(sw){ let h=JSON.parse(localStorage.getItem('browseHistory'))||[]; h=h.filter(i=>i.name!==sw.name); h.unshift({name:sw.name, icon:sw.icon, category:sw.category}); if(h.length>10) h.pop(); localStorage.setItem('browseHistory', JSON.stringify(h)); renderHistoryList(); }
    function renderHistoryList(){
        const history = JSON.parse(localStorage.getItem('browseHistory')) || [];
        const container = document.getElementById('historyList');
        if(!history.length){ container.innerHTML='<div style="color:#94a3b8; padding:8px 0;">暂无浏览记录</div>'; return; }
        container.innerHTML = history.map(h=> `<div class="history-item" data-name="${escapeHtml(h.name)}"><i class="fas fa-clock"></i> ${escapeHtml(h.name)}</div>` ).join('');
        container.querySelectorAll('.history-item').forEach(item=>{ item.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===item.dataset.name); if(sw) downloadSoftware(sw); }); });
    }
    document.getElementById('clearHistoryBtn').addEventListener('click', ()=>{ localStorage.removeItem('browseHistory'); renderHistoryList(); showToast('浏览历史已清空'); });

    function renderIconHtml(icon, name){
        if(!icon) icon = { type:'text', value: getStandardAbbreviation(name) };
        if(icon.type === 'image') return `<img src="${escapeHtml(icon.value)}" style="width:100%;height:100%;object-fit:cover;">`;
        if(icon.type === 'icon') return `<i class="fas ${escapeHtml(icon.value)}"></i>`;
        const abbr = icon.value || getStandardAbbreviation(name);
        const color = getColorFromName(name);
        return `<div class="icon-fallback" style="background: ${color};">${abbr}</div>`;
    }

    function downloadSoftware(sw){
        if(!currentUser){ openAuthModal('login'); showToast('请先登录','error'); return; }
        addToHistory(sw);
        window.open(sw.url, '_blank');
        if(sw.id && !sw.id.startsWith('b')) incrementDownloadCount(sw.id);
    }

    let hotScrollInterval = null;
    const hotScroll = document.getElementById('hotScroll');
    function startHotAutoScroll(){
        if(!hotScroll) return;
        if(hotScrollInterval) clearInterval(hotScrollInterval);
        hotScrollInterval = setInterval(()=>{
            const maxScroll = hotScroll.scrollWidth - hotScroll.clientWidth;
            if(hotScroll.scrollLeft >= maxScroll-10) hotScroll.scrollTo({ left: 0, behavior: 'smooth' });
            else hotScroll.scrollBy({ left: 220, behavior: 'smooth' });
        }, 2000);
    }
    function stopHotAutoScroll(){ if(hotScrollInterval){ clearInterval(hotScrollInterval); hotScrollInterval=null; } }
    document.getElementById('hotArrowLeft').addEventListener('click', ()=>{ hotScroll.scrollBy({ left: -220, behavior: 'smooth' }); stopHotAutoScroll(); startHotAutoScroll(); });
    document.getElementById('hotArrowRight').addEventListener('click', ()=>{ hotScroll.scrollBy({ left: 220, behavior: 'smooth' }); stopHotAutoScroll(); startHotAutoScroll(); });
    function renderHotSection(){
        if(!softwares.length) return;
        const sorted = [...softwares].sort((a,b)=>(b.downloads||0)-(a.downloads||0));
        const top6 = sorted.slice(0,6);
        hotScroll.innerHTML = top6.map(sw=>`<div class="hot-card" data-name="${escapeHtml(sw.name)}"><div class="hot-icon">${renderIconHtml(sw.icon, sw.name)}</div><div class="hot-name">${escapeHtml(sw.name)}</div><div class="hot-meta"><span>${sw.os.join(' · ')}</span><span class="hot-downloads"><i class="fas fa-download"></i> ${sw.downloads||0}</span></div></div>`).join('');
        hotScroll.querySelectorAll('.hot-card').forEach(card=>{ card.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===card.dataset.name); if(sw) downloadSoftware(sw); }); });
        hotScroll.addEventListener('mouseenter', stopHotAutoScroll);
        hotScroll.addEventListener('mouseleave', startHotAutoScroll);
        startHotAutoScroll();
    }
    function renderRankList(){
        const sorted = [...softwares].sort((a,b)=>(b.downloads||0)-(a.downloads||0));
        const top5 = sorted.slice(0,5);
        document.getElementById('rankList').innerHTML = top5.map((sw,i)=>`<div class="rank-item" data-name="${escapeHtml(sw.name)}"><div class="rank-index ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div><div class="rank-info"><div class="rank-name">${escapeHtml(sw.name)}</div><div class="rank-downloads"><i class="fas fa-download"></i> ${sw.downloads||0}</div></div></div>`).join('');
        document.querySelectorAll('.rank-item').forEach(item=>{ item.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===item.dataset.name); if(sw) downloadSoftware(sw); }); });
    }
    function renderRandomArticles(){
        if(!softwares.length) return;
        const shuffled = [...softwares].sort(()=>0.5-Math.random()).slice(0,5);
        document.getElementById('randomArticles').innerHTML = shuffled.map(sw=>`<div class="random-article-item" data-name="${escapeHtml(sw.name)}"><div class="random-article-icon">${renderIconHtml(sw.icon, sw.name)}</div><div class="random-article-info"><div class="random-article-name">${escapeHtml(sw.name)}</div><div class="random-article-os">${sw.os.join(' · ')}</div></div></div>`).join('');
        document.querySelectorAll('.random-article-item').forEach(item=>{ item.addEventListener('click', ()=>{ const sw = softwares.find(s=>s.name===item.dataset.name); if(sw) downloadSoftware(sw); }); });
    }
    function renderCategories(){
        const catMap=new Map(); softwares.forEach(s=>catMap.set(CATEGORY_DISPLAY[s.category]||s.category, s.category));
        let html=`<button class="cat-chip ${currentCategory==='all'?'active':''}" data-cat="all">全部</button>`;
        Array.from(catMap.entries()).sort().forEach(([d,k])=>{ html+=`<button class="cat-chip ${currentCategory===k?'active':''}" data-cat="${k}">${d}</button>`; });
        document.getElementById('categoryTabs').innerHTML=html;
        document.querySelectorAll('.cat-chip').forEach(b=>b.addEventListener('click', ()=>{ currentCategory=b.dataset.cat; showAll=false; renderCategories(); renderGrid(); }));
    }
    function renderSkeleton(){ document.getElementById('softwareGridContainer').innerHTML = Array(6).fill().map(()=>`<div class="skeleton-card"><div class="card-header"><div class="skeleton-icon"></div><div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>`).join(''); }
    function renderGrid(){
        const filtered = softwares.filter(s=>(currentCategory==='all'||s.category===currentCategory) && s.name.toLowerCase().includes(searchKeyword.toLowerCase()));
        const items = showAll? filtered : filtered.slice(0,DEFAULT_LIMIT);
        const container = document.getElementById('softwareGridContainer');
        if(!items.length){ container.innerHTML='<div class="no-results"><i class="fas fa-box-open"></i> 没有找到相关软件</div>'; document.getElementById('loadMoreContainer').style.display='none'; return; }
        const liked = getLiked();
        container.innerHTML = items.map(sw=>{
            const osTags = sw.os.map(o=>`<span class="os-badge">${o==='Windows'?'<i class="fab fa-windows"></i>':'<i class="fab fa-apple"></i>'} ${o}</span>`).join('');
            const isNew = (new Date()-new Date(sw.addedDate||'2024-01-01'))<7*86400000;
            const isHot = sw.downloads>2000;
            const badge = isNew?'<span class="new-badge">✨ 新</span>':(isHot?'<span class="hot-badge">🔥 热门</span>':'');
            const isLiked = liked.includes(sw.name);
            return `<div class="software-card" data-name="${escapeHtml(sw.name)}">${badge}<div class="card-header"><div class="card-icon">${renderIconHtml(sw.icon, sw.name)}</div><div class="software-name">${escapeHtml(sw.name)}</div></div><div class="version">版本 ${escapeHtml(sw.version)}</div><div class="description">${escapeHtml(sw.description)}</div><div class="os-tags">${osTags}</div><div class="card-footer"><div class="added-date"><i class="far fa-calendar-alt"></i> ${escapeHtml(sw.addedDate)}</div><div><span class="download-count"><i class="fas fa-download"></i> ${sw.downloads||0}</span><button class="like-btn" data-name="${escapeHtml(sw.name)}"><i class="${isLiked?'fas':'far'} fa-heart"></i></button></div></div></div>`;
        }).join('');
        document.getElementById('loadMoreContainer').style.display = (!showAll && filtered.length>DEFAULT_LIMIT)?'block':'none';
        container.querySelectorAll('.software-card').forEach(card=>{ card.addEventListener('click', (e)=>{ if(e.target.closest('.like-btn')) return; const sw = softwares.find(s=>s.name===card.dataset.name); if(sw) downloadSoftware(sw); }); });
        container.querySelectorAll('.like-btn').forEach(btn=>{ btn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleLike(btn.dataset.name); }); });
        renderRandomArticles();
    }
    async function incrementDownloadCount(recordId){
        try{
            const rec = await airtableRequest('GET', `softwares/${recordId}`);
            await airtableRequest('PATCH', `softwares/${recordId}`, { fields: { downloads: (rec.fields.downloads||0)+1 } });
            const sw = softwares.find(s=>s.id===recordId);
            if(sw) sw.downloads = (sw.downloads||0)+1;
            renderRankList(); renderHotSection();
        }catch(e){ console.warn(e); }
    }
    function initSoftware(){
        const cached = localStorage.getItem('cachedSoftwares');
        if(cached){ try{ const parsed=JSON.parse(cached); if(parsed.length) softwares=parsed; }catch(e){} }
        renderSkeleton();
        renderCategories(); renderGrid(); renderHotSection(); renderRankList(); renderRandomArticles(); renderHistoryList();
        updateSoftwaresFromAirtable();
    }

    // ---------- 用户系统，使用 Resend Worker 代理发送验证码（立即开始倒计时，不等待响应）----------
    let currentUser = null;
    let regEmail='', regCode='', regCodeExpire=0;
    let resetEmail='', resetCode='', resetCodeExpire=0;

    async function findUserByEmail(email){ const data = await airtableRequest('GET', `Users?filterByFormula={Email}="${encodeURIComponent(email)}"`); return data.records.length ? data.records[0] : null; }
    async function registerUser(email, password, username, role='user'){ const hash = CryptoJS.SHA256(password).toString(); await airtableRequest('POST', 'Users', { fields: { Email: email, Password: hash, Username: username, Role: role } }); }
    async function loginUser(email, password){ const rec = await findUserByEmail(email); if(!rec) throw new Error('邮箱未注册'); if(rec.fields.Password !== CryptoJS.SHA256(password).toString()) throw new Error('密码错误'); return { id: rec.id, email: rec.fields.Email, username: rec.fields.Username||email.split('@')[0], role: rec.fields.Role||'user' }; }
    async function updatePassword(email, newPass){ const rec = await findUserByEmail(email); if(!rec) throw new Error('邮箱不存在'); await airtableRequest('PATCH', `Users/${rec.id}`, { fields: { Password: CryptoJS.SHA256(newPass).toString() } }); }
    async function fetchMessages(){ try{ const data = await airtableRequest('GET', 'Messages?maxRecords=50'); return data.records; }catch{ return []; } }
    async function submitMessage(name, message){ await airtableRequest('POST', 'Messages', { fields: { Name: name||'热心网友', Message: message } }); }

    // 发送验证码（立即开始倒计时，异步发送请求）
    async function sendCodeWithFallback(email, type) {
        const code = Math.floor(100000+Math.random()*900000).toString();
        try {
            const response = await fetch(CONFIG.RESEND_PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, code })
            });
            const result = await response.json();
            if (response.ok && !result.error) {
                return { success: true, code };
            } else {
                throw new Error(result.error || '发送失败');
            }
        } catch (err) {
            console.error('Worker 发送失败，使用弹窗降级', err);
            alert(`邮件服务暂时不可用，请使用以下验证码完成操作：${code}（10分钟内有效）`);
            return { success: true, code, fallback: true };
        }
    }

    // 倒计时辅助函数（立即开始）
    function startCountdown(btn, seconds=60) {
        if(btn.disabled) return;
        btn.disabled = true;
        const originalText = btn.textContent;
        const timer = setInterval(() => {
            seconds--;
            if(seconds <= 0){
                clearInterval(timer);
                btn.disabled = false;
                btn.textContent = originalText;
            } else {
                btn.textContent = `${seconds}秒后重发`;
            }
        }, 1000);
        return timer;
    }

    // 处理发送按钮：先开始倒计时，再异步发送请求
    function handleSendCode(btn, emailGetter, onSuccess) {
        const email = emailGetter();
        if(!email) { showToast('请输入邮箱','error'); return false; }
        if(!/^\S+@\S+\.\S+$/.test(email)) { showToast('邮箱格式不正确','error'); return false; }
        // 立即开始倒计时
        startCountdown(btn, 60);
        // 异步发送请求（不阻塞界面）
        (async () => {
            try {
                const result = await sendCodeWithFallback(email, '');
                if(result.success){
                    onSuccess(email, result.code);
                    showToast(result.fallback ? '验证码已通过弹窗显示' : '验证码已发送，请查收', result.fallback?'info':'success');
                } else {
                    showToast('发送失败，请重试','error');
                    btn.disabled = false;
                    btn.textContent = '发送';
                }
            } catch(err){
                showToast('网络错误，请稍后重试','error');
                btn.disabled = false;
                btn.textContent = '发送';
            }
        })();
        return true;
    }

    function bindRegisterSendCode() {
        const btn = document.getElementById('sendRegCodeBtn');
        if(!btn) return;
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            handleSendCode(newBtn, 
                () => document.getElementById('regEmail').value.trim(),
                (email, code) => { regEmail = email; regCode = code; regCodeExpire = Date.now() + 600000; }
            );
        });
    }

    function bindResetSendCode() {
        const btn = document.getElementById('sendResetCodeBtn');
        if(!btn) return;
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            handleSendCode(newBtn,
                () => document.getElementById('forgotEmail').value.trim(),
                (email, code) => { resetEmail = email; resetCode = code; resetCodeExpire = Date.now() + 600000; }
            );
        });
    }

    function updateUserUI(){
        const area = document.getElementById('userArea');
        if(currentUser){
            const dropdown = `<div style="position:relative;"><button class="user-name-btn" id="userMenuBtn"><i class="fas fa-user-circle"></i> ${escapeHtml(currentUser.username)} <i class="fas fa-chevron-down"></i></button><div class="dropdown-content" id="userDropdown"><button id="profileBtn">个人中心</button>${currentUser.role==='admin'?'<button id="adminBtn">管理后台</button>':''}<button id="logoutBtn">退出登录</button></div></div>`;
            area.innerHTML = dropdown;
            document.getElementById('userMenuBtn').addEventListener('click', e=>{ e.stopPropagation(); document.getElementById('userDropdown').classList.toggle('show'); });
            document.getElementById('logoutBtn').addEventListener('click', ()=>{ currentUser=null; localStorage.removeItem('lezhe_user'); updateUserUI(); showToast('已退出'); });
            document.getElementById('profileBtn').addEventListener('click', ()=> showToast('个人中心开发中'));
            if(currentUser.role==='admin') document.getElementById('adminBtn').addEventListener('click', ()=> showToast('管理后台开发中'));
        } else {
            area.innerHTML = '<button class="auth-btn" id="showAuthBtn"><i class="fas fa-user-lock"></i> 登录 / 注册</button>';
            document.getElementById('showAuthBtn').addEventListener('click', ()=>openAuthModal('login'));
        }
    }

    function openAuthModal(tab='login'){
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('forgotForm').style.display = 'none';
        if(tab === 'login') document.getElementById('loginForm').style.display = 'block';
        else if(tab === 'register') document.getElementById('registerForm').style.display = 'block';
        else if(tab === 'forgot') document.getElementById('forgotForm').style.display = 'block';
        document.querySelectorAll('.auth-tab').forEach(t=> t.classList.toggle('active', t.dataset.tab===tab));
        document.getElementById('authModal').classList.add('active');
        bindRegisterSendCode();
        bindResetSendCode();
    }

    async function renderFeedbackList(){
        try{
            const msgs = await fetchMessages();
            const container = document.getElementById('feedbackListContainer');
            if(!container) return;
            if(!msgs.length){ container.innerHTML='<div style="text-align:center; padding:20px;">暂无留言，快来抢沙发~</div>'; return; }
            container.innerHTML = msgs.slice().reverse().slice(0,20).map(m=>`<div style="padding:16px 0; border-bottom:1px solid rgba(0,0,0,0.05);"><strong>${escapeHtml(m.fields.Name||'匿名')}</strong><span style="font-size:12px; color:#94a3b8; margin-left:12px;">${m.fields.CreatedAt?new Date(m.fields.CreatedAt).toLocaleString('zh-CN'):''}</span><div style="margin-top:6px;">${escapeHtml(m.fields.Message||'')}</div></div>`).join('');
        } catch(e){ console.warn(e); }
    }

    function initAuthEvents(){
        const modal = document.getElementById('authModal');
        document.getElementById('closeAuthModal').addEventListener('click', ()=> modal.classList.remove('active'));
        document.querySelectorAll('.auth-tab').forEach(t=> t.addEventListener('click', ()=>{
            const tab = t.dataset.tab;
            document.querySelectorAll('.auth-tab').forEach(bt=> bt.classList.remove('active'));
            t.classList.add('active');
            document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
            document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
            document.getElementById('forgotForm').style.display = 'none';
            document.getElementById('authModalTitle').innerText = tab==='login'?'登录':'注册';
        }));
        document.getElementById('showForgotBtn').addEventListener('click', ()=>{ openAuthModal('forgot'); document.getElementById('authModalTitle').innerText = '找回密码'; });
        document.getElementById('backToLoginFromForgot').addEventListener('click', ()=>{ openAuthModal('login'); document.getElementById('authModalTitle').innerText = '登录'; });
        document.getElementById('registerBtn').addEventListener('click', async function(){
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const code = document.getElementById('regCodeInput').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if(!username) return showToast('请输入用户名','error');
            if(!regEmail||!regCode) return showToast('请先获取验证码','error');
            if(email !== regEmail) return showToast('邮箱不匹配','error');
            if(code !== regCode || Date.now() > regCodeExpire) return showToast('验证码错误或已过期','error');
            if(pwd !== confirm) return showToast('两次密码不一致','error');
            if(pwd.length<6) return showToast('密码至少6位','error');
            this.disabled=true; this.textContent='注册中...';
            try{
                await registerUser(email, pwd, username);
                showToast('注册成功，请登录');
                openAuthModal('login');
                regEmail=''; regCode='';
            } catch(err){ showToast('注册失败: '+err.message,'error'); }
            finally{ this.disabled=false; this.textContent='注册'; }
        });
        document.getElementById('loginBtn').addEventListener('click', async function(){
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            this.disabled=true; this.textContent='登录中...';
            try{
                currentUser = await loginUser(email, pwd);
                localStorage.setItem('lezhe_user', JSON.stringify(currentUser));
                updateUserUI();
                modal.classList.remove('active');
                showToast('登录成功');
            } catch(e){ showToast(e.message,'error'); }
            finally{ this.disabled=false; this.textContent='登录'; }
        });
        document.getElementById('resetPasswordBtn').addEventListener('click', async function(){
            const email = document.getElementById('forgotEmail').value.trim();
            const code = document.getElementById('forgotCodeInput').value.trim();
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmNewPassword').value;
            if(!resetEmail||!resetCode) return showToast('请先获取验证码','error');
            if(email !== resetEmail) return showToast('邮箱不匹配','error');
            if(code !== resetCode || Date.now() > resetCodeExpire) return showToast('验证码错误或已过期','error');
            if(newPwd !== confirmPwd) return showToast('两次新密码不一致','error');
            if(newPwd.length<6) return showToast('密码至少6位','error');
            this.disabled=true; this.textContent='重置中...';
            try{
                await updatePassword(email, newPwd);
                showToast('密码已重置，请登录');
                openAuthModal('login');
                resetEmail=''; resetCode='';
            } catch(err){ showToast('重置失败: '+err.message,'error'); }
            finally{ this.disabled=false; this.textContent='重置密码'; }
        });
        const saved = localStorage.getItem('lezhe_user');
        if(saved){ try{ currentUser = JSON.parse(saved); } catch(e){} }
        updateUserUI();
        bindRegisterSendCode();
        bindResetSendCode();
    }

    // 搜索
    document.getElementById('searchInput').addEventListener('input', e=>{ searchKeyword=e.target.value; renderGrid(); });
    document.getElementById('searchBtn').addEventListener('click', ()=>renderGrid());

    // 关闭弹窗
    document.getElementById('closeDetailModal').addEventListener('click', ()=>document.getElementById('detailModal').classList.remove('active'));
    document.getElementById('detailModal').addEventListener('click', e=>{ if(e.target===document.getElementById('detailModal')) e.target.classList.remove('active'); });
    document.getElementById('submitFeedbackBtn').addEventListener('click', async function(){
        const name = document.getElementById('feedbackName').value.trim();
        const msg = document.getElementById('feedbackMessage').value.trim();
        if(!msg) return showToast('请填写留言内容','error');
        this.disabled=true; this.innerHTML='<i class="fas fa-spinner fa-pulse"></i> 提交中...';
        try{
            await submitMessage(name, msg);
            showToast('留言提交成功！');
            document.getElementById('feedbackName').value='';
            document.getElementById('feedbackMessage').value='';
            await renderFeedbackList();
        } catch(e){ showToast('提交失败: '+e.message,'error'); }
        finally{ this.disabled=false; this.innerHTML='<i class="fas fa-paper-plane"></i> 提交留言'; }
    });
    document.getElementById('loadMoreBtn').addEventListener('click', ()=>{ showAll=true; renderGrid(); });

    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', ()=>backBtn.classList.toggle('show', window.scrollY>300));
    backBtn.addEventListener('click', ()=>window.scrollTo({top:0, behavior:'smooth'}));

    function addBaiduPush(){ const bp = document.createElement('script'); bp.async=true; bp.src='https://zz.bdstatic.com/linksubmit/push.js'; document.head.appendChild(bp); }
    async function initAll(){ initSoftware(); initAuthEvents(); addBaiduPush(); await renderFeedbackList(); }
    initAll();
})();
</script>
