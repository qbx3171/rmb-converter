        ];

        // 分类标准化
        function normalizeCategory(cat) {
            const lower = (cat || '').toLowerCase();
            if (lower === 'adobe' || lower === 'adobe系列') return { key: 'adobe', display: 'Adobe系列' };
            if (lower === 'autodesk' || lower === 'autodesk系列') return { key: 'autodesk', display: 'Autodesk系列' };
            if (lower === 'c4d' || lower === 'cinema 4d') return { key: 'c4d', display: 'Cinema 4D' };
            if (lower === 'sketchup' || lower === '草图大师') return { key: 'sketchup', display: '草图大师' };
            if (lower === 'rhino' || lower === '犀牛软件') return { key: 'rhino', display: '犀牛软件' };
            if (lower === 'plugin' || lower === '插件工具') return { key: 'plugin', display: '插件工具' };
            return { key: cat, display: cat };
        }

        let softwares = [];
        let currentCategory = "all";
        let searchKeyword = "";
        let pendingUrl = null;

        const gridContainer = document.getElementById("softwareGridContainer");
        const searchInput = document.getElementById("searchInput");
        const categoryTabs = document.getElementById("categoryTabs");

        // 工具函数
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        // 获取过滤后的列表
        function getFilteredSoftware() {
            return softwares.filter(sw => {
                if (currentCategory !== "all" && sw.category !== currentCategory) return false;
                if (searchKeyword.trim() !== "") {
                    const kw = searchKeyword.trim().toLowerCase();
                    return sw.name.toLowerCase().includes(kw);
                }
                return true;
            });
        }

        // 渲染网格 (立即执行)
        function renderGrid() {
            const filtered = getFilteredSoftware();
            if (filtered.length === 0) {
                gridContainer.innerHTML = `<div class="no-results"><i class="fas fa-box-open"></i> 没有找到相关软件，试试其他关键词～</div>`;
                return;
            }
            const cardsHtml = filtered.map(sw => {
                const osTagsHtml = sw.os.map(os => {
                    const icon = os === "Windows" ? '<i class="fab fa-windows"></i>' : '<i class="fab fa-apple"></i>';
                    return `<span class="os-badge">${icon} ${os}</span>`;
                }).join('');
                const iconClass = sw.icon || "fa-download";
                return `
                    <div class="software-card" data-name="${escapeHtml(sw.name)}">
                        <div class="card-header">
                            <div class="card-icon"><i class="fas ${iconClass}"></i></div>
                            <div class="software-name">${escapeHtml(sw.name)}</div>
                        </div>
                        <div class="version">版本 ${escapeHtml(sw.version)}</div>
                        <div class="description">${escapeHtml(sw.description)}</div>
                        <div class="os-tags">${osTagsHtml}</div>
                        <div class="download-hint"><i class="fas fa-external-link-alt"></i> 点击获取下载链接</div>
                    </div>
                `;
            }).join('');
            gridContainer.innerHTML = cardsHtml;
            // 绑定卡片点击事件
            document.querySelectorAll('.software-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.getAttribute('data-name');
                    const sw = softwares.find(s => s.name === name);
                    if (sw) {
                        if (sw.noVerify) {
                            window.open(sw.url, '_blank');
                        } else {
                            pendingUrl = sw.url;
                            document.getElementById('verifyModal').classList.add('active');
                            document.getElementById('verifyCode').value = '';
                        }
                    }
                });
            });
        }

        // 渲染分类按钮
        function renderCategories() {
            const displayMap = new Map();
            for (const sw of softwares) {
                const display = sw.categoryDisplay;
                const key = sw.category;
                if (!displayMap.has(display)) displayMap.set(display, key);
            }
            let html = `<button class="tab-btn active" data-cat="all">全部</button>`;
            for (let [display, key] of displayMap.entries()) {
                html += `<button class="tab-btn" data-cat="${key}">${display}</button>`;
            }
            categoryTabs.innerHTML = html;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.getAttribute('data-cat');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGrid();
                });
            });
        }

        // 初始化软件列表 (同步 + 立即显示)
        function initSoftwareSync() {
            const merged = [];
            for (const def of DEFAULT_SOFTWARES) {
                const norm = normalizeCategory(def.category);
                merged.push({ ...def, category: norm.key, categoryDisplay: norm.display });
            }
            softwares = merged;
            // 先渲染分类和网格，确保页面一打开就有内容
            renderCategories();
            renderGrid();

            const BASE_ID = 'appM4Ty76lOlslpU9';
            const TABLE = 'softwares';
            const API = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 4000);
                const res = await fetch(API, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` },
                    signal: controller.signal
                });
                clearTimeout(timeout);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const airRecords = data.records.map(record => {
                    const getField = (names) => {
                        for (let n of names) if (record.fields[n] !== undefined) return record.fields[n];
                        return undefined;
                    };
                    const name = getField(['Name', 'name']);
                    const category = getField(['Category', 'category']);
                    const os = getField(['OS', 'Os', 'os']) || [];
                    const version = getField(['Version', 'version']) || '';
                    const description = getField(['Description', 'description']) || '';
                    const icon = getField(['Icon', 'icon']) || 'fa-download';
                    const url = getField(['URL', 'Url', 'url']);
                    const noVerify = getField(['NoVerify', 'noVerify']) || false;
                    if (!name) return null;
                    return { name, category, os, version, description, icon, url, noVerify };
                }).filter(v => v);
                
                const merged = [];
                const airNames = new Set(airRecords.map(s => s.name));
                for (const rec of airRecords) {
                    const norm = normalizeCategory(rec.category);
                    merged.push({ ...rec, category: norm.key, categoryDisplay: norm.display });
                }
                for (const def of DEFAULT_SOFTWARES) {
                    if (!airNames.has(def.name)) {
                        const norm = normalizeCategory(def.category);
                        merged.push({ ...def, category: norm.key, categoryDisplay: norm.display });
                    }
                }
                if (merged.length > 0) {
                    softwares = merged;
                    // 刷新界面（保持当前分类和搜索关键词）
                    renderCategories();
                    renderGrid();
                }
            } catch (err) {
                // 静默失败，保留默认数据即可
                console.debug("Airtable 同步未生效，使用默认展示");
            }
        }

        // 立即同步渲染（零延迟）
        initSoftwareSync();
        // 后台静默拉取增强（不会导致页面闪烁或空白）
        fetchAirtableAndMerge();

        // 搜索输入实时响应（无需点击按钮）
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            renderGrid();
        });

        // 验证框逻辑
        function closeModal() {
            document.getElementById('verifyModal').classList.remove('active');
            pendingUrl = null;
        }
        document.getElementById('confirmVerify').addEventListener('click', () => {
            const code = document.getElementById('verifyCode').value.trim();
            if (code === 'Win_Mac_123') {
                if (pendingUrl) {
                    window.open(pendingUrl, '_blank');
                    pendingUrl = null;
                }
                closeModal();
            } else {
                alert("口令错误，请确认后重试。");
            }
        });
        document.getElementById('cancelVerify').addEventListener('click', closeModal);
        document.getElementById('verifyModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('verifyModal')) closeModal();
        });

        // ----- 客服模块 (完全保留，不影响首屏) -----
        (function initChat() {
            let messages = [];
            const botReplyText = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～";
            const chatWindow = document.getElementById('chatWindow');
            const chatMessagesDiv = document.getElementById('chatMessagesList');
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');
            const chatToggle = document.getElementById('chatToggleBtn');
            const chatClose = document.getElementById('chatCloseBtn');
            const chatStatus = document.getElementById('chatStatus');

            function renderMessages() {
                chatMessagesDiv.innerHTML = '';
                if (messages.length === 0) {
                    const welcomeDiv = document.createElement('div');
                    welcomeDiv.className = 'message bot';
                    welcomeDiv.innerHTML = `<strong>乐哲麦</strong>${botReplyText}`;
                    chatMessagesDiv.appendChild(welcomeDiv);
                } else {
                    messages.forEach(msg => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${msg.sender === 'customer' ? 'customer' : 'bot'}`;
                        const displayName = msg.sender === 'customer' ? '我' : '乐哲麦';
                        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        msgDiv.innerHTML = `<strong>${displayName}</strong>${escapeHtml(msg.text)}<small>${timeStr}</small>`;
                        chatMessagesDiv.appendChild(msgDiv);
                    });
                }
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            }

            function addMessage(text, sender) {
                messages.push({ text, sender, timestamp: new Date() });
                renderMessages();
            }

            function botReply() {
                const lastMsg = messages[messages.length - 1];
                if (lastMsg && lastMsg.sender === 'bot' && lastMsg.text === botReplyText) return;
                addMessage(botReplyText, 'bot');
            }

            function sendCustomerMessage(text) {
                if (!text.trim()) return;
                addMessage(text.trim(), 'customer');
                setTimeout(botReply, 500);
                if (chatStatus) chatStatus.innerText = '📤 消息已发送，乐哲麦思考中...';
                setTimeout(() => { if (chatStatus) chatStatus.innerText = '✨ 在线 · 乐哲麦为您服务'; }, 2000);
            }

            function openChat() { chatWindow.style.display = 'flex'; renderMessages(); }
            function closeChat() { chatWindow.style.display = 'none'; }

            chatToggle.addEventListener('click', () => {
                if (chatWindow.style.display === 'none') openChat();
                else closeChat();
            });
            chatClose.addEventListener('click', closeChat);
            chatSendBtn.addEventListener('click', () => {
                const text = chatInput.value.trim();
                if (!text) return;
                sendCustomerMessage(text);
                chatInput.value = '';
            });
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = chatInput.value.trim();
                    if (!text) return;
                    sendCustomerMessage(text);
                    chatInput.value = '';
                }
            });
            chatWindow.style.display = 'none';

            // 拖拽
            const dragContainer = document.getElementById('chatbotContainer');
            const dragHandle = document.getElementById('chatHeaderDrag');
            let isDragging = false, startX, startY, startRight, startBottom;
            function getPos() { const style = getComputedStyle(dragContainer); return { right: parseFloat(style.right) || 32, bottom: parseFloat(style.bottom) || 110 }; }
            dragHandle.addEventListener('mousedown', (e) => {
                if (e.target.closest('.chat-close')) return;
                e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY;
                const pos = getPos(); startRight = pos.right; startBottom = pos.bottom;
                dragContainer.style.transition = 'none';
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); const dx = e.clientX - startX, dy = e.clientY - startY;
                let newRight = startRight - dx, newBottom = startBottom - dy;
                newRight = Math.min(Math.max(10, newRight), window.innerWidth - 70);
                newBottom = Math.min(Math.max(10, newBottom), window.innerHeight - 90);
                dragContainer.style.right = newRight + 'px'; dragContainer.style.bottom = newBottom + 'px';
            });
            window.addEventListener('mouseup', () => { isDragging = false; dragContainer.style.transition = ''; });
        })();
    })();
</script>
