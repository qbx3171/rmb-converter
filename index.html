<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>乐哲软件 · 创意工具库</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f0f4f9; color:#1a2c3e; line-height:1.5; }
        .app-wrapper { max-width:1400px; margin:0 auto; padding:0 32px 56px; }
        .top-nav { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px; background:rgba(255,255,255,0.8); backdrop-filter:blur(16px); border-radius:80px; margin:24px 0 40px; padding:8px 28px; border:1px solid rgba(0,0,0,0.05); }
        .logo-text { font-size:26px; font-weight:800; background:linear-gradient(125deg,#0F2B4D,#1E6DFF,#A855F7); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .domain-badge { background:#eef3fc; border-radius:40px; padding:4px 14px; font-size:12px; color:#1E6DFF; }
        .nav-links { display:flex; gap:32px; font-weight:500; }
        .nav-links a { text-decoration:none; color:#2c3f5c; transition:0.2s; font-size:15px; }
        .nav-links a.active, .nav-links a:hover { color:#1E6DFF; }
        .search-filter-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; background:white; padding:12px 24px; border-radius:60px; margin-bottom:40px; border:1px solid #eef2fc; }
        .search-box { flex:1; display:flex; align-items:center; gap:10px; background:#f8fafc; border-radius:40px; padding:8px 20px; border:1px solid #e2edf7; }
        .search-box input { border:none; background:transparent; width:100%; font-size:14px; outline:none; }
        .category-tabs { display:flex; gap:12px; flex-wrap:wrap; }
        .tab-btn { background:#f1f5f9; border:none; padding:8px 24px; border-radius:40px; font-size:14px; font-weight:600; cursor:pointer; }
        .tab-btn.active { background:#1E6DFF; color:white; }
        .software-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:28px; margin-top:20px; }
        .software-card { background:white; border-radius:28px; padding:24px 22px; transition:0.25s; border:1px solid #eef3fc; cursor:pointer; }
        .software-card:hover { transform:translateY(-5px); border-color:#1E6DFF; box-shadow:0 20px 30px -12px rgba(30,109,255,0.15); }
        .card-header { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
        .card-icon { font-size:42px; color:#1E6DFF; }
        .software-name { font-size:22px; font-weight:700; color:#0f2b4d; }
        .version { font-size:12px; background:#f0f4fc; padding:4px 12px; border-radius:40px; display:inline-block; margin:8px 0 12px; color:#1E6DFF; }
        .description { color:#4a627a; font-size:13px; margin:8px 0 16px; }
        .os-tags { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .os-badge { background:#f4f8fe; border-radius:40px; padding:4px 12px; font-size:12px; display:inline-flex; align-items:center; gap:6px; }
        .download-hint { font-size:12px; color:#1E6DFF; display:flex; align-items:center; gap:6px; margin-top:12px; border-top:1px solid #eef2fc; padding-top:14px; }
        footer { margin-top:70px; text-align:center; font-size:12px; color:#6b85a4; border-top:1px solid #e2ecf5; padding-top:28px; }
        .no-results { text-align:center; padding:60px; background:white; border-radius:48px; color:#6b85a4; grid-column:1/-1; }
        @media (max-width:860px) { .app-wrapper { padding:0 20px 40px; } .top-nav { flex-direction:column; } .search-filter-bar { flex-direction:column; } }

        /* 客服窗口 */
        .chatbot-container { position:fixed; z-index:200; right:32px; bottom:110px; }
        .chat-toggle { width:60px; height:60px; background:linear-gradient(135deg,#1E6DFF,#A855F7); border-radius:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 10px 25px -5px rgba(30,109,255,0.5); color:white; font-size:28px; }
        .chat-window { position:absolute; bottom:80px; right:0; width:380px; height:520px; background:white; border-radius:32px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 25px 45px -12px rgba(0,0,0,0.2); border:1px solid #eef2fc; }
        .chat-header { background:linear-gradient(125deg,#1E6DFF,#8B5CF6); color:white; padding:18px 20px; display:flex; justify-content:space-between; align-items:center; cursor:grab; }
        .chat-close { background:rgba(255,255,255,0.2); border:none; color:white; width:28px; height:28px; border-radius:20px; cursor:pointer; }
        .chat-messages { flex:1; padding:18px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; background:#f8fafd; }
        .message { max-width:85%; padding:10px 16px; border-radius:24px; font-size:13px; }
        .message.customer { background:#1E6DFF; color:white; align-self:flex-end; }
        .message.bot { background:#eef2f8; color:#1a2c42; align-self:flex-start; }
        .message strong { font-size:11px; display:block; margin-bottom:4px; }
        .chat-input-area { display:flex; padding:14px; background:white; border-top:1px solid #eef2fc; gap:10px; }
        .chat-input-area input { flex:1; border:1px solid #e2e8f0; border-radius:30px; padding:12px 18px; outline:none; }
        .chat-input-area button { background:#1E6DFF; border:none; border-radius:30px; padding:0 24px; color:white; cursor:pointer; }
        .chat-status { font-size:10px; padding:8px; text-align:center; color:#4f657f; border-top:1px solid #eef2fc; }

        /* 验证模态框 */
        .verify-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .verify-modal.active { display:flex; }
        .verify-content { background:white; border-radius:32px; padding:32px; max-width:400px; width:90%; text-align:center; }
        .verify-content h3 { font-size:24px; margin-bottom:16px; color:#1E6DFF; }
        .verify-content p { color:#4a627a; margin-bottom:20px; }
        .verify-input { width:100%; padding:12px 16px; border:1px solid #e2e8f0; border-radius:40px; margin-bottom:20px; outline:none; }
        .verify-buttons { display:flex; gap:12px; justify-content:center; }
        .verify-btn { padding:10px 24px; border-radius:40px; font-weight:600; cursor:pointer; border:none; }
        .verify-btn.confirm { background:#1E6DFF; color:white; }
        .verify-btn.cancel { background:#eef2f8; color:#2c405c; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="top-nav">
        <div class="logo-area"><span class="logo-text">乐哲软件</span><span class="domain-badge">www.lezhesoft.cn</span></div>
        <div class="nav-links"><a href="#">首页</a><a href="#">服务项目</a><a href="#" class="active">软件下载</a><a href="#">版权声明</a></div>
    </div>
    <div class="search-filter-bar">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="搜索软件..."></div>
        <div class="category-tabs" id="categoryTabs"><button class="tab-btn active" data-cat="all">全部</button></div>
    </div>
    <div id="softwareGridContainer" class="software-grid"></div>
    <footer>乐哲软件中心 · 官方原版 | www.lezhesoft.cn</footer>
</div>

<!-- 验证模态框 -->
<div id="verifyModal" class="verify-modal">
    <div class="verify-content">
        <h3><i class="fab fa-weixin"></i> 添加微信获取口令</h3>
        <p>请添加微信 <strong>Win_Mac_123</strong><br>我们会在微信上发送给您下载口令。</p>
        <input type="text" id="verifyCode" class="verify-input" placeholder="请输入收到的口令">
        <div class="verify-buttons">
            <button class="verify-btn cancel" id="cancelVerify">取消</button>
            <button class="verify-btn confirm" id="confirmVerify">验证并下载</button>
        </div>
    </div>
</div>

<!-- 客服组件 -->
<div class="chatbot-container"><div class="chat-toggle" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></div>
    <div class="chat-window" id="chatWindow" style="display:none;">
        <div class="chat-header" id="chatHeaderDrag"><span><i class="fas fa-robot"></i> 乐哲麦 · 智能客服</span><button class="chat-close" id="chatCloseBtn"><i class="fas fa-times"></i></button></div>
        <div class="chat-messages" id="chatMessagesList"></div>
        <div class="chat-input-area"><input type="text" id="chatInput" placeholder="输入问题..."><button id="chatSendBtn">发送</button></div>
        <div class="chat-status" id="chatStatus">✨ 在线 · 乐哲麦为您服务</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase 配置（已按您提供的值填写）
    const SUPABASE_URL = 'https://mtgvtewqkbesfmanphfl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_secret_uR0bebXoGWuf_RjsqSfoqA_2xve7kim';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let softwares = [];
    let currentCategory = "all";
    let searchKeyword = "";
    let pendingUrl = null;

    async function fetchSoftwares() {
        const { data, error } = await supabase.from('softwares').select('*');
        if (error) { console.error(error); return; }
        softwares = data;
        renderCategories();
        renderGrid();
    }

    function renderCategories() {
        const categories = [...new Set(softwares.map(s => s.category))];
        let html = `<button class="tab-btn active" data-cat="all">全部</button>`;
        categories.forEach(cat => { html += `<button class="tab-btn" data-cat="${cat}">${cat}</button>`; });
        document.getElementById('categoryTabs').innerHTML = html;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.dataset.cat;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrid();
            });
        });
    }

    function getFiltered() {
        return softwares.filter(sw => {
            if (currentCategory !== "all" && sw.category !== currentCategory) return false;
            if (searchKeyword.trim() && !sw.name.toLowerCase().includes(searchKeyword.trim().toLowerCase())) return false;
            return true;
        });
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function renderGrid() {
        const filtered = getFiltered();
        const container = document.getElementById('softwareGridContainer');
        if (filtered.length === 0) { container.innerHTML = '<div class="no-results">没有找到相关软件</div>'; return; }
        container.innerHTML = filtered.map(sw => `
            <div class="software-card" data-id="${sw.id}" data-url="${escapeHtml(sw.url)}" data-noverify="${sw.noVerify}">
                <div class="card-header"><div class="card-icon"><i class="fas ${sw.icon || 'fa-download'}"></i></div><div class="software-name">${escapeHtml(sw.name)}</div></div>
                <div class="version">版本 ${escapeHtml(sw.version)}</div>
                <div class="description">${escapeHtml(sw.description)}</div>
                <div class="os-tags">${sw.os.map(os => `<span class="os-badge"><i class="fab ${os==='Windows'?'fa-windows':'fa-apple'}"></i> ${os}</span>`).join('')}</div>
                <div class="download-hint"><i class="fas fa-external-link-alt"></i> 点击获取下载链接</div>
            </div>
        `).join('');
        document.querySelectorAll('.software-card').forEach(card => {
            card.addEventListener('click', () => {
                const sw = softwares.find(s => s.id === card.dataset.id);
                if (sw) handleDownload(sw);
            });
        });
    }

    function handleDownload(sw) {
        if (sw.noVerify) {
            window.open(sw.url, '_blank');
        } else {
            pendingUrl = sw.url;
            document.getElementById('verifyModal').classList.add('active');
            document.getElementById('verifyCode').value = '';
        }
    }

    async function verifyAndDownload() {
        const code = document.getElementById('verifyCode').value.trim();
        if (code === 'Win_Mac_123') {
            if (pendingUrl) window.open(pendingUrl, '_blank');
            closeModal();
        } else {
            alert('口令错误，请确认后重试。');
        }
    }
    function closeModal() { document.getElementById('verifyModal').classList.remove('active'); pendingUrl = null; }
    document.getElementById('confirmVerify').addEventListener('click', verifyAndDownload);
    document.getElementById('cancelVerify').addEventListener('click', closeModal);
    document.getElementById('verifyModal').addEventListener('click', (e) => { if(e.target === document.getElementById('verifyModal')) closeModal(); });
    document.getElementById('searchInput').addEventListener('input', (e) => { searchKeyword = e.target.value; renderGrid(); });

    // 客服模拟
    (function() {
        let messages = [];
        const botReply = "您好！我是乐哲软件客服 乐哲麦，有任何需求或问题请添加微信：Win_Mac_123，我们会尽快回复您～";
        const chatWindow = document.getElementById('chatWindow');
        const chatMessages = document.getElementById('chatMessagesList');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatToggle = document.getElementById('chatToggleBtn');
        const chatClose = document.getElementById('chatCloseBtn');
        function renderMessages() {
            chatMessages.innerHTML = '';
            if(messages.length===0){
                const div = document.createElement('div'); div.className='message bot'; div.innerHTML=`<strong>乐哲麦</strong>${botReply}`;
                chatMessages.appendChild(div);
            } else {
                messages.forEach(msg=>{
                    const div = document.createElement('div'); div.className=`message ${msg.sender}`;
                    div.innerHTML=`<strong>${msg.sender==='customer'?'我':'乐哲麦'}</strong>${msg.text}<small>${new Date().toLocaleTimeString()}</small>`;
                    chatMessages.appendChild(div);
                });
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function addMessage(text,sender){ messages.push({text,sender}); renderMessages(); }
        function sendCustomerMessage(text){ if(!text.trim()) return; addMessage(text.trim(),'customer'); setTimeout(()=>{ addMessage(botReply,'bot'); },500); }
        chatToggle.onclick = ()=>{ if(chatWindow.style.display==='none') { chatWindow.style.display='flex'; renderMessages(); } else chatWindow.style.display='none'; };
        chatClose.onclick = ()=> chatWindow.style.display='none';
        chatSendBtn.onclick = ()=>{ sendCustomerMessage(chatInput.value); chatInput.value=''; };
        chatInput.onkeypress = (e)=>{ if(e.key==='Enter') { sendCustomerMessage(chatInput.value); chatInput.value=''; } };
        chatWindow.style.display = 'none';
        const dragHandle = document.getElementById('chatHeaderDrag');
        const dragContainer = document.querySelector('.chatbot-container');
        let isDragging=false, startX,startY,startRight,startBottom;
        function getPos(){ const s=getComputedStyle(dragContainer); return { right: parseFloat(s.right)||32, bottom: parseFloat(s.bottom)||110 }; }
        dragHandle.onmousedown = (e)=>{ if(e.target.closest('.chat-close')) return; e.preventDefault(); isDragging=true; startX=e.clientX; startY=e.clientY; const pos=getPos(); startRight=pos.right; startBottom=pos.bottom; dragContainer.style.transition='none'; };
        window.onmousemove = (e)=>{ if(!isDragging) return; const dx=e.clientX-startX, dy=e.clientY-startY; let newRight=startRight-dx, newBottom=startBottom-dy; newRight=Math.min(Math.max(10,newRight), window.innerWidth-70); newBottom=Math.min(Math.max(10,newBottom), window.innerHeight-90); dragContainer.style.right=newRight+'px'; dragContainer.style.bottom=newBottom+'px'; };
        window.onmouseup = ()=>{ isDragging=false; dragContainer.style.transition=''; };
    })();

    fetchSoftwares();
</script>
</body>
</html>
